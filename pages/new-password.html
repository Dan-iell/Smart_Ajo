<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Smart Ajo – New Password</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <link href="https://fonts.googleapis.com/css2?family=Fraunces:wght@700;900&family=DM+Sans:wght@400;500;600&display=swap" rel="stylesheet"/>
  <style>
    @keyframes fadeUp {
      from { opacity: 0; transform: translateY(20px); }
      to   { opacity: 1; transform: translateY(0); }
    }
    .fade-up { animation: fadeUp 0.7s ease both; }
  </style>
</head>
<body class="bg-[#F5F4EF] min-h-screen max-w-[430px] mx-auto flex flex-col font-['DM_Sans']">

  <div class="flex flex-col flex-1 px-6 pt-14 pb-10 fade-up">

    <!-- Back button -->
    <button onclick="history.back()" class="w-9 h-9 flex items-center justify-center rounded-full bg-white border border-[#E0E0E0] mb-8 hover:bg-gray-50 transition-colors">
      <svg class="w-4 h-4 text-[#3A3A3A]" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24">
        <path d="M15 18l-6-6 6-6"/>
      </svg>
    </button>

    <!-- Icon -->
    <div class="w-12 h-12 bg-[#3A3A3A] rounded-2xl flex items-center justify-center mb-6">
      <svg class="w-6 h-6 text-white" fill="none" stroke="currentColor" stroke-width="1.8" viewBox="0 0 24 24">
        <rect x="3" y="11" width="18" height="11" rx="2"/><path d="M7 11V7a5 5 0 0 1 10 0v4"/>
      </svg>
    </div>

    <!-- Heading -->
    <h1 class="font-['Fraunces'] text-3xl font-bold text-black mb-2">New Password</h1>
    <p class="text-sm text-[#6B6B6B] mb-8 leading-relaxed">Create a strong new password to keep your data safe and secure.</p>

    <!-- Form -->
    <div class="flex flex-col gap-4 mb-6">

      <!-- New Password -->
      <div>
        <label class="text-sm font-medium text-[#3A3A3A] mb-1.5 block">Enter New Password</label>
        <div class="flex items-center gap-2 bg-white border border-[#E0E0E0] rounded-xl px-4 py-3.5">
          <svg class="w-4 h-4 text-[#9E9E9E] shrink-0" fill="none" stroke="currentColor" stroke-width="1.8" viewBox="0 0 24 24">
            <rect x="3" y="11" width="18" height="11" rx="2"/><path d="M7 11V7a5 5 0 0 1 10 0v4"/>
          </svg>
          <input type="password" id="newPass" placeholder="Enter password"
            class="flex-1 text-sm bg-transparent outline-none text-[#3A3A3A] placeholder-[#BDBDBD]"/>
          <button onclick="togglePass('newPass')" class="text-[#9E9E9E]">
            <svg class="w-4 h-4" fill="none" stroke="currentColor" stroke-width="1.8" viewBox="0 0 24 24">
              <path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"/><circle cx="12" cy="12" r="3"/>
            </svg>
          </button>
        </div>
      </div>

      <!-- Confirm Password -->
      <div>
        <label class="text-sm font-medium text-[#3A3A3A] mb-1.5 block">Confirm Password</label>
        <div class="flex items-center gap-2 bg-white border border-[#E0E0E0] rounded-xl px-4 py-3.5">
          <svg class="w-4 h-4 text-[#9E9E9E] shrink-0" fill="none" stroke="currentColor" stroke-width="1.8" viewBox="0 0 24 24">
            <rect x="3" y="11" width="18" height="11" rx="2"/><path d="M7 11V7a5 5 0 0 1 10 0v4"/>
          </svg>
          <input type="password" id="confirmPass" placeholder="Enter password"
            class="flex-1 text-sm bg-transparent outline-none text-[#3A3A3A] placeholder-[#BDBDBD]"/>
          <button onclick="togglePass('confirmPass')" class="text-[#9E9E9E]">
            <svg class="w-4 h-4" fill="none" stroke="currentColor" stroke-width="1.8" viewBox="0 0 24 24">
              <path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"/><circle cx="12" cy="12" r="3"/>
            </svg>
          </button>
        </div>
      </div>
    </div>

    <!-- Send button -->
    <button
      onclick="window.location.href='reset-success.html'"
      class="w-full py-4 bg-[#3A3A3A] text-white rounded-full text-sm font-semibold tracking-wide
             transition-all duration-200 hover:bg-black active:scale-95">
      Send
    </button>

  </div>

  <script>
    function togglePass(id) {
      const input = document.getElementById(id);
      input.type = input.type === 'password' ? 'text' : 'password';
    }
  </script>
</body>
</html>
