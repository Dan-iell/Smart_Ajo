<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Smart Ajo – Verify Code</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <link href="https://fonts.googleapis.com/css2?family=Fraunces:wght@700;900&family=DM+Sans:wght@400;500;600&display=swap" rel="stylesheet"/>
  <style>
    @keyframes fadeUp {
      from { opacity: 0; transform: translateY(20px); }
      to   { opacity: 1; transform: translateY(0); }
    }
    .fade-up { animation: fadeUp 0.7s ease both; }
  </style>
</head>
<body class="bg-[#F5F4EF] min-h-screen max-w-[430px] mx-auto flex flex-col font-['DM_Sans']">

  <div class="flex flex-col flex-1 px-6 pt-14 pb-10 fade-up">

    <!-- Back button -->
    <button onclick="history.back()" class="w-9 h-9 flex items-center justify-center rounded-full bg-white border border-[#E0E0E0] mb-8 hover:bg-gray-50 transition-colors">
      <svg class="w-4 h-4 text-[#3A3A3A]" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24">
        <path d="M15 18l-6-6 6-6"/>
      </svg>
    </button>

    <!-- Icon -->
    <div class="w-12 h-12 bg-[#3A3A3A] rounded-2xl flex items-center justify-center mb-6">
      <svg class="w-6 h-6 text-white" fill="none" stroke="currentColor" stroke-width="1.8" viewBox="0 0 24 24">
        <path d="M4 4h16v16H4z" stroke="none"/><rect x="2" y="4" width="20" height="16" rx="2"/><path d="m2 7 10 7 10-7"/>
      </svg>
    </div>

    <!-- Heading -->
    <h1 class="font-['Fraunces'] text-3xl font-bold text-black mb-2">Verification Code</h1>
    <p class="text-sm text-[#6B6B6B] mb-8 leading-relaxed">We sent a verification link to your email. Click it to activate your account.</p>

    <!-- OTP inputs -->
    <div class="mb-3">
      <label class="text-sm font-medium text-[#3A3A3A] mb-4 block">Enter Code</label>
      <div class="flex gap-3 justify-between">
        <input type="text" maxlength="1" id="otp1"
          class="w-16 h-16 text-center text-2xl font-bold bg-white border border-[#E0E0E0] rounded-2xl outline-none focus:border-[#3A3A3A] transition-colors text-[#3A3A3A]"
          oninput="moveNext(this, 'otp2')"/>
        <input type="text" maxlength="1" id="otp2"
          class="w-16 h-16 text-center text-2xl font-bold bg-white border border-[#E0E0E0] rounded-2xl outline-none focus:border-[#3A3A3A] transition-colors text-[#3A3A3A]"
          oninput="moveNext(this, 'otp3')"/>
        <input type="text" maxlength="1" id="otp3"
          class="w-16 h-16 text-center text-2xl font-bold bg-white border border-[#E0E0E0] rounded-2xl outline-none focus:border-[#3A3A3A] transition-colors text-[#3A3A3A]"
          oninput="moveNext(this, 'otp4')"/>
        <input type="text" maxlength="1" id="otp4"
          class="w-16 h-16 text-center text-2xl font-bold bg-white border border-[#E0E0E0] rounded-2xl outline-none focus:border-[#3A3A3A] transition-colors text-[#3A3A3A]"
          oninput="moveNext(this, null)"/>
      </div>
    </div>

    <!-- Resend -->
    <p class="text-sm text-[#6B6B6B] mb-8">
      If you didn't receive a code.
      <button class="text-black font-semibold underline underline-offset-2 hover:opacity-70 transition-opacity">Resend</button>
    </p>

    <!-- Send button -->
    <button
      onclick="window.location.href='new-password.html'"
      class="w-full py-4 bg-[#3A3A3A] text-white rounded-full text-sm font-semibold tracking-wide
             transition-all duration-200 hover:bg-black active:scale-95">
      Send
    </button>

  </div>

  <script type="module">
    function moveNext(current, nextId) {
      if (current.value.length === 1 && nextId) {
        document.getElementById(nextId).focus();
      }
    }
  </script>
</body>
</html>
