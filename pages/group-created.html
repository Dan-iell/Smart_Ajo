<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" /><meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Smart Ajo – Group Created</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <link href="https://fonts.googleapis.com/css2?family=Fraunces:wght@700;900&family=DM+Sans:wght@400;500;600&display=swap" rel="stylesheet"/>
  <style>
    @keyframes fadeUp{from{opacity:0;transform:translateY(20px);}to{opacity:1;transform:translateY(0);}}
    @keyframes scaleIn{from{opacity:0;transform:scale(0.6);}to{opacity:1;transform:scale(1);}}
    .fade-up{animation:fadeUp 0.6s ease 0.3s both;}
    .scale-in{animation:scaleIn 0.6s cubic-bezier(0.34,1.56,0.64,1) both;}
  </style>
</head>
<body class="bg-[#F5F4EF] min-h-screen max-w-[430px] mx-auto flex flex-col items-center justify-center font-['DM_Sans'] px-6">

  <div class="flex flex-col items-center text-center w-full gap-5">

    <!-- Success Checkmark with Deep Green -->
    <div class="scale-in w-28 h-28 bg-[#1B5E3B] rounded-full flex items-center justify-center mb-2 shadow-xl shadow-green-900/20">
      <svg class="w-12 h-12 text-white" fill="none" stroke="currentColor" stroke-width="2.5" viewBox="0 0 24 24">
        <path stroke-linecap="round" stroke-linejoin="round" d="M5 13l4 4L19 7"/>
      </svg>
    </div>

    <div class="fade-up w-full">
      <h1 class="font-['Fraunces'] text-3xl font-bold text-black mb-2">Group Created!</h1>
      <p class="text-sm text-[#6B6B6B] leading-relaxed mb-6 max-w-[280px] mx-auto">
        <span id="displayGroupName" class="font-bold text-[#1B5E3B]">Your group</span> is ready. Invite members to start the smart savings cycle.
      </p>

      <!-- Invite Link Section with Gold Accents -->
      <div class="mb-6">
        <label class="text-xs font-bold text-[#1B5E3B] mb-2 block text-left">Invite Link</label>
        <div class="flex gap-2">
          <div class="flex-1 bg-white border border-[#E0E0E0] rounded-xl px-4 py-3 text-left overflow-hidden">
            <p id="inviteLinkText" class="text-xs text-[#6B6B6B] truncate font-medium">https://smartajo.app/join/GENERATING...</p>
          </div>
          <button onclick="copyLink()" id="copyBtn"
            class="w-12 h-12 bg-[#F2A83B] rounded-xl flex items-center justify-center hover:bg-[#d99635] transition-colors active:scale-95 shrink-0 shadow-lg shadow-orange-900/20">
            <svg id="copyIcon" class="w-5 h-5 text-white" fill="none" stroke="currentColor" stroke-width="1.8" viewBox="0 0 24 24">
              <rect x="9" y="9" width="13" height="13" rx="2"/><path d="M5 15H4a2 2 0 0 1-2-2V4a2 2 0 0 1 2-2h9a2 2 0 0 1 2 2v1"/>
            </svg>
          </button>
        </div>
      </div>

      <!-- Action Buttons -->
      <div class="flex flex-col gap-3">
        <button onclick="window.location.href='dashboard.html'"
          class="w-full py-4 bg-[#1B5E3B] text-white rounded-full text-sm font-bold tracking-wide transition-all duration-200 hover:bg-[#14452b] active:scale-95 shadow-lg shadow-green-900/20">
          Go to Dashboard
        </button>
        <button onclick="window.location.href='groups.html'"
          class="w-full py-4 bg-white border-2 border-[#1B5E3B]/10 text-[#1B5E3B] rounded-full text-sm font-bold transition-all duration-200 hover:bg-[#1B5E3B]/5 active:scale-95">
          Discover Other Groups
        </button>
      </div>
    </div>
  </div>

  <script type="module">
    // ── Read data written by groups.js after successful group creation ──
    const groupName = localStorage.getItem('ajo_new_group_name') || 'Your group';
    const groupId   = localStorage.getItem('ajo_new_group_id')   || null;
    const savedLink = localStorage.getItem('ajo_new_group_link') || '';

    // Show group name
    document.getElementById('displayGroupName').textContent = groupName;

    // ── Resolve invite link ──
    // Priority: real link from API → fallback deep-link with group id → generic
    let inviteURL = savedLink
      || (groupId ? `https://smartajo.app/join/${groupId}` : null)
      || `https://smartajo.app/join/${Math.random().toString(36).substring(2, 7).toUpperCase()}`;

    // If the saved link looks like a raw UUID / path, wrap it nicely
    if (inviteURL && !inviteURL.startsWith('http')) {
      inviteURL = `https://smartajo.app/join/${inviteURL}`;
    }

    document.getElementById('inviteLinkText').textContent = inviteURL;

    // ── Copy handler ──
    window.copyLink = function () {
      navigator.clipboard.writeText(inviteURL).catch(() => {
        // Fallback for browsers that block clipboard
        const el = document.createElement('textarea');
        el.value = inviteURL;
        document.body.appendChild(el);
        el.select();
        document.execCommand('copy');
        document.body.removeChild(el);
      });

      const btn  = document.getElementById('copyBtn');
      const icon = document.getElementById('copyIcon');
      btn.classList.add('bg-green-600');
      btn.classList.remove('bg-[#3A3A3A]');
      icon.innerHTML = '<path stroke-linecap="round" stroke-linejoin="round" d="M5 13l4 4L19 7"/>';

      setTimeout(() => {
        btn.classList.remove('bg-green-600');
        btn.classList.add('bg-[#3A3A3A]');
        icon.innerHTML = '<rect x="9" y="9" width="13" height="13" rx="2"/><path d="M5 15H4a2 2 0 0 1-2-2V4a2 2 0 0 1 2-2h9a2 2 0 0 1 2 2v1"/>';
      }, 2000);
    };

    // ── Clean up storage so a refresh doesn't show stale data ──
    // (keep group id in case user navigates back to the group)
    localStorage.removeItem('ajo_new_group_name');
    localStorage.removeItem('ajo_new_group_link');
  </script>
</body>
</html>
