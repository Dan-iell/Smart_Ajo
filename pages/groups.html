<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Smart Ajo – Groups</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link
      href="https://fonts.googleapis.com/css2?family=Fraunces:wght@700;900&family=DM+Sans:wght@400;500;600&display=swap"
      rel="stylesheet"
    />
    <style>
      @keyframes fadeUp {
        from { opacity: 0; transform: translateY(16px); }
        to   { opacity: 1; transform: translateY(0); }
      }
      .fade-up { animation: fadeUp 0.5s ease both; }
      body { padding-bottom: 90px; }

      .tab-content { display: none; }
      .tab-content.active {
        display: block;
        animation: fadeUp 0.4s ease both;
      }

      /* Code modal */
      #codeModal {
        transition: opacity 0.2s ease, transform 0.2s ease;
      }
      #codeModal.hidden { display: none; }

      /* OTP-style code input */
      .code-char {
        width: 44px; height: 52px;
        text-align: center; font-size: 20px; font-weight: 700;
        background: #F5F4EF; border: 2px solid #E0E0E0;
        border-radius: 12px; outline: none;
        transition: border-color 0.2s;
        color: #1A1A1A;
      }
      .code-char:focus { border-color: #1B5E3B; background: white; }
    </style>
  </head>
  <body class="bg-[#F5F4EF] min-h-screen max-w-[430px] mx-auto font-['DM_Sans']">

    <!-- ─── Join-by-Code Modal ─────────────────────────────── -->
    <div id="codeModal" class="hidden fixed inset-0 z-50 flex items-end justify-center">
      <!-- Backdrop -->
      <div class="absolute inset-0 bg-black/40 backdrop-blur-sm" onclick="closeCodeModal()"></div>

      <!-- Sheet -->
      <div class="relative w-full max-w-[430px] bg-white rounded-t-3xl px-6 pt-6 pb-10 shadow-2xl">
        <div class="w-10 h-1 bg-[#E0E0E0] rounded-full mx-auto mb-6"></div>

        <h3 class="font-['Fraunces'] text-xl font-bold text-[#1A1A1A] mb-1">Enter Group Code</h3>
        <p class="text-xs text-[#9E9E9E] mb-6 font-medium">Ask the group admin for their invite code.</p>

        <!-- 6-char code input -->
        <div id="codeInputRow" class="flex gap-2 justify-between mb-4">
          <input class="code-char" maxlength="1" inputmode="text" />
          <input class="code-char" maxlength="1" inputmode="text" />
          <input class="code-char" maxlength="1" inputmode="text" />
          <input class="code-char" maxlength="1" inputmode="text" />
          <input class="code-char" maxlength="1" inputmode="text" />
          <input class="code-char" maxlength="1" inputmode="text" />
        </div>

        <p id="codeError" class="text-xs text-red-500 font-semibold mb-4 hidden text-center"></p>

        <button id="submitCodeBtn"
          class="w-full py-4 bg-[#1B5E3B] text-white rounded-full text-sm font-bold tracking-wide transition-all active:scale-95 hover:bg-[#14452b]">
          Join Private Group
        </button>
      </div>
    </div>

    <!-- ─── Main Content ──────────────────────────────────── -->
    <div class="px-5 pt-10">

      <!-- Header -->
      <div class="flex items-center justify-between mb-6 fade-up">
        <h1 class="font-['Fraunces'] text-2xl font-bold text-[#1A1A1A]">My Groups</h1>
        <div class="flex items-center gap-2">
          <!-- Join with code button -->
          <button onclick="openCodeModal()"
            class="flex items-center gap-1.5 px-3 py-2 bg-white border border-[#E0E0E0] rounded-full text-xs font-bold text-[#1B5E3B] hover:bg-[#F0FDF4] transition-all active:scale-95 shadow-sm">
            <svg class="w-3.5 h-3.5" fill="none" stroke="currentColor" stroke-width="2.5" viewBox="0 0 24 24">
              <rect x="3" y="11" width="18" height="11" rx="2"/>
              <path d="M7 11V7a5 5 0 0 1 10 0v4"/>
            </svg>
            Use Code
          </button>
          <!-- Create group button -->
          <button onclick="window.location.href = 'create-group.html'"
            class="w-10 h-10 bg-[#1B5E3B] rounded-full flex items-center justify-center hover:bg-[#14452b] transition-all active:scale-95 shadow-lg shadow-green-900/20">
            <svg class="w-5 h-5 text-white" fill="none" stroke="currentColor" stroke-width="2.5" viewBox="0 0 24 24">
              <path d="M12 5v14M5 12h14" />
            </svg>
          </button>
        </div>
      </div>

      <!-- Tabs -->
      <div class="bg-white rounded-full p-1 flex mb-6 fade-up border border-[#E0E0E0] shadow-sm">
        <button id="tab-my"
          class="flex-1 py-2.5 rounded-full text-sm font-bold transition-all duration-200 bg-[#1B5E3B] text-white">
          My Groups
        </button>
        <button id="tab-discover"
          class="flex-1 py-2.5 rounded-full text-sm font-medium transition-all duration-200 text-[#9E9E9E]">
          Discover
        </button>
      </div>

      <!-- My Groups Tab -->
      <div id="content-my" class="tab-content active">
        <div id="myGroupsContainer" class="flex flex-col gap-4">
          <p class="text-center py-10 text-xs text-[#9E9E9E] animate-pulse">Loading your groups...</p>
        </div>
      </div>

      <!-- Discover Tab -->
      <div id="content-discover" class="tab-content">
        <div class="flex items-center gap-3 bg-white border border-[#E0E0E0] rounded-2xl px-4 py-3.5 mb-4 focus-within:border-[#F2A83B] transition-colors shadow-sm">
          <svg class="w-4 h-4 text-[#9E9E9E] shrink-0" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24">
            <circle cx="11" cy="11" r="8" /><path d="m21 21-4.35-4.35" />
          </svg>
          <input id="searchInput" type="text" placeholder="Search groups..."
            class="flex-1 text-sm bg-transparent outline-none text-[#3A3A3A] placeholder-[#BDBDBD]" />
        </div>

        <!-- Legend -->
        <div class="flex items-center gap-4 mb-4 px-1">
          <div class="flex items-center gap-1.5 text-[10px] font-bold text-[#9E9E9E] uppercase tracking-wider">
            <div class="w-4 h-4 bg-[#F0FDF4] rounded-full flex items-center justify-center">
              <svg class="w-2.5 h-2.5 text-[#1B5E3B]" fill="none" stroke="currentColor" stroke-width="2.5" viewBox="0 0 24 24"><path d="M17 21v-2a4 4 0 0 0-4-4H5a4 4 0 0 0-4 4v2"/><circle cx="9" cy="7" r="4"/></svg>
            </div>
            Public
          </div>
          <div class="flex items-center gap-1.5 text-[10px] font-bold text-[#9E9E9E] uppercase tracking-wider">
            <div class="w-4 h-4 bg-[#FFF9ED] rounded-full flex items-center justify-center">
              <svg class="w-2.5 h-2.5 text-[#F2A83B]" fill="none" stroke="currentColor" stroke-width="2.5" viewBox="0 0 24 24"><rect x="3" y="11" width="18" height="11" rx="2"/><path d="M7 11V7a5 5 0 0 1 10 0v4"/></svg>
            </div>
            Private (code needed)
          </div>
        </div>

        <div id="discoverGroupsContainer" class="flex flex-col gap-4"></div>
      </div>
    </div>

    <!-- Bottom Nav -->
    <div class="fixed bottom-0 left-1/2 -translate-x-1/2 w-full max-w-[430px] bg-white border-t border-[#F0F0F0] px-6 py-3 flex items-center justify-between z-40">
      <button onclick="window.location.href = 'dashboard.html'" class="flex flex-col items-center gap-1 text-[#9E9E9E]">
        <svg class="w-5 h-5" fill="none" stroke="currentColor" stroke-width="1.8" viewBox="0 0 24 24">
          <path d="M3 12L12 3l9 9" /><path d="M9 21V12h6v9" />
        </svg>
        <span class="text-[10px] font-medium">Home</span>
      </button>
      <button class="flex flex-col items-center gap-1 text-[#1B5E3B]">
        <svg class="w-5 h-5" fill="currentColor" viewBox="0 0 24 24">
          <path d="M16 11c1.66 0 2.99-1.34 2.99-3S17.66 5 16 5c-1.66 0-3 1.34-3 3s1.34 3 3 3zm-8 0c1.66 0 2.99-1.34 2.99-3S9.66 5 8 5C6.34 5 5 6.34 5 8s1.34 3 3 3zm0 2c-2.33 0-7 1.17-7 3.5V19h14v-2.5c0-2.33-4.67-3.5-7-3.5zm8 0c-.29 0-.62.02-.97.05 1.16.84 1.97 1.97 1.97 3.45V19h6v-2.5c0-2.33-4.67-3.5-7-3.5z" />
        </svg>
        <span class="text-[10px] font-bold">Groups</span>
      </button>
      <button onclick="window.location.href = 'make-payment.html'"
        class="w-14 h-14 bg-[#1B5E3B] rounded-full flex items-center justify-center -mt-8 shadow-xl shadow-green-900/30 active:scale-90 transition-all">
        <svg class="w-6 h-6 text-white" fill="none" stroke="currentColor" stroke-width="2.5" viewBox="0 0 24 24">
          <path d="M12 5v14M5 12h14" />
        </svg>
      </button>
      <button onclick="window.location.href = 'alerts.html'" class="flex flex-col items-center gap-1 text-[#9E9E9E] relative">
        <svg class="w-5 h-5" fill="none" stroke="currentColor" stroke-width="1.8" viewBox="0 0 24 24">
          <path d="M18 8A6 6 0 0 0 6 8c0 7-3 9-3 9h18s-3-2-3-9" /><path d="M13.73 21a2 2 0 0 1-3.46 0" />
        </svg>
        <span class="absolute top-0 right-1.5 w-2 h-2 bg-[#F2A83B] rounded-full border border-white"></span>
        <span class="text-[10px] font-medium">Alerts</span>
      </button>
      <button onclick="window.location.href = 'profile.html'" class="flex flex-col items-center gap-1 text-[#9E9E9E]">
        <svg class="w-5 h-5" fill="none" stroke="currentColor" stroke-width="1.8" viewBox="0 0 24 24">
          <circle cx="12" cy="7" r="4" /><path d="M5.5 20a7 7 0 0 1 13 0" />
        </svg>
        <span class="text-[10px] font-medium">Profile</span>
      </button>
    </div>

    <script type="module">
      import { getMyGroups, discoverGroups, joinGroup, joinGroupByCode } from "../js/api.js";

      const myContainer       = document.getElementById("myGroupsContainer");
      const discoverContainer = document.getElementById("discoverGroupsContainer");
      const tabMy             = document.getElementById("tab-my");
      const tabDiscover       = document.getElementById("tab-discover");
      const contentMy         = document.getElementById("content-my");
      const contentDiscover   = document.getElementById("content-discover");
      const searchInput       = document.getElementById("searchInput");

      let allDiscoverGroups = [];

      // ─── Render helpers ──────────────────────────────────────

      function renderGroupCard(group, type) {
        const isPrivate = group.is_private === true || group.privacy === "private";

        const cycleLabel = group.current_round && group.total_rounds
          ? `Round ${group.current_round}/${group.total_rounds}`
          : `${group.members_count || 0} members`;

        const rawDue = group.next_due_date ?? group.due_date ?? null;
        let dueLabel = type === "discover" ? "" : "—";
        let dueColor = "text-[#9E9E9E]";
        if (rawDue) {
          const diff = Math.ceil((new Date(rawDue) - new Date()) / 86400000);
          if (diff < 0)        { dueLabel = "Overdue";      dueColor = "text-[#EF4444] font-black"; }
          else if (diff === 0) { dueLabel = "Due Today";    dueColor = "text-[#F2A83B] font-black"; }
          else if (diff === 1) { dueLabel = "Due Tomorrow"; dueColor = "text-[#F2A83B] font-black"; }
          else                 { dueLabel = `In ${diff}d`;  dueColor = "text-[#1B5E3B] font-bold"; }
        }

        // Icon background differs by privacy
        const iconBg   = isPrivate ? "bg-[#FFF9ED]" : "bg-[#F0FDF4]";
        const iconColor = isPrivate ? "text-[#F2A83B]" : "text-[#1B5E3B]";
        const icon = isPrivate
          ? `<svg class="w-5 h-5 ${iconColor}" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><rect x="3" y="11" width="18" height="11" rx="2"/><path d="M7 11V7a5 5 0 0 1 10 0v4"/></svg>`
          : `<svg class="w-5 h-5 ${iconColor}" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><path d="M17 21v-2a4 4 0 0 0-4-4H5a4 4 0 0 0-4 4v2"/><circle cx="9" cy="7" r="4"/></svg>`;

        // Action button for discover tab
        let actionBtn = "";
        if (type === "discover") {
          if (isPrivate) {
            actionBtn = `
              <button onclick="event.stopPropagation(); openCodeModal('${group.id}')"
                class="flex items-center gap-1 bg-[#FFF9ED] border border-[#F2A83B]/30 text-[#F2A83B] text-[10px] uppercase tracking-widest px-3 py-2 rounded-xl font-black active:scale-95 transition-all">
                <svg class="w-3 h-3" fill="none" stroke="currentColor" stroke-width="2.5" viewBox="0 0 24 24"><rect x="3" y="11" width="18" height="11" rx="2"/><path d="M7 11V7a5 5 0 0 1 10 0v4"/></svg>
                Code
              </button>`;
          } else {
            actionBtn = `
              <button onclick="event.stopPropagation(); handleJoinPublic('${group.id}', this)"
                class="bg-[#1B5E3B] text-white text-[10px] uppercase tracking-widest px-4 py-2 rounded-xl font-black active:scale-95 transition-all shadow-md shadow-green-900/10">
                Join
              </button>`;
          }
        }

        return `
          <div
            onclick="${type !== "discover" ? `window.location.href='group-detail.html?id=${group.id}'` : ""}"
            class="bg-white rounded-[24px] p-4 shadow-sm border border-[#F0F0F0] ${type !== "discover" ? "cursor-pointer active:scale-[0.98]" : ""} transition-all hover:border-[#1B5E3B]/20"
          >
            <div class="flex items-center justify-between mb-3">
              <div class="flex items-center gap-3">
                <div class="w-12 h-12 ${iconBg} rounded-2xl flex items-center justify-center shrink-0">
                  ${icon}
                </div>
                <div>
                  <div class="flex items-center gap-1.5">
                    <p class="text-base font-bold text-[#1A1A1A]">${group.name}</p>
                    ${isPrivate ? `<span class="text-[9px] font-bold bg-[#FFF9ED] text-[#F2A83B] border border-[#F2A83B]/20 px-1.5 py-0.5 rounded-full uppercase tracking-wide">Private</span>` : ""}
                  </div>
                  <p class="text-sm font-black text-[#F2A83B]">₦${Number(group.contribution_amount).toLocaleString()}/mo</p>
                </div>
              </div>
              ${actionBtn || `<svg class="w-5 h-5 text-[#BDBDBD]" fill="none" stroke="currentColor" stroke-width="2.5" viewBox="0 0 24 24"><path d="M9 18l6-6-6-6"/></svg>`}
            </div>

            <div class="w-full h-1.5 bg-[#F5F4EF] rounded-full mb-2 overflow-hidden">
              <div class="h-full bg-[#1B5E3B] rounded-full" style="width: ${group.progress_percent ?? 0}%"></div>
            </div>

            <div class="flex items-center justify-between text-[10px] font-bold uppercase tracking-tight text-[#9E9E9E]">
              <span>${cycleLabel}</span>
              ${type === "my" && dueLabel ? `<span class="${dueColor}">${dueLabel}</span>` : ""}
            </div>
          </div>`;
      }

      // ─── Load groups ──────────────────────────────────────────

      async function loadGroups(type = "my") {
        const container = type === "my" ? myContainer : discoverContainer;
        container.innerHTML = `<p class="text-center text-[#9E9E9E] py-10 text-xs font-bold animate-pulse">Fetching groups…</p>`;

        try {
          const raw = type === "my" ? await getMyGroups() : await discoverGroups();
          const list = Array.isArray(raw) ? raw : raw.results ?? [];

          if (!list.length) {
            container.innerHTML = `
              <div class="py-12 text-center">
                <p class="text-sm font-bold text-[#9E9E9E] mb-1">No groups found.</p>
                ${type === "discover" ? `<p class="text-xs text-[#BDBDBD]">Try joining with a code instead.</p>` : ""}
              </div>`;
            return;
          }

          if (type === "discover") allDiscoverGroups = list;
          container.innerHTML = list.map((g) => renderGroupCard(g, type)).join("");

        } catch (err) {
          container.innerHTML = `<p class="text-center text-red-500 py-10 text-xs font-bold">${err.message}</p>`;
        }
      }

      // ─── Join public group ────────────────────────────────────

      window.handleJoinPublic = async (groupId, btn) => {
        const original = btn.textContent;
        btn.textContent = "Joining…";
        btn.disabled = true;
        try {
          await joinGroup(groupId);
          btn.textContent = "Joined ✓";
          btn.classList.replace("bg-[#1B5E3B]", "bg-green-600");
          setTimeout(() => switchTab("my"), 1000);
        } catch (e) {
          btn.textContent = original;
          btn.disabled = false;
          alert(e.message || "Could not join group.");
        }
      };

      // ─── Code modal ───────────────────────────────────────────

      let targetGroupId = null; // set when opening modal from a specific private card

      window.openCodeModal = (groupId = null) => {
        targetGroupId = groupId;
        document.getElementById("codeModal").classList.remove("hidden");
        document.getElementById("codeError").classList.add("hidden");
        // Clear inputs
        document.querySelectorAll(".code-char").forEach((el) => (el.value = ""));
        document.querySelectorAll(".code-char")[0].focus();
      };

      window.closeCodeModal = () => {
        document.getElementById("codeModal").classList.add("hidden");
        targetGroupId = null;
      };

      // OTP-style navigation between code inputs
      document.querySelectorAll(".code-char").forEach((input, i, inputs) => {
        input.addEventListener("input", () => {
          input.value = input.value.toUpperCase();
          if (input.value && i < inputs.length - 1) inputs[i + 1].focus();
        });
        input.addEventListener("keydown", (e) => {
          if (e.key === "Backspace" && !input.value && i > 0) inputs[i - 1].focus();
        });
      });

      document.getElementById("submitCodeBtn").addEventListener("click", async () => {
        const code = Array.from(document.querySelectorAll(".code-char"))
          .map((el) => el.value.trim())
          .join("");

        const errorEl = document.getElementById("codeError");
        const btn     = document.getElementById("submitCodeBtn");

        if (code.length < 6) {
          errorEl.textContent = "Please enter the full 6-character code.";
          errorEl.classList.remove("hidden");
          return;
        }

        errorEl.classList.add("hidden");
        btn.textContent = "Joining…";
        btn.disabled = true;

        try {
          await joinGroupByCode(code);
          closeCodeModal();
          switchTab("my");
        } catch (e) {
          errorEl.textContent = e.message || "Invalid code. Please check and try again.";
          errorEl.classList.remove("hidden");
          btn.textContent = "Join Private Group";
          btn.disabled = false;
        }
      });

      // ─── Search (discover tab only) ───────────────────────────

      searchInput.addEventListener("input", () => {
        const q = searchInput.value.toLowerCase();
        const filtered = allDiscoverGroups.filter((g) =>
          g.name.toLowerCase().includes(q)
        );
        if (!filtered.length) {
          discoverContainer.innerHTML = `<p class="text-center text-[#9E9E9E] py-6 text-xs font-bold">No results for "${searchInput.value}"</p>`;
        } else {
          discoverContainer.innerHTML = filtered.map((g) => renderGroupCard(g, "discover")).join("");
        }
      });

      // ─── Tab switching ────────────────────────────────────────

      function switchTab(type) {
        const isMyTab = type === "my";
        tabMy.classList.toggle("bg-[#1B5E3B]", isMyTab);
        tabMy.classList.toggle("text-white", isMyTab);
        tabMy.classList.toggle("text-[#9E9E9E]", !isMyTab);
        tabDiscover.classList.toggle("bg-[#1B5E3B]", !isMyTab);
        tabDiscover.classList.toggle("text-white", !isMyTab);
        tabDiscover.classList.toggle("text-[#9E9E9E]", isMyTab);
        contentMy.classList.toggle("active", isMyTab);
        contentDiscover.classList.toggle("active", !isMyTab);
        loadGroups(type);
      }

      tabMy.addEventListener("click", () => switchTab("my"));
      tabDiscover.addEventListener("click", () => switchTab("discover"));

      loadGroups("my");
    </script>
  </body>
</html>
