<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Smart Ajo – Groups</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <link href="https://fonts.googleapis.com/css2?family=Fraunces:wght@700;900&family=DM+Sans:wght@400;500;600&display=swap" rel="stylesheet"/>
  <style>
    @keyframes fadeUp { from { opacity:0; transform:translateY(16px);} to { opacity:1; transform:translateY(0);} }
    .fade-up { animation: fadeUp 0.5s ease both; }
    body { padding-bottom: 90px; }

    .tab-content { display: none; }
    .tab-content.active { display: block; animation: fadeUp 0.4s ease both; }

    .progress-bar {
      height: 4px;
      background: #E0E0E0;
      border-radius: 99px;
      overflow: hidden;
    }
    .progress-fill {
      height: 100%;
      background: #3A3A3A;
      border-radius: 99px;
      transition: width 0.8s ease;
    }
  </style>
</head>
<body class="bg-[#F5F4EF] min-h-screen max-w-[430px] mx-auto font-['DM_Sans']">

  <div class="px-5 pt-10">

    <!-- Header -->
    <div class="flex items-center justify-between mb-6 fade-up">
      <h1 class="font-['Fraunces'] text-2xl font-bold text-[#1A1A1A]">My Groups</h1>
      <button onclick="window.location.href='make-payment.html'"
        class="w-10 h-10 bg-[#3A3A3A] rounded-full flex items-center justify-center hover:bg-black transition-colors active:scale-95">
        <svg class="w-5 h-5 text-white" fill="none" stroke="currentColor" stroke-width="2.5" viewBox="0 0 24 24">
          <path d="M12 5v14M5 12h14"/>
        </svg>
      </button>
    </div>

    <!-- Tabs -->
    <div class="bg-white rounded-full p-1 flex mb-6 fade-up">
      <button id="tab-my" onclick="switchTab('my')"
        class="flex-1 py-2.5 rounded-full text-sm font-semibold transition-all duration-200 bg-[#3A3A3A] text-white">
        My Groups
      </button>
      <button id="tab-discover" onclick="switchTab('discover')"
        class="flex-1 py-2.5 rounded-full text-sm font-medium transition-all duration-200 text-[#9E9E9E]">
        Discover
      </button>
    </div>

    <!-- MY GROUPS TAB -->
    <div id="content-my" class="tab-content active">
      <div class="flex flex-col gap-4">
        <!-- Dynamic content will be injected here -->
        <p class="text-center py-10 text-xs text-[#9E9E9E]">Loading your groups...</p>
      </div>
    </div>

    <!-- DISCOVER TAB -->
    <div id="content-discover" class="tab-content">
      <!-- Search -->
      <div class="flex items-center gap-3 bg-white border border-[#E0E0E0] rounded-2xl px-4 py-3.5 mb-6">
        <svg class="w-4 h-4 text-[#9E9E9E] shrink-0" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24">
          <circle cx="11" cy="11" r="8"/><path d="m21 21-4.35-4.35"/>
        </svg>
        <input type="text" placeholder="Search groups..."
          class="flex-1 text-sm bg-transparent outline-none text-[#3A3A3A] placeholder-[#BDBDBD]"/>
      </div>

      <div class="discover-list flex flex-col gap-4">
        <!-- Dynamic discover content injected here -->
      </div>
    </div>

  </div>

  <!-- Bottom Nav -->
  <div class="fixed bottom-0 left-1/2 -translate-x-1/2 w-full max-w-[430px] bg-white border-t border-[#F0F0F0] px-6 py-3 flex items-center justify-between z-50">
    <button onclick="window.location.href='dashboard.html'" class="flex flex-col items-center gap-1 text-[#9E9E9E] hover:text-[#3A3A3A] transition-colors">
      <svg class="w-5 h-5" fill="none" stroke="currentColor" stroke-width="1.8" viewBox="0 0 24 24"><path d="M3 12L12 3l9 9"/><path d="M9 21V12h6v9"/></svg>
      <span class="text-[10px] font-medium">Home</span>
    </button>
    <button class="flex flex-col items-center gap-1 text-[#3A3A3A]">
      <svg class="w-5 h-5" fill="currentColor" viewBox="0 0 24 24"><path d="M16 11c1.66 0 2.99-1.34 2.99-3S17.66 5 16 5c-1.66 0-3 1.34-3 3s1.34 3 3 3zm-8 0c1.66 0 2.99-1.34 2.99-3S9.66 5 8 5C6.34 5 5 6.34 5 8s1.34 3 3 3zm0 2c-2.33 0-7 1.17-7 3.5V19h14v-2.5c0-2.33-4.67-3.5-7-3.5zm8 0c-.29 0-.62.02-.97.05 1.16.84 1.97 1.97 1.97 3.45V19h6v-2.5c0-2.33-4.67-3.5-7-3.5z"/></svg>
      <span class="text-[10px] font-semibold">Groups</span>
    </button>
    <button onclick="window.location.href='make-payment.html'" class="w-14 h-14 bg-[#3A3A3A] rounded-full flex items-center justify-center -mt-6 shadow-lg hover:bg-black transition-colors active:scale-95">
      <svg class="w-6 h-6 text-white" fill="none" stroke="currentColor" stroke-width="2.5" viewBox="0 0 24 24"><path d="M12 5v14M5 12h14"/></svg>
    </button>
    <button onclick="window.location.href='alerts.html'" class="flex flex-col items-center gap-1 text-[#9E9E9E] hover:text-[#3A3A3A] transition-colors relative">
      <svg class="w-5 h-5" fill="none" stroke="currentColor" stroke-width="1.8" viewBox="0 0 24 24"><path d="M18 8A6 6 0 0 0 6 8c0 7-3 9-3 9h18s-3-2-3-9"/><path d="M13.73 21a2 2 0 0 1-3.46 0"/></svg>
      <span class="absolute top-0 right-1.5 w-2 h-2 bg-red-500 rounded-full"></span>
      <span class="text-[10px] font-medium">Alerts</span>
    </button>
    <button onclick="window.location.href='profile.html'" class="flex flex-col items-center gap-1 text-[#9E9E9E] hover:text-[#3A3A3A] transition-colors">
      <svg class="w-5 h-5" fill="none" stroke="currentColor" stroke-width="1.8" viewBox="0 0 24 24"><circle cx="12" cy="7" r="4"/><path d="M5.5 20a7 7 0 0 1 13 0"/></svg>
      <span class="text-[10px] font-medium">Profile</span>
    </button>
  </div>

  <script type="module">
  // Path fixed for files inside /pages folder
  import { getMyGroups, discoverGroups, requireAuth, joinGroup } from "../js/api.js";

  async function init() {
    const myContainer = document.querySelector('#content-my .flex-col');
    if (!requireAuth()) return;

    try {
      // Fetching with individual try/catch to prevent page-wide crash
      let myGroups = [];
      try { myGroups = await getMyGroups(); } catch (e) { console.warn("MyGroups API failed."); }

      let publicGroups = [];
      try { publicGroups = await discoverGroups(); } catch (e) { console.warn("Discover API failed."); }

      renderMyGroups(myGroups);
      renderDiscoverGroups(publicGroups);
    } catch (error) {
      console.error("Init error:", error);
    }
  }

  window.switchTab = (tab) => {
    const tabMy = document.getElementById('tab-my');
    const tabDisc = document.getElementById('tab-discover');
    const contentMy = document.getElementById('content-my');
    const contentDisc = document.getElementById('content-discover');

    if (tab === 'my') {
      tabMy.className = 'flex-1 py-2.5 rounded-full text-sm font-semibold transition-all duration-200 bg-[#3A3A3A] text-white';
      tabDisc.className = 'flex-1 py-2.5 rounded-full text-sm font-medium transition-all duration-200 text-[#9E9E9E]';
      contentMy.classList.add('active');
      contentDisc.classList.remove('active');
    } else {
      tabDisc.className = 'flex-1 py-2.5 rounded-full text-sm font-semibold transition-all duration-200 bg-[#3A3A3A] text-white';
      tabMy.className = 'flex-1 py-2.5 rounded-full text-sm font-medium transition-all duration-200 text-[#9E9E9E]';
      contentDisc.classList.add('active');
      contentMy.classList.remove('active');
    }
  };

  window.handleJoin = async (groupId) => {
    try {
      await joinGroup(groupId);
      alert("Successfully joined!");
      window.location.reload();
    } catch (err) {
      alert("Error: " + err.message);
    }
  };

  function renderMyGroups(groups) {
    const container = document.querySelector('#content-my .flex-col');
    if (!groups || groups.length === 0) {
      container.innerHTML = `<p class="text-center py-10 text-xs text-[#9E9E9E]">No groups found.</p>`;
      return;
    }
    container.innerHTML = groups.map(g => `
      <div class="bg-white rounded-2xl p-4 mb-2 cursor-pointer border border-transparent hover:border-[#3A3A3A]" 
           onclick="window.location.href='group-detail.html?id=${g.id}'">
        <div class="flex items-center gap-3">
          <div class="w-10 h-10 bg-[#3A3A3A] rounded-xl flex items-center justify-center">
            <span class="text-white font-bold text-xs">${(g.name || "AJ").substring(0,2).toUpperCase()}</span>
          </div>
          <div class="flex-1">
            <p class="text-sm font-semibold truncate">${g.name}</p>
            <p class="text-xs text-[#9E9E9E]">₦${parseFloat(g.contribution_amount || 0).toLocaleString()}</p>
          </div>
          <span class="text-[10px] bg-[#F0FDF4] text-[#16A34A] px-2 py-1 rounded-full font-bold">ACTIVE</span>
        </div>
      </div>`).join('');
  }

  function renderDiscoverGroups(groups) {
    const container = document.querySelector('.discover-list');
    if (!groups || groups.length === 0) {
      container.innerHTML = `<p class="text-center text-xs text-[#9E9E9E] py-10">No public groups found.</p>`;
      return;
    }
    container.innerHTML = groups.map(g => `
      <div class="bg-white rounded-2xl p-4 mb-2">
        <div class="flex items-center justify-between">
          <div class="flex items-center gap-3">
            <div class="w-10 h-10 bg-[#B0B5AC] rounded-xl flex items-center justify-center text-white font-bold text-xs">${(g.name || "AJ").substring(0,2).toUpperCase()}</div>
            <p class="text-sm font-semibold">${g.name}</p>
          </div>
          <button onclick="handleJoin(${g.id})" class="bg-[#3A3A3A] text-white text-[10px] px-4 py-2 rounded-full font-bold active:scale-95">JOIN</button>
        </div>
      </div>`).join('');
  }

  init();
</script>
</body>
</html>
