<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Smart Ajo – Sign In</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link
      href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@500;700&family=DM+Sans:wght@400;500;600&display=swap"
      rel="stylesheet"
    />
    <script>
      tailwind.config = {
        theme: {
          extend: {
            colors: {
              brandGreen: "#1b5e3b",
              brandGreenDark: "#144d30",
              brandGold: "#f2a83b",
              brandCream: "#faf8f4",
            },
            fontFamily: {
              display: ["Space Grotesk", "sans-serif"],
              sans: ["DM Sans", "sans-serif"],
            },
          },
        },
      };
    </script>
    <style>
      @keyframes fadeUp {
        from {
          opacity: 0;
          transform: translateY(20px);
        }
        to {
          opacity: 1;
          transform: translateY(0);
        }
      }
      .fade-up {
        animation: fadeUp 0.7s ease both;
      }
      .fade-up-2 {
        animation: fadeUp 0.7s ease 0.1s both;
      }
      .fade-up-3 {
        animation: fadeUp 0.7s ease 0.2s both;
      }
    </style>
  </head>
  <body
    class="bg-brandCream min-h-screen max-w-[430px] mx-auto flex flex-col font-sans"
  >
    <div class="flex flex-col flex-1 px-6 pt-14 pb-10">
      <!-- Logo Section -->
      <div class="flex items-center gap-3 mb-8 fade-up">
        <!-- Logo Container -->
        <div
          class="w-10 h-10 bg-brandGreen rounded-xl flex items-center justify-center overflow-hidden shadow-lg shadow-brandGreen/20"
        >
          <img
            src="../assets/icons/logo.png"
            alt="Smart Ajo Logo"
            class="w-full h-full object-cover"
            onerror="
              this.style.display = 'none';
              this.nextElementSibling.style.display = 'block';
            "
          />
          <!-- Fallback if image fails to load -->
          <span class="hidden font-display text-sm font-bold text-white"
            >SA</span
          >
        </div>

        <span class="font-display text-xl font-bold tracking-tight">
          <span class="text-brandGreen">Smart</span
          ><span class="text-brandGold">Ajo</span>
        </span>
      </div>

      <!-- Welcome Text -->
      <div class="mb-10 fade-up-2">
        <h1
          class="font-display text-4xl font-bold text-slate-900 leading-[1.1] mb-3 tracking-tighter"
        >
          Welcome back<br />to the
          <span class="text-brandGreen italic font-medium">Circle.</span>
        </h1>
        <p class="text-sm text-slate-500 leading-relaxed">
          Secure access to your community savings and financial heritage.
        </p>
      </div>

      <!-- Form Section -->
      <div class="flex flex-col gap-5 fade-up-3">
        <p
          id="authError"
          class="text-xs text-red-600 hidden bg-red-50 p-4 rounded-2xl border border-red-100 mb-2 font-medium"
        ></p>

        <!-- Email Field -->
        <div>
          <label
            class="text-[11px] font-bold uppercase tracking-widest text-brandGreen mb-2 ml-1 block"
            >Email Address</label
          >
          <div
            class="flex items-center gap-3 bg-white border border-slate-200 rounded-2xl px-5 py-4 focus-within:border-brandGreen focus-within:ring-4 focus-within:ring-brandGreen/5 transition-all"
          >
            <svg
              class="w-4 h-4 text-slate-400 shrink-0"
              fill="none"
              stroke="currentColor"
              stroke-width="2"
              viewBox="0 0 24 24"
            >
              <rect x="2" y="4" width="20" height="16" rx="2" />
              <path d="m2 7 10 7 10-7" />
            </svg>
            <input
              type="email"
              id="email"
              placeholder="example@gmail.com"
              class="flex-1 text-sm bg-transparent outline-none text-slate-900 placeholder-slate-400 font-medium"
            />
          </div>
        </div>

        <!-- Password Field -->
        <div>
          <label
            class="text-[11px] font-bold uppercase tracking-widest text-brandGreen mb-2 ml-1 block"
            >Password</label
          >
          <div
            class="flex items-center gap-3 bg-white border border-slate-200 rounded-2xl px-5 py-4 focus-within:border-brandGreen focus-within:ring-4 focus-within:ring-brandGreen/5 transition-all"
          >
            <svg
              class="w-4 h-4 text-slate-400 shrink-0"
              fill="none"
              stroke="currentColor"
              stroke-width="2"
              viewBox="0 0 24 24"
            >
              <rect x="3" y="11" width="18" height="11" rx="2" />
              <path d="M7 11V7a5 5 0 0 1 10 0v4" />
            </svg>
            <input
              type="password"
              id="password"
              placeholder="Enter password"
              class="flex-1 text-sm bg-transparent outline-none text-slate-900 placeholder-slate-400 font-medium"
            />
            <button
              type="button"
              id="togglePasswordBtn"
              class="text-slate-400 hover:text-brandGreen transition-colors"
            >
              <svg
                id="eyeIcon"
                class="w-5 h-5"
                fill="none"
                stroke="currentColor"
                stroke-width="2"
                viewBox="0 0 24 24"
              >
                <path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z" />
                <circle cx="12" cy="12" r="3" />
              </svg>
            </button>
          </div>
          <div class="text-right mt-3">
            <a
              href="forgot-password.html"
              class="text-xs font-bold text-brandGold uppercase tracking-tight hover:text-brandGreen transition-colors"
              >Forgot password?</a
            >
          </div>
        </div>

        <!-- Action Button -->
        <button
          id="signInBtn"
          type="button"
          class="w-full py-4.5 bg-brandGold text-white rounded-2xl text-sm font-bold tracking-wide mt-4 transition-all duration-200 hover:bg-[#e8951c] hover:shadow-lg hover:shadow-brandGold/20 active:scale-95 py-4"
        >
          Sign In
        </button>

        <p class="text-center text-xs text-slate-500 mt-4">
          New to the community?
          <a
            href="signup.html"
            class="text-brandGreen font-bold hover:underline underline-offset-4 ml-1"
            >Create Account</a
          >
        </p>
      </div>
    </div>

    <script type="module">
      import {
        handleSignIn,
        redirectIfLoggedIn,
        togglePasswordVisibility,
      } from "../js/auth.js";

      redirectIfLoggedIn();

      const toggleBtn = document.getElementById("togglePasswordBtn");
      if (toggleBtn) {
        toggleBtn.addEventListener("click", () => {
          togglePasswordVisibility("password", "eyeIcon");
        });
      }

      const loginBtn = document.getElementById("signInBtn");
      if (loginBtn) {
        loginBtn.addEventListener("click", (e) => {
          e.preventDefault();
          handleSignIn();
        });
      }

      document.addEventListener("keypress", (e) => {
        if (e.key === "Enter") {
          e.preventDefault();
          handleSignIn();
        }
      });
    </script>
  </body>
</html>
