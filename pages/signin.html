<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Smart Ajo – Sign In</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Fraunces:wght@700;900&family=DM+Sans:wght@400;500;600&display=swap" rel="stylesheet" />
    <style>
      @keyframes fadeUp {
        from { opacity: 0; transform: translateY(20px); }
        to { opacity: 1; transform: translateY(0); }
      }
      .fade-up { animation: fadeUp 0.7s ease both; }
      .fade-up-2 { animation: fadeUp 0.7s ease 0.1s both; }
      .fade-up-3 { animation: fadeUp 0.7s ease 0.2s both; }
    </style>
  </head>
  <body class="bg-[#F5F4EF] min-h-screen max-w-[430px] mx-auto flex flex-col font-['DM_Sans']">
    <div class="flex flex-col flex-1 px-6 pt-14 pb-10">
      <!-- Logo Section -->
      <div class="flex items-center gap-3 mb-8 fade-up">
        <div class="w-10 h-10 bg-[#B0B5AC] rounded-lg flex items-center justify-center">
          <span class="font-['Fraunces'] text-sm font-black text-white">SA</span>
        </div>
        <span class="font-['Fraunces'] text-lg font-bold text-black">Smart Ajo</span>
      </div>

      <!-- Welcome Text -->
      <div class="mb-8 fade-up-2">
        <h1 class="font-['Fraunces'] text-3xl font-bold text-black leading-tight mb-2">
          Welcome back<br />to the Circle.
        </h1>
        <p class="text-sm text-[#6B6B6B]">
          Secure access to your community savings and financial heritage.
        </p>
      </div>

      <!-- Form Section -->
      <div class="flex flex-col gap-4 fade-up-3">
        <p id="authError" class="text-xs text-red-500 hidden bg-red-50 p-3 rounded-lg border border-red-100 mb-2"></p>

        <!-- Email Field -->
        <div>
          <label class="text-sm font-medium text-[#3A3A3A] mb-1.5 block">Email</label>
          <div class="flex items-center gap-2 bg-white border border-[#E0E0E0] rounded-xl px-4 py-3.5 focus-within:border-black transition-all">
            <svg class="w-4 h-4 text-[#9E9E9E] shrink-0" fill="none" stroke="currentColor" stroke-width="1.8" viewBox="0 0 24 24">
              <rect x="2" y="4" width="20" height="16" rx="2" />
              <path d="m2 7 10 7 10-7" />
            </svg>
            <input type="email" id="email" placeholder="example@gmail.com" class="flex-1 text-sm bg-transparent outline-none text-[#3A3A3A] placeholder-[#BDBDBD]" />
          </div>
        </div>

        <!-- Password Field -->
        <div>
          <label class="text-sm font-medium text-[#3A3A3A] mb-1.5 block">Password</label>
          <div class="flex items-center gap-2 bg-white border border-[#E0E0E0] rounded-xl px-4 py-3.5 focus-within:border-black transition-all">
            <svg class="w-4 h-4 text-[#9E9E9E] shrink-0" fill="none" stroke="currentColor" stroke-width="1.8" viewBox="0 0 24 24">
              <rect x="3" y="11" width="18" height="11" rx="2" />
              <path d="M7 11V7a5 5 0 0 1 10 0v4" />
            </svg>
            <input type="password" id="password" placeholder="Enter password" class="flex-1 text-sm bg-transparent outline-none text-[#3A3A3A] placeholder-[#BDBDBD]" />
            <button type="button" id="togglePasswordBtn" class="text-[#9E9E9E] hover:text-black transition-colors">
              <svg id="eyeIcon" class="w-4 h-4" fill="none" stroke="currentColor" stroke-width="1.8" viewBox="0 0 24 24">
                <path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z" />
                <circle cx="12" cy="12" r="3" />
              </svg>
            </button>
          </div>
          <div class="text-right mt-2">
            <a href="forgot-password.html" class="text-xs text-[#6B6B6B] hover:text-black transition-colors">Forgot password?</a>
          </div>
        </div>

        <!-- Action Button -->
        <button id="signInBtn" type="button" class="w-full py-4 bg-[#3A3A3A] text-white rounded-full text-sm font-semibold tracking-wide mt-2 transition-all duration-200 hover:bg-black active:scale-95 shadow-md">
          Sign In
        </button>

        <p class="text-center text-xs text-[#6B6B6B] mt-1">
          New to the community?
          <a href="signup.html" class="text-black font-semibold underline underline-offset-2">Sign Up</a>
        </p>
      </div>
    </div>

    <script type="module">
      // Consolidating all auth logic into one script block
      import { handleSignIn, redirectIfLoggedIn, togglePasswordVisibility } from "../js/auth.js";

      // 1. Guard: Check if already logged in
      redirectIfLoggedIn();

      // 2. Password Toggle logic (using Event Listener instead of inline onclick)
      const toggleBtn = document.getElementById("togglePasswordBtn");
      if (toggleBtn) {
        toggleBtn.addEventListener("click", () => {
          togglePasswordVisibility("password", "eyeIcon");
        });
      }

      // 3. Sign In Logic
      const loginBtn = document.getElementById("signInBtn");
      if (loginBtn) {
        loginBtn.addEventListener("click", (e) => {
          e.preventDefault();
          handleSignIn(); // Ensure this matches the exported function in auth.js
        });
      }

      // 4. Keyboard support
      document.addEventListener("keypress", (e) => {
        if (e.key === "Enter") {
          e.preventDefault();
          handleSignIn();
        }
      });
    </script>
  </body>
</html>
