<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Smart Ajo – Notifications</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link
      href="https://fonts.googleapis.com/css2?family=Fraunces:wght@700;900&family=DM+Sans:wght@400;500;600&display=swap"
      rel="stylesheet"
    />
    <style>
      @keyframes fadeUp {
        from {
          opacity: 0;
          transform: translateY(16px);
        }
        to {
          opacity: 1;
          transform: translateY(0);
        }
      }
      .fade-up {
        animation: fadeUp 0.5s ease both;
      }
      .fade-up-2 {
        animation: fadeUp 0.5s ease 0.1s both;
      }
      .fade-up-3 {
        animation: fadeUp 0.5s ease 0.15s both;
      }
      body {
        padding-bottom: 90px;
      }

      .notif-card {
        display: none;
      }
      .notif-card.visible {
        display: flex;
        animation: fadeUp 0.4s ease both;
      }

      .chip {
        transition: all 0.2s ease;
      }
      /* Updated Active Chip to Green */
      .chip.active {
        background: #1b5e3b;
        color: white;
        border: 1px solid #1b5e3b;
        box-shadow: 0 4px 12px rgba(27, 94, 59, 0.2);
      }
      .chip.inactive {
        background: white;
        color: #9e9e9e;
        border: 1px solid #e0e0e0;
      }

      .scrollbar-hide::-webkit-scrollbar {
        display: none;
      }
      .scrollbar-hide {
        -ms-overflow-style: none;
        scrollbar-width: none;
      }
    </style>
  </head>
  <body
    class="bg-[#F5F4EF] min-h-screen max-w-[430px] mx-auto font-['DM_Sans']"
  >
    <div class="px-5 pt-10">
      <div class="flex items-center justify-between mb-6 fade-up">
        <h1 class="font-['Fraunces'] text-2xl font-bold text-[#1A1A1A]">
          Notifications
        </h1>
        <span
          id="alertCount"
          class="bg-[#F2A83B] text-white text-[11px] font-black uppercase tracking-wider px-3 py-1.5 rounded-full shadow-sm"
          >…</span
        >
      </div>

      <div
        class="flex gap-2 mb-6 overflow-x-auto pb-1 fade-up-2 scrollbar-hide"
      >
        <button
          onclick="filterNotifs('all')"
          id="chip-all"
          class="chip active shrink-0 text-xs font-bold px-5 py-2.5 rounded-full"
        >
          All
        </button>
        <button
          onclick="filterNotifs('payment')"
          id="chip-payment"
          class="chip inactive shrink-0 text-xs font-bold px-5 py-2.5 rounded-full"
        >
          Payments
        </button>
        <button
          onclick="filterNotifs('risk')"
          id="chip-risk"
          class="chip inactive shrink-0 text-xs font-bold px-5 py-2.5 rounded-full"
        >
          Risk Alerts
        </button>
        <button
          onclick="filterNotifs('payout')"
          id="chip-payout"
          class="chip inactive shrink-0 text-xs font-bold px-5 py-2.5 rounded-full"
        >
          Payouts
        </button>
      </div>

      <div id="notif-list" class="flex flex-col gap-3 fade-up-3">
        <div
          class="h-24 bg-white rounded-2xl animate-pulse border border-white"
        ></div>
        <div
          class="h-24 bg-white rounded-2xl animate-pulse opacity-60 border border-white"
        ></div>
        <div
          class="h-20 bg-white rounded-2xl animate-pulse opacity-30 border border-white"
        ></div>
      </div>
    </div>

    <div
      class="fixed bottom-0 left-1/2 -translate-x-1/2 w-full max-w-[430px] bg-white border-t border-[#F0F0F0] px-6 py-3 flex items-center justify-between z-50"
    >
      <button
        onclick="window.location.href = 'dashboard.html'"
        class="flex flex-col items-center gap-1 text-[#9E9E9E]"
      >
        <svg
          class="w-5 h-5"
          fill="none"
          stroke="currentColor"
          stroke-width="1.8"
          viewBox="0 0 24 24"
        >
          <path d="M3 12L12 3l9 9" />
          <path d="M9 21V12h6v9" />
        </svg>
        <span class="text-[10px] font-medium">Home</span>
      </button>
      <button
        onclick="window.location.href = 'groups.html'"
        class="flex flex-col items-center gap-1 text-[#9E9E9E]"
      >
        <svg
          class="w-5 h-5"
          fill="none"
          stroke="currentColor"
          stroke-width="1.8"
          viewBox="0 0 24 24"
        >
          <path d="M17 21v-2a4 4 0 0 0-4-4H5a4 4 0 0 0-4 4v2" />
          <circle cx="9" cy="7" r="4" />
        </svg>
        <span class="text-[10px] font-medium">Groups</span>
      </button>
      <button
        onclick="window.location.href = 'make-payment.html'"
        class="w-14 h-14 bg-[#1B5E3B] rounded-full flex items-center justify-center -mt-8 shadow-xl shadow-green-900/30 active:scale-95 transition-all"
      >
        <svg
          class="w-6 h-6 text-white"
          fill="none"
          stroke="currentColor"
          stroke-width="2.5"
          viewBox="0 0 24 24"
        >
          <path d="M12 5v14M5 12h14" />
        </svg>
      </button>
      <button class="flex flex-col items-center gap-1 text-[#1B5E3B]">
        <svg class="w-5 h-5" fill="currentColor" viewBox="0 0 24 24">
          <path d="M18 8A6 6 0 0 0 6 8c0 7-3 9-3 9h18s-3-2-3-9" />
          <path d="M13.73 21a2 2 0 0 1-3.46 0" />
        </svg>
        <span class="text-[10px] font-bold">Alerts</span>
      </button>
      <button
        onclick="window.location.href = 'profile.html'"
        class="flex flex-col items-center gap-1 text-[#9E9E9E]"
      >
        <svg
          class="w-5 h-5"
          fill="none"
          stroke="currentColor"
          stroke-width="1.8"
          viewBox="0 0 24 24"
        >
          <circle cx="12" cy="7" r="4" />
          <path d="M5.5 20a7 7 0 0 1 13 0" />
        </svg>
        <span class="text-[10px] font-medium">Profile</span>
      </button>
    </div>

    <script type="module">
      import {
        initAlertsPage,
        filterAlerts,
        handleAlertRead,
        fundWallet,
        viewRiskOptions,
        viewReceipt,
      } from "../js/alerts.js";

      // WRAPPER: This ensures when you click a filter, it stays brand green
      window.filterNotifs = (type) => {
        // 1. Run the original backend logic
        filterAlerts(type);

        // 2. Immediate UI correction to keep it Deep Green (#1B5E3B)
        const allChips = document.querySelectorAll(".chip");
        allChips.forEach((chip) => {
          // Reset all to inactive style
          chip.classList.remove("active");
          chip.classList.add("inactive");
        });

        // 3. Set the clicked one to Brand Green
        const activeChip = document.getElementById(`chip-${type}`);
        if (activeChip) {
          activeChip.classList.remove("inactive");
          activeChip.classList.add("active");
        }
      };

      // Keep other functions exposed as they were
      window.handleAlertRead = handleAlertRead;
      window.fundWallet = fundWallet;
      window.viewRiskOptions = viewRiskOptions;
      window.viewReceipt = viewReceipt;

      // Initialize page
      initAlertsPage();
    </script>
  </body>
</html>
