<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Smart Ajo – Success</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <link href="https://fonts.googleapis.com/css2?family=Fraunces:wght@700;900&family=DM+Sans:wght@400;500;600&display=swap" rel="stylesheet"/>
  <style>
    @keyframes fadeUp {
      from { opacity: 0; transform: translateY(24px); }
      to   { opacity: 1; transform: translateY(0); }
    }
    @keyframes scaleIn {
      from { opacity: 0; transform: scale(0.7); }
      to   { opacity: 1; transform: scale(1); }
    }
    .fade-up { animation: fadeUp 0.7s ease 0.2s both; }
    .scale-in { animation: scaleIn 0.6s cubic-bezier(0.34,1.56,0.64,1) both; }
  </style>
</head>
<body class="bg-[#F5F4EF] min-h-screen max-w-[430px] mx-auto flex flex-col items-center justify-center font-['DM_Sans'] px-6">

  <div class="flex flex-col items-center text-center gap-5">

    <!-- Success illustration circle -->
    <div class="scale-in w-36 h-36 bg-[#B0B5AC] rounded-full flex items-center justify-center mb-2">
      <svg class="w-16 h-16 text-white" fill="none" stroke="currentColor" stroke-width="1.5" viewBox="0 0 24 24">
        <path stroke-linecap="round" stroke-linejoin="round" d="M5 13l4 4L19 7"/>
      </svg>
    </div>

    <!-- Text -->
    <div class="fade-up">
      <h1 class="font-['Fraunces'] text-3xl font-bold text-black mb-2">Successful!</h1>
      <p class="text-sm text-[#6B6B6B] leading-relaxed max-w-[240px] mx-auto">
        Congratulations, you've successfully reset your password.
      </p>
      <p class="text-xs text-[#9E9E9E] mt-3 animate-pulse">Redirecting to login...</p>
    </div>

  </div>

  <script>
    setTimeout(() => {
      window.location.href = 'signin.html';
    }, 3000);
  </script>
</body>
</html>
