<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Smart Ajo – Verify Account</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link
      href="https://fonts.googleapis.com/css2?family=Fraunces:wght@700;900&family=DM+Sans:wght@400;500;600&display=swap"
      rel="stylesheet"
    />
    <style>
      @keyframes fadeUp {
        from {
          opacity: 0;
          transform: translateY(20px);
        }
        to {
          opacity: 1;
          transform: translateY(0);
        }
      }
      .fade-up {
        animation: fadeUp 0.7s ease both;
      }
      .otp-input {
        transition: all 0.2s ease-in-out;
      }
      .otp-input:focus {
        transform: translateY(-2px);
        box-shadow: 0 4px 12px rgba(27, 94, 59, 0.15);
      }
      .spinner {
        border: 2px solid rgba(255, 255, 255, 0.3);
        border-radius: 50%;
        border-top: 2px solid #fff;
        width: 18px;
        height: 18px;
        animation: spin 0.8s linear infinite;
      }
      @keyframes spin {
        0% {
          transform: rotate(0deg);
        }
        100% {
          transform: rotate(360deg);
        }
      }
    </style>
  </head>
  <body
    class="bg-[#F5F4EF] min-h-screen max-w-[430px] mx-auto flex flex-col font-['DM_Sans']"
  >
    <div class="flex flex-col flex-1 px-6 pt-10 pb-10 fade-up">
      <div class="flex gap-1.5 mb-8">
        <div class="h-1 flex-1 bg-[#1B5E3B] rounded-full"></div>
        <div class="h-1 flex-1 bg-[#1B5E3B] rounded-full"></div>
        <div class="h-1 flex-1 bg-[#E0E0E0] rounded-full"></div>
      </div>

      <div
        class="w-14 h-14 bg-[#1B5E3B] rounded-2xl flex items-center justify-center mb-6 shadow-xl shadow-green-900/20"
      >
        <svg
          class="w-7 h-7 text-white"
          fill="none"
          stroke="currentColor"
          stroke-width="1.8"
          viewBox="0 0 24 24"
        >
          <rect x="2" y="4" width="20" height="16" rx="2" />
          <path d="m2 7 10 7 10-7" />
        </svg>
      </div>

      <h1 class="font-['Fraunces'] text-3xl font-black text-black mb-2">
        Verify Your Account
      </h1>
      <p class="text-sm text-[#6B6B6B] mb-2 leading-relaxed">
        We've sent a 6-digit code to
        <span id="displayEmail" class="text-[#1B5E3B] font-bold"
          >loading...</span
        >
      </p>
      <p
        class="text-xs text-[#6B6B6B] mb-8 uppercase tracking-widest font-bold"
      >
        Wrong email?
        <button
          onclick="window.history.back()"
          class="text-[#1B5E3B] underline underline-offset-4"
        >
          Change it
        </button>
      </p>

      <div class="mb-3">
        <label
          class="text-[11px] font-black text-[#1B5E3B] uppercase tracking-[0.1em] mb-4 block"
        >
          Resend code in: <span id="timer" class="text-black">01:23</span>
        </label>

        <div class="flex gap-2 justify-between" id="otp-container">
          <input
            type="text"
            maxlength="1"
            inputmode="numeric"
            class="otp-input w-[52px] h-14 text-center text-xl font-bold bg-white border border-[#E0E0E0] rounded-2xl outline-none focus:border-[#1B5E3B] text-[#1B5E3B] shadow-sm"
          />
          <input
            type="text"
            maxlength="1"
            inputmode="numeric"
            class="otp-input w-[52px] h-14 text-center text-xl font-bold bg-white border border-[#E0E0E0] rounded-2xl outline-none focus:border-[#1B5E3B] text-[#1B5E3B] shadow-sm"
          />
          <input
            type="text"
            maxlength="1"
            inputmode="numeric"
            class="otp-input w-[52px] h-14 text-center text-xl font-bold bg-white border border-[#E0E0E0] rounded-2xl outline-none focus:border-[#1B5E3B] text-[#1B5E3B] shadow-sm"
          />
          <input
            type="text"
            maxlength="1"
            inputmode="numeric"
            class="otp-input w-[52px] h-14 text-center text-xl font-bold bg-white border border-[#E0E0E0] rounded-2xl outline-none focus:border-[#1B5E3B] text-[#1B5E3B] shadow-sm"
          />
          <input
            type="text"
            maxlength="1"
            inputmode="numeric"
            class="otp-input w-[52px] h-14 text-center text-xl font-bold bg-white border border-[#E0E0E0] rounded-2xl outline-none focus:border-[#1B5E3B] text-[#1B5E3B] shadow-sm"
          />
          <input
            type="text"
            maxlength="1"
            inputmode="numeric"
            class="otp-input w-[52px] h-14 text-center text-xl font-bold bg-white border border-[#E0E0E0] rounded-2xl outline-none focus:border-[#1B5E3B] text-[#1B5E3B] shadow-sm"
          />
        </div>
      </div>

      <p
        id="authError"
        class="text-red-500 text-xs mt-2 mb-4 hidden text-center font-bold uppercase tracking-tighter"
      ></p>
      <p
        class="text-xs font-bold text-[#6B6B6B] mb-8 uppercase tracking-widest"
      >
        Didn't get the code?
        <button
          id="resendBtn"
          disabled
          class="text-gray-400 underline underline-offset-4 disabled:opacity-50"
        >
          Resend
        </button>
      </p>

      <button
        id="verifyBtn"
        class="w-full py-5 bg-[#1B5E3B] text-white rounded-full text-sm font-black uppercase tracking-[0.2em] transition-all duration-300 hover:brightness-110 active:scale-[0.98] shadow-lg shadow-green-900/20 flex items-center justify-center gap-3"
      >
        <span id="btnText">Verify & Continue</span>
        <div id="btnLoader" class="spinner hidden"></div>
      </button>
    </div>

    <script type="module">
      import { handleVerifySignup, handleResendOTP } from "../js/auth.js";

      const otpInputs = document.querySelectorAll(".otp-input");
      const timerEl = document.getElementById("timer");
      const resendBtn = document.getElementById("resendBtn");
      const verifyBtn = document.getElementById("verifyBtn");
      const emailDisplay = document.getElementById("displayEmail");

      const pendingEmail = localStorage.getItem("ajo_pending_email");
      if (pendingEmail) {
        emailDisplay.textContent = pendingEmail;
      } else {
        emailDisplay.textContent = "your registered email";
        console.warn("No pending email found in localStorage");
      }

      otpInputs.forEach((input, index) => {
        input.addEventListener("keyup", (e) => {
          const val = e.target.value;
          if (val.match(/^[0-9]$/)) {
            if (index < otpInputs.length - 1) {
              otpInputs[index + 1].focus();
            }
          }
        });

        input.addEventListener("keydown", (e) => {
          if (e.key === "Backspace") {
            if (!input.value && index > 0) {
              otpInputs[index - 1].focus();
            }
          }
        });

        input.addEventListener("paste", (e) => {
          const pasteData = e.clipboardData.getData("text").trim();
          if (pasteData.length === 6 && /^\d+$/.test(pasteData)) {
            const digits = pasteData.split("");
            otpInputs.forEach((inp, i) => {
              inp.value = digits[i];
            });
            otpInputs[5].focus();
            e.preventDefault();
          }
        });
      });

      verifyBtn.addEventListener("click", (e) => {
        e.preventDefault();
        handleVerifySignup();
      });

      resendBtn.addEventListener("click", async (e) => {
        e.preventDefault();
        try {
          await handleResendOTP();
          resetTimer();
        } catch (err) {
          console.error("Resend failed", err);
        }
      });

      let countdown;
      function resetTimer() {
        let seconds = 60;
        resendBtn.disabled = true;
        resendBtn.classList.remove("text-[#1B5E3B]");
        resendBtn.classList.add("text-gray-400");

        if (countdown) clearInterval(countdown);

        countdown = setInterval(() => {
          seconds--;
          if (seconds <= 0) {
            clearInterval(countdown);
            timerEl.textContent = "00:00";
            resendBtn.disabled = false;
            resendBtn.classList.remove("text-gray-400");
            resendBtn.classList.add("text-[#1B5E3B]");
            return;
          }
          const m = Math.floor(seconds / 60);
          const s = seconds % 60;
          timerEl.textContent = `${m.toString().padStart(2, "0")}:${s.toString().padStart(2, "0")}`;
        }, 1000);
      }

      resetTimer();
    </script>
  </body>
</html>
