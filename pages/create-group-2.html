<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Smart Ajo – Create Group Step 2</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link
      href="https://fonts.googleapis.com/css2?family=Fraunces:wght@700;900&family=DM+Sans:wght@400;500;600&display=swap"
      rel="stylesheet"
    />
    <style>
      @keyframes fadeUp {
        from {
          opacity: 0;
          transform: translateY(16px);
        }
        to {
          opacity: 1;
          transform: translateY(0);
        }
      }
      .fade-up {
        animation: fadeUp 0.5s ease both;
      }
      body {
        padding-bottom: 90px;
      }

      /* Custom smooth transition for the pill buttons */
      .freq-btn {
        transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
      }
    </style>
  </head>
  <body
    class="bg-[#F5F4EF] min-h-screen max-w-[430px] mx-auto font-['DM_Sans']"
  >
    <div class="px-5 pt-10 fade-up">
      <div class="flex items-center gap-3 mb-6">
        <button
          onclick="history.back()"
          class="w-9 h-9 flex items-center justify-center rounded-full bg-white border border-[#E0E0E0] active:scale-90 transition-transform"
        >
          <svg
            class="w-4 h-4 text-[#3A3A3A]"
            fill="none"
            stroke="currentColor"
            stroke-width="2"
            viewBox="0 0 24 24"
          >
            <path d="M15 18l-6-6 6-6" />
          </svg>
        </button>
        <h1 class="font-['Fraunces'] text-xl font-bold text-[#1A1A1A]">
          Create Group
        </h1>
      </div>

      <div class="flex items-center gap-2 mb-8 px-2">
        <div
          class="w-8 h-8 bg-[#3A3A3A] rounded-full flex items-center justify-center shadow-sm"
        >
          <svg
            class="w-4 h-4 text-white"
            fill="none"
            stroke="currentColor"
            stroke-width="2.5"
            viewBox="0 0 24 24"
          >
            <path d="M5 13l4 4L19 7" />
          </svg>
        </div>
        <div class="flex-1 h-0.5 bg-[#3A3A3A]"></div>
        <div
          class="w-8 h-8 bg-[#3A3A3A] rounded-full flex items-center justify-center shadow-sm"
        >
          <span class="text-white text-xs font-bold">2</span>
        </div>
        <div class="flex-1 h-0.5 bg-[#E0E0E0]"></div>
        <div
          class="w-8 h-8 bg-[#E0E0E0] rounded-full flex items-center justify-center"
        >
          <span class="text-[#9E9E9E] text-xs font-bold">3</span>
        </div>
      </div>

      <h2 class="font-['Fraunces'] text-2xl font-bold text-[#1A1A1A] mb-1">
        Contribution Setup
      </h2>
      <p class="text-sm text-[#6B6B6B] mb-7">
        Set the savings amount and frequency.
      </p>

      <p
        id="setupError"
        class="text-xs text-red-500 mb-4 hidden bg-red-50 p-3 rounded-xl border border-red-100 text-center"
      ></p>

      <div class="flex flex-col gap-6">
        <div>
          <label class="text-sm font-medium text-[#3A3A3A] mb-2 block"
            >Contribution Amount</label
          >
          <div
            class="flex items-center gap-2 bg-white border border-[#E0E0E0] rounded-2xl px-4 py-4 focus-within:border-[#3A3A3A] transition-colors shadow-sm"
          >
            <span class="text-sm font-bold text-[#3A3A3A]">₦</span>
            <input
              type="number"
              id="amount"
              placeholder="25000"
              class="flex-1 text-sm bg-transparent outline-none text-[#3A3A3A] placeholder-[#BDBDBD] font-medium"
            />
          </div>
        </div>

        <div>
          <label class="text-sm font-medium text-[#3A3A3A] mb-2 block"
            >Payment Frequency</label
          >
          <div
            class="bg-white rounded-[24px] p-1.5 grid grid-cols-2 gap-1.5 border border-[#E0E0E0] shadow-sm"
          >
            <button
              id="freq-daily"
              onclick="setFreq('daily')"
              class="freq-btn py-3.5 rounded-full text-[13px] font-medium text-[#9E9E9E]"
            >
              Daily
            </button>
            <button
              id="freq-weekly"
              onclick="setFreq('weekly')"
              class="freq-btn py-3.5 rounded-full text-[13px] font-medium text-[#9E9E9E]"
            >
              Weekly
            </button>
            <button
              id="freq-biweekly"
              onclick="setFreq('biweekly')"
              class="freq-btn py-3.5 rounded-full text-[13px] font-semibold bg-[#3A3A3A] text-white shadow-md"
            >
              Bi-weekly
            </button>
            <button
              id="freq-monthly"
              onclick="setFreq('monthly')"
              class="freq-btn py-3.5 rounded-full text-[13px] font-medium text-[#9E9E9E]"
            >
              Monthly
            </button>
          </div>
        </div>

        <div>
          <label class="text-sm font-medium text-[#3A3A3A] mb-2 block"
            >Maximum Members</label
          >
          <div
            class="bg-white border border-[#E0E0E0] rounded-2xl px-4 py-4 focus-within:border-[#3A3A3A] transition-colors shadow-sm"
          >
            <input
              type="number"
              id="maxMembers"
              placeholder="e.g. 12"
              class="w-full text-sm bg-transparent outline-none text-[#3A3A3A] placeholder-[#BDBDBD] font-medium"
            />
          </div>
        </div>

        <div>
          <label class="text-sm font-medium text-[#3A3A3A] mb-2 block">Start Date</label>
          <div class="bg-white border border-[#E0E0E0] rounded-2xl px-4 py-4 focus-within:border-[#3A3A3A] transition-colors shadow-sm">
            <input
              type="date"
              id="startDate"
              class="w-full text-sm bg-transparent outline-none text-[#3A3A3A] font-medium"
            />
          </div>
        </div>

        <div>
          <label class="text-sm font-medium text-[#3A3A3A] mb-2 block">
            Duration <span id="durationUnitLabel" class="text-[#9E9E9E] font-normal">(months)</span>
          </label>
          <div class="bg-white border border-[#E0E0E0] rounded-2xl px-4 py-4 focus-within:border-[#3A3A3A] transition-colors shadow-sm">
            <input
              type="number"
              id="duration"
              placeholder="e.g. 6"
              min="1"
              class="w-full text-sm bg-transparent outline-none text-[#3A3A3A] placeholder-[#BDBDBD] font-medium"
            />
          </div>
          <!-- Live preview -->
          <div id="durationPreview" class="hidden mt-3 bg-[#3A3A3A] rounded-2xl px-4 py-3 flex items-center justify-between">
            <div>
              <p class="text-white text-xs font-semibold" id="previewRounds">— rounds</p>
              <p class="text-[#9E9E9E] text-[10px] mt-0.5" id="previewEndDate">Ends —</p>
            </div>
            <svg class="w-5 h-5 text-[#9E9E9E]" fill="none" stroke="currentColor" stroke-width="1.8" viewBox="0 0 24 24">
              <rect x="3" y="4" width="18" height="18" rx="2"/><path d="M16 2v4M8 2v4M3 10h18"/>
            </svg>
          </div>
        </div>
      </div>

      <button
        id="step2Btn"
        class="w-full py-5 bg-[#3A3A3A] text-white rounded-full text-base font-bold tracking-wide mt-10 transition-all duration-300 hover:bg-black active:scale-[0.98] shadow-lg flex items-center justify-center gap-2"
      >
        Continue
        <svg
          class="w-5 h-5"
          fill="none"
          stroke="currentColor"
          stroke-width="2.5"
          viewBox="0 0 24 24"
        >
          <path d="M9 18l6-6-6-6" />
        </svg>
      </button>
    </div>

    <script>
      let selectedFrequency = "biweekly";

      // Unit label and multiplier per frequency
      const freqMeta = {
        daily:     { label: "days",             msPerPeriod: 86400000 },
        weekly:    { label: "weeks",             msPerPeriod: 7 * 86400000 },
        biweekly:  { label: "bi-weekly periods", msPerPeriod: 14 * 86400000 },
        monthly:   { label: "months",            msPerPeriod: null }, // handled specially
      };

      function setFreq(val) {
        selectedFrequency = val;
        document.querySelectorAll('button[id^="freq-"]').forEach((btn) => {
          if (btn.id === `freq-${val}`) {
            btn.classList.add("bg-[#3A3A3A]", "text-white", "font-semibold", "shadow-md");
            btn.classList.remove("text-[#9E9E9E]", "font-medium");
          } else {
            btn.classList.remove("bg-[#3A3A3A]", "text-white", "font-semibold", "shadow-md");
            btn.classList.add("text-[#9E9E9E]", "font-medium");
          }
        });
        document.getElementById("durationUnitLabel").textContent = `(${freqMeta[val].label})`;
        updatePreview();
      }

      function updatePreview() {
        const startVal  = document.getElementById("startDate").value;
        const durVal    = parseInt(document.getElementById("duration").value);
        const preview   = document.getElementById("durationPreview");

        if (!startVal || !durVal || durVal < 1) { preview.classList.add("hidden"); return; }

        const start = new Date(startVal);
        let end;

        if (selectedFrequency === "monthly") {
          end = new Date(start);
          end.setMonth(end.getMonth() + durVal);
        } else {
          end = new Date(start.getTime() + durVal * freqMeta[selectedFrequency].msPerPeriod);
        }

        const endLabel = end.toLocaleDateString("en-NG", { month: "long", year: "numeric" });
        document.getElementById("previewRounds").textContent  = `${durVal} rotation${durVal !== 1 ? "s" : ""}`;
        document.getElementById("previewEndDate").textContent = `Ends ${endLabel}`;
        preview.classList.remove("hidden");
      }

      document.getElementById("startDate").addEventListener("change", updatePreview);
      document.getElementById("duration").addEventListener("input", updatePreview);

      // Set min date to today
      document.getElementById("startDate").min = new Date().toISOString().split("T")[0];

      document.getElementById("step2Btn").addEventListener("click", () => {
        const amount     = document.getElementById("amount").value;
        const maxMembers = document.getElementById("maxMembers").value;
        const startDate  = document.getElementById("startDate").value;
        const duration   = document.getElementById("duration").value;
        const errorEl    = document.getElementById("setupError");

        if (!amount || !maxMembers || !startDate || !duration) {
          errorEl.textContent = "Please fill in all fields including start date and duration.";
          errorEl.classList.remove("hidden");
          return;
        }

        errorEl.classList.add("hidden");

        localStorage.setItem("group_step_2", JSON.stringify({
          contribution_amount: parseFloat(amount),
          frequency: selectedFrequency,
          max_members: parseInt(maxMembers),
          start_date: startDate,
          duration: parseInt(duration),
        }));

        window.location.href = "create-group-3.html";
      });
    </script>
  </body>
</html>
