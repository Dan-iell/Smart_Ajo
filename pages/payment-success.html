<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/><meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Smart Ajo – Payment Successful</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <link href="https://fonts.googleapis.com/css2?family=Fraunces:wght@700;900&family=DM+Sans:wght@400;500;600&display=swap" rel="stylesheet"/>
  <style>
    @keyframes fadeUp{from{opacity:0;transform:translateY(20px);}to{opacity:1;transform:translateY(0);}}
    @keyframes scaleIn{from{opacity:0;transform:scale(0.6);}to{opacity:1;transform:scale(1);}}
    @keyframes growBar{from{width:0;}to{width:var(--w);}}
    .scale-in{animation:scaleIn 0.6s cubic-bezier(0.34,1.56,0.64,1) both;}
    .fade-up{animation:fadeUp 0.6s ease 0.3s both;}
    .bar{animation:growBar 1s ease 0.6s both;}
    body{padding-bottom:90px;}
  </style>
</head>
<body class="bg-[#F5F4EF] min-h-screen max-w-[430px] mx-auto flex flex-col font-['DM_Sans']">

  <div class="flex flex-col flex-1 px-5 pt-14 pb-10 items-center">

    <div class="scale-in w-24 h-24 bg-[#1B5E3B] rounded-[32px] flex items-center justify-center mb-6 shadow-xl shadow-green-900/20 rotate-3">
      <svg class="w-12 h-12 text-white -rotate-3" fill="none" stroke="currentColor" stroke-width="3" viewBox="0 0 24 24">
        <path stroke-linecap="round" stroke-linejoin="round" d="M5 13l4 4L19 7"/>
      </svg>
    </div>

    <div class="fade-up w-full">

      <div class="text-center mb-8">
        <h1 class="font-['Fraunces'] text-3xl font-black text-[#1A1A1A] mb-1">Payment Successful</h1>
        <p class="text-sm font-medium text-[#9E9E9E]">Your contribution has been recorded</p>
      </div>

      <div class="bg-white rounded-[32px] overflow-hidden mb-6 shadow-sm border border-white">
        <div class="divide-y divide-[#F5F5F5]">
          <div class="flex items-center justify-between px-6 py-5">
            <span class="text-sm text-[#9E9E9E] font-medium">Amount Paid</span>
            <span id="finalAmount" class="text-base font-black text-[#1B5E3B]">₦ 0.00</span>
          </div>
          <div class="flex items-center justify-between px-6 py-5">
            <span class="text-sm text-[#9E9E9E] font-medium">Group</span>
            <span id="finalGroup" class="text-sm font-bold text-[#1A1A1A]">--</span>
          </div>
          <div class="flex items-center justify-between px-6 py-5">
            <span class="text-sm text-[#9E9E9E] font-medium">Reference</span>
            <span id="finalRef" class="text-[10px] font-bold text-[#1A1A1A] font-mono tracking-tighter bg-[#F5F4EF] px-2 py-1 rounded">--</span>
          </div>
        </div>

        <div class="px-6 py-5 border-t border-[#F5F5F5] bg-[#F5F4EF]/20">
          <div class="flex items-center justify-between mb-3">
            <span class="text-[11px] font-black uppercase tracking-wider text-[#9E9E9E]">Your Progress</span>
            <span class="text-[11px] font-black text-[#F2A83B] uppercase">Updating...</span>
          </div>
          <div class="h-2 bg-[#E0E0E0] rounded-full overflow-hidden">
            <div class="bar h-full bg-[#F2A83B] rounded-full" style="--w:100%; width:100%"></div>
          </div>
        </div>
      </div>

      <div class="flex flex-col gap-3">
        <button onclick="window.location.href='dashboard.html'"
          class="w-full py-5 bg-[#1B5E3B] text-white rounded-3xl text-sm font-black tracking-widest uppercase
                 transition-all duration-300 shadow-lg shadow-green-900/20 active:scale-95">
          Back to Dashboard
        </button>
        <button onclick="window.location.href='groups.html'"
          class="w-full py-5 bg-white border border-[#E0E0E0] text-[#1B5E3B] rounded-3xl text-sm font-black tracking-widest uppercase
                 transition-all duration-300 active:scale-95">
          View All Groups
        </button>
      </div>

    </div>
  </div>

  <div class="fixed bottom-0 left-1/2 -translate-x-1/2 w-full max-w-[430px] bg-white border-t border-[#F0F0F0] px-6 py-3 flex items-center justify-between z-50">
    <button onclick="window.location.href='dashboard.html'" class="flex flex-col items-center gap-1 text-[#1B5E3B]"><svg class="w-5 h-5" fill="currentColor" viewBox="0 0 24 24"><path d="M10 20v-6h4v6h5v-8h3L12 3 2 12h3v8z"/></svg><span class="text-[10px] font-bold">Home</span></button>
    <button onclick="window.location.href='groups.html'" class="flex flex-col items-center gap-1 text-[#9E9E9E]"><svg class="w-5 h-5" fill="none" stroke="currentColor" stroke-width="1.8" viewBox="0 0 24 24"><path d="M17 21v-2a4 4 0 0 0-4-4H5a4 4 0 0 0-4 4v2"/><circle cx="9" cy="7" r="4"/></svg><span class="text-[10px]">Groups</span></button>
    <button onclick="window.location.href='make-payment.html'" class="w-14 h-14 bg-[#F2A83B] rounded-full flex items-center justify-center -mt-8 shadow-xl shadow-orange-900/30 active:scale-95 transition-all"><svg class="w-6 h-6 text-white" fill="none" stroke="currentColor" stroke-width="2.5" viewBox="0 0 24 24"><path d="M12 5v14M5 12h14"/></svg></button>
    <button onclick="window.location.href='alerts.html'" class="flex flex-col items-center gap-1 text-[#9E9E9E]"><svg class="w-5 h-5" fill="none" stroke="currentColor" stroke-width="1.8" viewBox="0 0 24 24"><path d="M18 8A6 6 0 0 0 6 8c0 7-3 9-3 9h18s-3-2-3-9"/><path d="M13.73 21a2 2 0 0 1-3.46 0"/></svg><span class="text-[10px]">Alerts</span></button>
    <button onclick="window.location.href='profile.html'" class="flex flex-col items-center gap-1 text-[#9E9E9E]">
      <svg class="w-5 h-5" fill="none" stroke="currentColor" stroke-width="1.8" viewBox="0 0 24 24"><circle cx="12" cy="7" r="4"/><path d="M5.5 20a7 7 0 0 1 13 0"/></svg>
      <span class="text-[10px]">Profile</span>
    </button>
  </div>

  <script type="module">
    // Extract data from URL params (passed from confirm-payment)
    window.onload = () => {
      const params = new URLSearchParams(window.location.search);
      const amount = params.get('amount') || "0";
      const group = params.get('groupName') || "N/A";
      
      // Update UI
      document.getElementById('finalAmount').textContent = `₦ ${Number(amount).toLocaleString()}`;
      document.getElementById('finalGroup').textContent = group;
      
      // Generate a fake but realistic Transaction ID
      const randRef = 'SA-' + Math.random().toString(36).substr(2, 9).toUpperCase();
      document.getElementById('finalRef').textContent = randRef;
    };
  </script>

</body>
</html>3
