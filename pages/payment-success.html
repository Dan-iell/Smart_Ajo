<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/><meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Smart Ajo – Payment Successful</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <link href="https://fonts.googleapis.com/css2?family=Fraunces:wght@700;900&family=DM+Sans:wght@400;500;600&display=swap" rel="stylesheet"/>
  <style>
    @keyframes fadeUp{from{opacity:0;transform:translateY(20px);}to{opacity:1;transform:translateY(0);}}
    @keyframes scaleIn{from{opacity:0;transform:scale(0.6);}to{opacity:1;transform:scale(1);}}
    @keyframes growBar{from{width:0;}to{width:var(--w);}}
    .scale-in{animation:scaleIn 0.6s cubic-bezier(0.34,1.56,0.64,1) both;}
    .fade-up{animation:fadeUp 0.6s ease 0.3s both;}
    .bar{animation:growBar 1s ease 0.6s both;}
    body{padding-bottom:90px;}
  </style>
</head>
<body class="bg-[#F5F4EF] min-h-screen max-w-[430px] mx-auto flex flex-col font-['DM_Sans']">

  <div class="flex flex-col flex-1 px-5 pt-14 pb-10 items-center">

    <!-- Success icon -->
    <div class="scale-in w-24 h-24 bg-[#3A3A3A] rounded-full flex items-center justify-center mb-5">
      <svg class="w-10 h-10 text-white" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24">
        <path stroke-linecap="round" stroke-linejoin="round" d="M5 13l4 4L19 7"/>
      </svg>
    </div>

    <div class="fade-up w-full">

      <!-- Title -->
      <div class="text-center mb-6">
        <h1 class="font-['Fraunces'] text-3xl font-bold text-[#1A1A1A] mb-1">Payment Successful</h1>
        <p class="text-sm text-[#9E9E9E]">Your contribution has been recorded</p>
      </div>

      <!-- Receipt card -->
      <div class="bg-white rounded-3xl overflow-hidden mb-5">
        <div class="divide-y divide-[#F5F5F5]">
          <div class="flex items-center justify-between px-5 py-4">
            <span class="text-sm text-[#9E9E9E]">Amount Paid</span>
            <span id="receiptAmount" class="text-sm font-bold text-[#1A1A1A]">—</span>
          </div>
          <div class="flex items-center justify-between px-5 py-4">
            <span class="text-sm text-[#9E9E9E]">Group</span>
            <span id="receiptGroup" class="text-sm font-bold text-[#1A1A1A]">—</span>
          </div>
          <div class="flex items-center justify-between px-5 py-4">
            <span class="text-sm text-[#9E9E9E]">Transaction ID</span>
            <span id="receiptTxId" class="text-xs font-bold text-[#1A1A1A] font-mono">—</span>
          </div>
        </div>

        <!-- Contribution progress -->
        <div class="px-5 py-4 border-t border-[#F5F5F5]">
          <div class="flex items-center justify-between mb-2">
            <span class="text-xs text-[#9E9E9E]">Your Contribution Progress</span>
            <span id="progressLabel" class="text-xs font-bold text-[#1A1A1A]">—</span>
          </div>
          <div class="h-2.5 bg-[#F0F0F0] rounded-full overflow-hidden">
            <div id="progressBar" class="bar h-full bg-[#3A3A3A] rounded-full" style="--w:0%; width:0%"></div>
          </div>
        </div>
      </div>

      <!-- Buttons -->
      <div class="flex flex-col gap-3">
        <button onclick="window.location.href='group-detail.html'"
          class="w-full py-4 bg-[#3A3A3A] text-white rounded-full text-sm font-semibold tracking-wide
                 transition-all duration-200 hover:bg-black active:scale-95">
          Back to Group
        </button>
        <button onclick="window.location.href='dashboard.html'"
          class="w-full py-4 bg-white border border-[#E0E0E0] text-[#3A3A3A] rounded-full text-sm font-semibold
                 transition-all duration-200 hover:bg-gray-50 active:scale-95">
          Go Home
        </button>
      </div>

    </div>
  </div>

  <script type="module">
    import { handleSquadRedirect, initPaymentSuccess } from '../js/payment.js';
    (async () => {
      await handleSquadRedirect(); // handles ?transaction_ref= from Squad redirect
      await initPaymentSuccess();
    })();
  </script>

  <!-- Bottom Nav -->
  <div class="fixed bottom-0 left-1/2 -translate-x-1/2 w-full max-w-[430px] bg-white border-t border-[#F0F0F0] px-6 py-3 flex items-center justify-between z-50">
    <button onclick="window.location.href='dashboard.html'" class="flex flex-col items-center gap-1 text-[#9E9E9E]"><svg class="w-5 h-5" fill="none" stroke="currentColor" stroke-width="1.8" viewBox="0 0 24 24"><path d="M3 12L12 3l9 9"/><path d="M9 21V12h6v9"/></svg><span class="text-[10px]">Home</span></button>
    <button onclick="window.location.href='groups.html'" class="flex flex-col items-center gap-1 text-[#9E9E9E]"><svg class="w-5 h-5" fill="none" stroke="currentColor" stroke-width="1.8" viewBox="0 0 24 24"><path d="M17 21v-2a4 4 0 0 0-4-4H5a4 4 0 0 0-4 4v2"/><circle cx="9" cy="7" r="4"/><path d="M23 21v-2a4 4 0 0 0-3-3.87M16 3.13a4 4 0 0 1 0 7.75"/></svg><span class="text-[10px]">Groups</span></button>
    <button onclick="window.location.href='make-payment.html'" class="w-14 h-14 bg-[#3A3A3A] rounded-full flex items-center justify-center -mt-6 shadow-lg"><svg class="w-6 h-6 text-white" fill="none" stroke="currentColor" stroke-width="2.5" viewBox="0 0 24 24"><path d="M12 5v14M5 12h14"/></svg></button>
    <button onclick="window.location.href='alerts.html'" class="flex flex-col items-center gap-1 text-[#9E9E9E]"><svg class="w-5 h-5" fill="none" stroke="currentColor" stroke-width="1.8" viewBox="0 0 24 24"><path d="M18 8A6 6 0 0 0 6 8c0 7-3 9-3 9h18s-3-2-3-9"/><path d="M13.73 21a2 2 0 0 1-3.46 0"/></svg><span class="text-[10px]">Alerts</span></button>
    <button onclick="window.location.href='profile.html'" class="flex flex-col items-center gap-1 text-[#9E9E9E] hover:text-[#3A3A3A] transition-colors">
      <svg class="w-5 h-5" fill="none" stroke="currentColor" stroke-width="1.8" viewBox="0 0 24 24"><circle cx="12" cy="7" r="4"/><path d="M5.5 20a7 7 0 0 1 13 0"/></svg>
      <span class="text-[10px] font-medium">Profile</span>
    </button>
  </div>

</body>
</html>
