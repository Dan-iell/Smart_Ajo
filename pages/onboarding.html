<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Smart Ajo – Onboarding</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Fraunces:wght@700;900&family=DM+Sans:wght@400;500&display=swap" rel="stylesheet" />
    <style>
      @keyframes fadeUp {
        from { opacity: 0; transform: translateY(20px); }
        to { opacity: 1; transform: translateY(0); }
      }
      .fade-up { animation: fadeUp 0.8s ease both; }
      
      .barrel {
        clip-path: ellipse(85% 100% at 50% 50%);
        background-color: #A8ADA8;
      }
    </style>
  </head>
  <!-- Changed h-screen to min-h-screen to allow scrolling if needed -->
  <body class="bg-[#F5F4EF] min-h-screen max-w-[430px] mx-auto flex flex-col font-['DM_Sans']">
    
    <!-- MAIN CONTENT AREA -->
    <div class="flex-1 flex flex-col justify-center items-center px-6 py-8 fade-up">
      
      <!-- Added max-h-[500px] so the barrel doesn't grow too large on tall screens -->
      <div class="relative w-full aspect-[4/5] max-h-[480px] flex flex-col items-center justify-center overflow-hidden rounded-[40px] shadow-sm">
        <!-- Background Shape -->
        <div class="barrel absolute inset-0"></div>

        <!-- Text Content -->
        <div class="relative z-10 text-center px-6">
          <!-- Reduced text size from 42px to text-3xl/4xl for better fit -->
          <h2 class="font-['Fraunces'] text-3xl sm:text-4xl font-black text-black mb-3 leading-[1.1]">
            Save Together,<br />Grow Together
          </h2>
          <p class="text-sm sm:text-base text-[#4a4a4a] leading-relaxed max-w-[260px] mx-auto">
            Join trusted savings groups with friends, family, and colleagues.
          </p>
        </div>
      </div>

    </div>

    <!-- BUTTON SECTION -->
    <div class="px-6 pb-10 w-full mt-auto">
      <button
        onclick="window.location.href = 'signin.html'"
        class="w-full py-5 bg-[#3A3A3A] text-white rounded-full text-lg font-semibold active:scale-95 transition-all shadow-lg"
      >
        Get Started
      </button>
    </div>

    <script type="module" src="../js/auth.js"></script>
  </body>
</html>
