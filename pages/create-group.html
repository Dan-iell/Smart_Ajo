<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Smart Ajo – Create Group</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <link href="https://fonts.googleapis.com/css2?family=Fraunces:wght@700;900&family=DM+Sans:wght@400;500;600&display=swap" rel="stylesheet"/>
  <style>
    @keyframes fadeUp { from { opacity:0; transform:translateY(16px);} to { opacity:1; transform:translateY(0);} }
    .fade-up { animation: fadeUp 0.5s ease both; }
    body { padding-bottom: 90px; }
  </style>
</head>
<body class="bg-[#F5F4EF] min-h-screen max-w-[430px] mx-auto font-['DM_Sans']">
  <div class="px-5 pt-10 fade-up">

    <div class="flex items-center gap-3 mb-6">
      <button onclick="history.back()" class="w-9 h-9 flex items-center justify-center rounded-full bg-white border border-[#E0E0E0] hover:bg-gray-50 transition-colors">
        <svg class="w-4 h-4 text-[#3A3A3A]" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><path d="M15 18l-6-6 6-6"/></svg>
      </button>
      <h1 class="font-['Fraunces'] text-xl font-bold text-[#1A1A1A]">Create Group</h1>
    </div>

    <div class="flex items-center gap-2 mb-8">
      <div class="w-8 h-8 bg-[#3A3A3A] rounded-full flex items-center justify-center">
        <span class="text-white text-xs font-bold">1</span>
      </div>
      <div class="flex-1 h-0.5 bg-[#E0E0E0]"></div>
      <div id="step2" class="w-8 h-8 bg-[#E0E0E0] rounded-full flex items-center justify-center">
        <span class="text-[#9E9E9E] text-xs font-bold">2</span>
      </div>
      <div class="flex-1 h-0.5 bg-[#E0E0E0]"></div>
      <div id="step3" class="w-8 h-8 bg-[#E0E0E0] rounded-full flex items-center justify-center">
        <span class="text-[#9E9E9E] text-xs font-bold">3</span>
      </div>
    </div>

    <h2 class="font-['Fraunces'] text-2xl font-bold text-[#1A1A1A] mb-1">Group Details</h2>
    <p class="text-sm text-[#6B6B6B] mb-7">Give your savings group a name and description.</p>

    <p id="groupError" class="text-xs text-red-500 mb-4 hidden"></p>

    <div class="flex flex-col gap-5">
      <div>
        <label class="text-sm font-medium text-[#3A3A3A] mb-1.5 block">Group Name</label>
        <div class="bg-white border border-[#E0E0E0] rounded-xl px-4 py-3.5">
          <input type="text" id="groupName" placeholder="e.g. UNILAG Techies Savings"
            class="w-full text-sm bg-transparent outline-none text-[#3A3A3A] placeholder-[#BDBDBD]"/>
        </div>
      </div>
      <div>
        <label class="text-sm font-medium text-[#3A3A3A] mb-1.5 block">Description</label>
        <div class="bg-white border border-[#E0E0E0] rounded-xl px-4 py-3">
          <textarea id="groupDesc" rows="4" placeholder="A brief description of your group's purpose..."
            class="w-full text-sm bg-transparent outline-none text-[#3A3A3A] placeholder-[#BDBDBD] resize-none leading-relaxed"></textarea>
        </div>
      </div>
    </div>

    <button id="nextStepBtn"
      class="w-full py-4 bg-[#3A3A3A] text-white rounded-full text-sm font-semibold tracking-wide mt-8 transition-all duration-200 hover:bg-black active:scale-95">
      Continue
    </button>
  </div>

  <div class="fixed bottom-0 left-1/2 -translate-x-1/2 w-full max-w-[430px] bg-white border-t border-[#F0F0F0] px-6 py-3 flex items-center justify-between z-50">
    </div>

  <script type="module">
    // Using simple storage to pass data between the 3 steps
    document.getElementById('nextStepBtn').addEventListener('click', () => {
      const name = document.getElementById('groupName').value.trim();
      const desc = document.getElementById('groupDesc').value.trim();
      const errorEl = document.getElementById('groupError');

      if (!name || !desc) {
        errorEl.textContent = "Please fill in all details before continuing.";
        errorEl.classList.remove('hidden');
        return;
      }

      // Temporarily save to session so we can send it in Step 3
      const groupData = {
        name: name,
        description: desc
      };
      sessionStorage.setItem('pendingGroupData', JSON.stringify(groupData));

      // Move to Step 2
      window.location.href = 'create-group-2.html';
    });
  </script>
</body>
</html>
