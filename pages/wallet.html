<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/><meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Smart Ajo – My Wallet</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <link href="https://fonts.googleapis.com/css2?family=Fraunces:wght@700;900&family=DM+Sans:wght@400;500;600&display=swap" rel="stylesheet"/>
  <style>
    @keyframes fadeUp{from{opacity:0;transform:translateY(16px);}to{opacity:1;transform:translateY(0);}}
    .fade-up{animation:fadeUp 0.5s ease both;}
    .fade-up-2{animation:fadeUp 0.5s ease 0.1s both;}
    .fade-up-3{animation:fadeUp 0.5s ease 0.2s both;}
    body{padding-bottom: 90px;}
    .sheet-enter{animation:sheetUp 0.3s cubic-bezier(0.32,0.72,0,1) both;}
    @keyframes sheetUp{from{transform:translateY(100%);}to{transform:translateY(0);}}
  </style>
</head>
<body class="bg-[#F5F4EF] min-h-screen max-w-[430px] mx-auto font-['DM_Sans']">

  <div class="px-5 pt-10">

    <div class="flex items-center gap-3 mb-7 fade-up">
      <button onclick="history.back()" class="w-9 h-9 flex items-center justify-center rounded-full bg-white border border-[#E0E0E0] hover:bg-gray-50 transition-colors">
        <svg class="w-4 h-4 text-[#1B5E3B]" fill="none" stroke="currentColor" stroke-width="2.5" viewBox="0 0 24 24"><path d="M15 18l-6-6 6-6"/></svg>
      </button>
      <h1 class="font-['Fraunces'] text-2xl font-bold text-[#1A1A1A]">My Wallet</h1>
    </div>

    <div class="bg-[#144d30] rounded-[32px] px-6 py-8 mb-5 fade-up relative overflow-hidden shadow-xl shadow-green-900/20">
      <div class="absolute -top-8 -right-8 w-32 h-32 bg-white opacity-5 rounded-full"></div>
      <div class="absolute -bottom-10 -left-8 w-40 h-40 bg-white opacity-5 rounded-full"></div>
      <p class="text-white/60 text-[10px] font-black uppercase tracking-[0.15em] mb-2 relative">Available Balance</p>
      <div class="flex items-end gap-1 mb-6 relative">
        <span id="walletBalance" class="text-white text-5xl font-['Fraunces'] font-black tracking-tight">₦—</span>
        <span class="text-white/40 text-lg mb-1 font-bold">.00</span>
      </div>

      <div class="flex gap-3 relative">
        <button onclick="window._showFundSheet()"
          class="flex-1 flex items-center justify-center gap-2 bg-white text-[#1B5E3B] py-4 rounded-2xl text-xs font-black uppercase tracking-wider
                 hover:bg-gray-100 transition-all active:scale-95 shadow-lg shadow-black/10">
          <svg class="w-4 h-4" fill="none" stroke="currentColor" stroke-width="3" viewBox="0 0 24 24"><path d="M12 5v14M5 12h14"/></svg>
          Fund Wallet
        </button>
        <button class="flex-1 flex items-center justify-center gap-2 bg-white/10 text-white py-4 rounded-2xl text-xs font-black uppercase tracking-wider
                       hover:bg-white/20 transition-all active:scale-95 border border-white/10 backdrop-blur-sm">
          <svg class="w-4 h-4" fill="none" stroke="currentColor" stroke-width="2.5" viewBox="0 0 24 24"><path d="M12 19V5M5 12l7 7 7-7"/></svg>
          Withdraw
        </button>
      </div>
    </div>

    <div class="bg-white rounded-2xl p-5 mb-4 fade-up-2 shadow-sm border border-white">
      <div class="flex items-center justify-between mb-4">
        <h2 class="text-xs font-black text-[#1B5E3B] uppercase tracking-wider">Linked Cards</h2>
        <a href="add-card.html" class="flex items-center gap-1 text-[10px] font-black text-[#1B5E3B] uppercase tracking-widest hover:opacity-70 transition-opacity">
          <svg class="w-3.5 h-3.5" fill="none" stroke="currentColor" stroke-width="3" viewBox="0 0 24 24"><path d="M12 5v14M5 12h14"/></svg>
          Add Card
        </a>
      </div>
      <div id="cardsList">
        <div class="h-10 bg-[#F5F5F5] rounded-xl animate-pulse"></div>
      </div>
    </div>

    <div class="bg-white rounded-2xl p-5 fade-up-3 shadow-sm border border-white">
      <div class="flex items-center justify-between mb-4">
        <h2 class="text-xs font-black text-[#1B5E3B] uppercase tracking-wider">Transaction History</h2>
      </div>
      <div id="txList">
        <div class="flex flex-col gap-3">
          <div class="h-12 bg-[#F5F5F5] rounded-xl animate-pulse"></div>
          <div class="h-12 bg-[#F5F5F5] rounded-xl animate-pulse opacity-60"></div>
          <div class="h-12 bg-[#F5F5F5] rounded-xl animate-pulse opacity-30"></div>
        </div>
      </div>
    </div>

  </div>


  <div id="fundSheet" class="hidden fixed inset-0 z-50 flex flex-col justify-end">
    <div class="absolute inset-0 bg-black/60 backdrop-blur-sm" onclick="window._hideFundSheet()"></div>

    <div class="relative bg-white rounded-t-[40px] px-6 pt-6 pb-12 max-w-[430px] mx-auto w-full sheet-enter shadow-2xl border-t border-white/20">
      <div class="w-12 h-1.5 bg-[#E0E0E0] rounded-full mx-auto mb-6"></div>

      <h3 class="font-['Fraunces'] text-2xl font-black text-[#1A1A1A] mb-1">Fund Wallet</h3>
      <p class="text-sm text-[#9E9E9E] mb-6 font-medium">Top up your balance for easy contributions</p>

      <div class="flex gap-2 flex-wrap mb-6">
        <button onclick="window._setQuickAmount(1000)" class="px-5 py-2.5 bg-[#F5F4EF] text-xs font-black text-[#1B5E3B] rounded-full hover:bg-[#1B5E3B] hover:text-white transition-all active:scale-95 border border-transparent">₦1,000</button>
        <button onclick="window._setQuickAmount(2500)" class="px-5 py-2.5 bg-[#F5F4EF] text-xs font-black text-[#1B5E3B] rounded-full hover:bg-[#1B5E3B] hover:text-white transition-all active:scale-95 border border-transparent">₦2,500</button>
        <button onclick="window._setQuickAmount(5000)" class="px-5 py-2.5 bg-[#F5F4EF] text-xs font-black text-[#1B5E3B] rounded-full hover:bg-[#1B5E3B] hover:text-white transition-all active:scale-95 border border-transparent">₦5,000</button>
        <button onclick="window._setQuickAmount(10000)" class="px-5 py-2.5 bg-[#F5F4EF] text-xs font-black text-[#1B5E3B] rounded-full hover:bg-[#1B5E3B] hover:text-white transition-all active:scale-95 border border-transparent">₦10,000</button>
      </div>

      <div class="flex items-center gap-3 bg-[#F5F4EF] rounded-2xl px-5 py-5 mb-6 border-2 border-transparent focus-within:border-[#1B5E3B] transition-all">
        <span class="text-xl font-black text-[#1B5E3B]">₦</span>
        <input id="fundAmount" type="number" min="100" placeholder="0.00"
          class="flex-1 bg-transparent text-xl font-black text-[#1A1A1A] outline-none placeholder-[#BDBDBD]"/>
      </div>

      <button id="fundBtn" onclick="window._handleFundWallet()"
        class="w-full py-5 bg-[#1B5E3B] text-white rounded-full text-xs font-black uppercase tracking-[0.2em]
               transition-all duration-300 hover:bg-[#144d30] active:scale-95 shadow-lg shadow-green-900/20">
        Confirm Funding
      </button>
    </div>
  </div>


  <script type="module">
    import { initWallet, handleFundWallet, hideFundSheet, showFundSheet, setQuickAmount, removeCard } from '../js/wallet.js';
    window._handleFundWallet = handleFundWallet;
    window._hideFundSheet   = hideFundSheet;
    window._showFundSheet   = showFundSheet;
    window._setQuickAmount  = setQuickAmount;
    window._removeCard      = removeCard;
    initWallet();
  </script>

  <div class="fixed bottom-0 left-1/2 -translate-x-1/2 w-full max-w-[430px] bg-white border-t border-[#F0F0F0] px-6 py-3 flex items-center justify-between z-40">
    <button onclick="window.location.href='dashboard.html'" class="flex flex-col items-center gap-1 text-[#9E9E9E] hover:text-[#1B5E3B] transition-colors"><svg class="w-5 h-5" fill="none" stroke="currentColor" stroke-width="1.8" viewBox="0 0 24 24"><path d="M3 12L12 3l9 9"/><path d="M9 21V12h6v9"/></svg><span class="text-[10px] font-medium">Home</span></button>
    <button onclick="window.location.href='groups.html'" class="flex flex-col items-center gap-1 text-[#9E9E9E] hover:text-[#1B5E3B] transition-colors"><svg class="w-5 h-5" fill="none" stroke="currentColor" stroke-width="1.8" viewBox="0 0 24 24"><path d="M17 21v-2a4 4 0 0 0-4-4H5a4 4 0 0 0-4 4v2"/><circle cx="9" cy="7" r="4"/></svg><span class="text-[10px] font-medium">Groups</span></button>
    <button onclick="window.location.href='make-payment.html'" class="w-14 h-14 bg-[#1B5E3B] rounded-full flex items-center justify-center -mt-8 shadow-xl shadow-green-900/30 transition-all active:scale-95"><svg class="w-6 h-6 text-white" fill="none" stroke="currentColor" stroke-width="2.5" viewBox="0 0 24 24"><path d="M12 5v14M5 12h14"/></svg></button>
    <button onclick="window.location.href='alerts.html'" class="flex flex-col items-center gap-1 text-[#9E9E9E] hover:text-[#1B5E3B] transition-colors"><svg class="w-5 h-5" fill="none" stroke="currentColor" stroke-width="1.8" viewBox="0 0 24 24"><path d="M18 8A6 6 0 0 0 6 8c0 7-3 9-3 9h18s-3-2-3-9"/><path d="M13.73 21a2 2 0 0 1-3.46 0"/></svg><span class="text-[10px] font-medium">Alerts</span></button>
    <button onclick="window.location.href='profile.html'" class="flex flex-col items-center gap-1 text-[#9E9E9E] hover:text-[#1B5E3B] transition-colors"><svg class="w-5 h-5" fill="none" stroke="currentColor" stroke-width="1.8" viewBox="0 0 24 24"><circle cx="12" cy="7" r="4"/><path d="M5.5 20a7 7 0 0 1 13 0"/></svg><span class="text-[10px] font-medium">Profile</span></button>
  </div>

</body>
</html>
