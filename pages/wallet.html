<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/><meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Smart Ajo – My Wallet</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <link href="https://fonts.googleapis.com/css2?family=Fraunces:wght@700;900&family=DM+Sans:wght@400;500;600&display=swap" rel="stylesheet"/>
  <style>
    @keyframes fadeUp{from{opacity:0;transform:translateY(16px);}to{opacity:1;transform:translateY(0);}}
    .fade-up{animation:fadeUp 0.5s ease both;}
    .fade-up-2{animation:fadeUp 0.5s ease 0.1s both;}
    .fade-up-3{animation:fadeUp 0.5s ease 0.2s both;}
    body{padding-bottom:90px;}
    .sheet-enter{animation:sheetUp 0.3s cubic-bezier(0.32,0.72,0,1) both;}
    @keyframes sheetUp{from{transform:translateY(100%);}to{transform:translateY(0);}}
  </style>
</head>
<body class="bg-[#F5F4EF] min-h-screen max-w-[430px] mx-auto font-['DM_Sans']">

  <div class="px-5 pt-10">

    <!-- Header -->
    <div class="flex items-center gap-3 mb-7 fade-up">
      <button onclick="history.back()" class="w-9 h-9 flex items-center justify-center rounded-full bg-white border border-[#E0E0E0] hover:bg-gray-50 transition-colors">
        <svg class="w-4 h-4 text-[#3A3A3A]" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><path d="M15 18l-6-6 6-6"/></svg>
      </button>
      <h1 class="font-['Fraunces'] text-2xl font-bold text-[#1A1A1A]">My Wallet</h1>
    </div>

    <!-- Balance Card -->
    <div class="bg-[#2A2A2A] rounded-3xl px-6 py-8 mb-5 fade-up relative overflow-hidden">
      <div class="absolute -top-8 -right-8 w-32 h-32 bg-white opacity-5 rounded-full"></div>
      <div class="absolute -bottom-10 -left-8 w-40 h-40 bg-white opacity-5 rounded-full"></div>
      <p class="text-[#9E9E9E] text-xs mb-2 relative">Available Balance</p>
      <div class="flex items-end gap-1 mb-6 relative">
        <span id="walletBalance" class="text-white text-5xl font-['Fraunces'] font-bold tracking-tight">₦—</span>
        <span class="text-[#9E9E9E] text-lg mb-1">.00</span>
      </div>

      <!-- Quick Actions -->
      <div class="flex gap-3 relative">
        <button onclick="window._showFundSheet()"
          class="flex-1 flex items-center justify-center gap-2 bg-white text-[#2A2A2A] py-3 rounded-2xl text-sm font-bold
                 hover:bg-gray-100 transition-all active:scale-95">
          <svg class="w-4 h-4" fill="none" stroke="currentColor" stroke-width="2.5" viewBox="0 0 24 24"><path d="M12 5v14M5 12h14"/></svg>
          Fund Wallet
        </button>
        <button class="flex-1 flex items-center justify-center gap-2 bg-white bg-opacity-10 text-white py-3 rounded-2xl text-sm font-semibold
                       hover:bg-opacity-20 transition-all active:scale-95 border border-white/10">
          <svg class="w-4 h-4" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><path d="M12 19V5M5 12l7 7 7-7"/></svg>
          Withdraw
        </button>
      </div>
    </div>

    <!-- Linked Cards -->
    <div class="bg-white rounded-2xl p-5 mb-4 fade-up-2">
      <div class="flex items-center justify-between mb-4">
        <h2 class="text-sm font-semibold text-[#1A1A1A]">Linked Cards</h2>
        <a href="add-card.html" class="flex items-center gap-1 text-xs font-semibold text-[#3A3A3A] hover:opacity-70 transition-opacity">
          <svg class="w-3.5 h-3.5" fill="none" stroke="currentColor" stroke-width="2.5" viewBox="0 0 24 24"><path d="M12 5v14M5 12h14"/></svg>
          Add Card
        </a>
      </div>
      <div id="cardsList">
        <!-- skeleton -->
        <div class="h-10 bg-[#F5F5F5] rounded-xl animate-pulse"></div>
      </div>
    </div>

    <!-- Transaction History -->
    <div class="bg-white rounded-2xl p-5 fade-up-3">
      <div class="flex items-center justify-between mb-4">
        <h2 class="text-sm font-semibold text-[#1A1A1A]">Transaction History</h2>
      </div>
      <div id="txList">
        <!-- skeletons -->
        <div class="flex flex-col gap-3">
          <div class="h-12 bg-[#F5F5F5] rounded-xl animate-pulse"></div>
          <div class="h-12 bg-[#F5F5F5] rounded-xl animate-pulse opacity-60"></div>
          <div class="h-12 bg-[#F5F5F5] rounded-xl animate-pulse opacity-30"></div>
        </div>
      </div>
    </div>

  </div>


  <!-- ── Fund Wallet Bottom Sheet ── -->
  <div id="fundSheet" class="hidden fixed inset-0 z-50 flex flex-col justify-end">
    <!-- backdrop -->
    <div class="absolute inset-0 bg-black/40 backdrop-blur-sm" onclick="window._hideFundSheet()"></div>

    <!-- sheet panel -->
    <div class="relative bg-white rounded-t-3xl px-6 pt-6 pb-10 max-w-[430px] mx-auto w-full sheet-enter">
      <div class="w-10 h-1 bg-[#E0E0E0] rounded-full mx-auto mb-5"></div>

      <h3 class="font-['Fraunces'] text-xl font-bold text-[#1A1A1A] mb-1">Fund Wallet</h3>
      <p class="text-sm text-[#9E9E9E] mb-5">Choose an amount or type a custom value</p>

      <!-- Quick amount chips -->
      <div class="flex gap-2 flex-wrap mb-4">
        <button onclick="window._setQuickAmount(1000)" class="px-4 py-2 bg-[#F5F4EF] text-sm font-semibold text-[#3A3A3A] rounded-full hover:bg-[#EAEAE3] transition-colors active:scale-95">₦1,000</button>
        <button onclick="window._setQuickAmount(2500)" class="px-4 py-2 bg-[#F5F4EF] text-sm font-semibold text-[#3A3A3A] rounded-full hover:bg-[#EAEAE3] transition-colors active:scale-95">₦2,500</button>
        <button onclick="window._setQuickAmount(5000)" class="px-4 py-2 bg-[#F5F4EF] text-sm font-semibold text-[#3A3A3A] rounded-full hover:bg-[#EAEAE3] transition-colors active:scale-95">₦5,000</button>
        <button onclick="window._setQuickAmount(10000)" class="px-4 py-2 bg-[#F5F4EF] text-sm font-semibold text-[#3A3A3A] rounded-full hover:bg-[#EAEAE3] transition-colors active:scale-95">₦10,000</button>
      </div>

      <!-- Amount input -->
      <div class="flex items-center gap-2 bg-[#F5F4EF] rounded-2xl px-4 py-4 mb-5 border border-transparent focus-within:border-[#3A3A3A] transition-colors">
        <span class="text-lg font-bold text-[#3A3A3A]">₦</span>
        <input id="fundAmount" type="number" min="100" placeholder="Enter amount"
          class="flex-1 bg-transparent text-lg font-semibold text-[#1A1A1A] outline-none placeholder-[#BDBDBD]"/>
      </div>

      <!-- Info note -->
      <div class="flex items-start gap-2 mb-5">
        <svg class="w-4 h-4 text-[#9E9E9E] shrink-0 mt-0.5" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><circle cx="12" cy="12" r="10"/><path d="M12 16v-4M12 8h.01"/></svg>
        <p class="text-xs text-[#9E9E9E] leading-relaxed">You'll be redirected to Squad's secure payment page to complete the funding.</p>
      </div>

      <button id="fundBtn" onclick="window._handleFundWallet()"
        class="w-full py-4 bg-[#3A3A3A] text-white rounded-full text-base font-semibold tracking-wide
               transition-all duration-200 hover:bg-black active:scale-95">
        Fund Wallet
      </button>
    </div>
  </div>


  <script type="module">
    import { initWallet, handleFundWallet, hideFundSheet, showFundSheet, setQuickAmount, removeCard } from '../js/wallet.js';
    window._handleFundWallet = handleFundWallet;
    window._hideFundSheet   = hideFundSheet;
    window._showFundSheet   = showFundSheet;
    window._setQuickAmount  = setQuickAmount;
    window._removeCard      = removeCard;
    initWallet();
  </script>

  <!-- Bottom Nav -->
  <div class="fixed bottom-0 left-1/2 -translate-x-1/2 w-full max-w-[430px] bg-white border-t border-[#F0F0F0] px-6 py-3 flex items-center justify-between z-40">
    <button onclick="window.location.href='dashboard.html'" class="flex flex-col items-center gap-1 text-[#9E9E9E] hover:text-[#3A3A3A] transition-colors"><svg class="w-5 h-5" fill="none" stroke="currentColor" stroke-width="1.8" viewBox="0 0 24 24"><path d="M3 12L12 3l9 9"/><path d="M9 21V12h6v9"/></svg><span class="text-[10px]">Home</span></button>
    <button onclick="window.location.href='groups.html'" class="flex flex-col items-center gap-1 text-[#9E9E9E] hover:text-[#3A3A3A] transition-colors"><svg class="w-5 h-5" fill="none" stroke="currentColor" stroke-width="1.8" viewBox="0 0 24 24"><path d="M17 21v-2a4 4 0 0 0-4-4H5a4 4 0 0 0-4 4v2"/><circle cx="9" cy="7" r="4"/></svg><span class="text-[10px]">Groups</span></button>
    <button onclick="window.location.href='make-payment.html'" class="w-14 h-14 bg-[#3A3A3A] rounded-full flex items-center justify-center -mt-6 shadow-lg hover:bg-black transition-colors active:scale-95"><svg class="w-6 h-6 text-white" fill="none" stroke="currentColor" stroke-width="2.5" viewBox="0 0 24 24"><path d="M12 5v14M5 12h14"/></svg></button>
    <button onclick="window.location.href='alerts.html'" class="flex flex-col items-center gap-1 text-[#9E9E9E] hover:text-[#3A3A3A] transition-colors"><svg class="w-5 h-5" fill="none" stroke="currentColor" stroke-width="1.8" viewBox="0 0 24 24"><path d="M18 8A6 6 0 0 0 6 8c0 7-3 9-3 9h18s-3-2-3-9"/><path d="M13.73 21a2 2 0 0 1-3.46 0"/></svg><span class="text-[10px]">Alerts</span></button>
    <button onclick="window.location.href='profile.html'" class="flex flex-col items-center gap-1 text-[#9E9E9E] hover:text-[#3A3A3A] transition-colors"><svg class="w-5 h-5" fill="none" stroke="currentColor" stroke-width="1.8" viewBox="0 0 24 24"><circle cx="12" cy="7" r="4"/><path d="M5.5 20a7 7 0 0 1 13 0"/></svg><span class="text-[10px]">Profile</span></button>
  </div>

</body>
</html>
