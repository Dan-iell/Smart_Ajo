<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Smart Ajo – Rotation Method</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link
      href="https://fonts.googleapis.com/css2?family=Fraunces:wght@700;900&family=DM+Sans:wght@400;500;600&display=swap"
      rel="stylesheet"
    />
    <style>
      @keyframes fadeUp {
        from {
          opacity: 0;
          transform: translateY(16px);
        }
        to {
          opacity: 1;
          transform: translateY(0);
        }
      }
      .fade-up {
        animation: fadeUp 0.5s ease both;
      }
      body {
        padding-bottom: 90px;
      }
      .option-card {
        transition: all 0.25s cubic-bezier(0.4, 0, 0.2, 1);
        cursor: pointer;
        border-width: 2px;
      }
      .option-card.selected {
        border-color: #1b5e3b;
        transform: translateY(-2px);
      }
      .option-radio {
        width: 22px;
        height: 22px;
        border-radius: 50%;
        border: 2px solid #e0e0e0;
        display: flex;
        align-items: center;
        justify-content: center;
        transition: all 0.2s;
        flex-shrink: 0;
      }
      .option-card.selected .option-radio {
        border-color: #1b5e3b;
        background: #1b5e3b;
      }
      .option-dot {
        width: 8px;
        height: 8px;
        border-radius: 50%;
        background: white;
        opacity: 0;
        transition: opacity 0.2s;
      }
      .option-card.selected .option-dot {
        opacity: 1;
      }
    </style>
  </head>
  <body
    class="bg-[#F5F4EF] min-h-screen max-w-[430px] mx-auto font-['DM_Sans']"
  >
    <div class="px-5 pt-10 fade-up">
      <div class="flex items-center gap-3 mb-6">
        <button
          onclick="history.back()"
          class="w-9 h-9 flex items-center justify-center rounded-full bg-white border border-[#E0E0E0] shadow-sm active:scale-90 transition-transform"
        >
          <svg
            class="w-4 h-4 text-[#1B5E3B]"
            fill="none"
            stroke="currentColor"
            stroke-width="2.5"
            viewBox="0 0 24 24"
          >
            <path d="M15 18l-6-6 6-6" />
          </svg>
        </button>
        <h1 class="font-['Fraunces'] text-xl font-bold text-[#1A1A1A]">
          Create Group
        </h1>
      </div>

      <div class="flex items-center gap-2 mb-8 px-2">
        <div
          class="w-8 h-8 bg-[#1B5E3B] rounded-full flex items-center justify-center shadow-sm"
        >
          <svg
            class="w-4 h-4 text-white"
            fill="none"
            stroke="currentColor"
            stroke-width="3"
            viewBox="0 0 24 24"
          >
            <path d="M5 13l4 4L19 7" />
          </svg>
        </div>
        <div class="flex-1 h-1 bg-[#1B5E3B] rounded-full"></div>
        <div
          class="w-8 h-8 bg-[#1B5E3B] rounded-full flex items-center justify-center shadow-sm"
        >
          <svg
            class="w-4 h-4 text-white"
            fill="none"
            stroke="currentColor"
            stroke-width="3"
            viewBox="0 0 24 24"
          >
            <path d="M5 13l4 4L19 7" />
          </svg>
        </div>
        <div class="flex-1 h-1 bg-[#1B5E3B] rounded-full"></div>
        <div
          class="w-8 h-8 bg-[#1B5E3B] rounded-full flex items-center justify-center shadow-sm"
        >
          <span class="text-white text-xs font-black">3</span>
        </div>
      </div>

      <h2 class="font-['Fraunces'] text-2xl font-bold text-[#1A1A1A] mb-1">
        Rotation Method
      </h2>
      <p class="text-sm text-[#6B6B6B] mb-7">
        Determine how payout turns are assigned.
      </p>

      <div class="flex flex-col gap-4 mb-8">
        <div
          class="option-card selected bg-white border-[#1B5E3B] rounded-2xl p-5 flex items-start gap-4 shadow-sm"
          data-method="random"
          onclick="selectOption(this)"
        >
          <div class="option-radio mt-0.5"><div class="option-dot"></div></div>
          <div>
            <p class="text-sm font-bold text-[#1A1A1A]">Random Draw</p>
            <p class="text-xs text-[#9E9E9E] mt-1 font-medium leading-relaxed">
              Transparent, random selection generated by the system each cycle.
            </p>
          </div>
        </div>
      </div>

      <button
        id="finalCreateBtn"
        class="w-full py-5 bg-[#1B5E3B] text-white rounded-full text-sm font-black tracking-widest uppercase transition-all duration-300 hover:bg-[#144d30] active:scale-[0.98] shadow-lg shadow-green-900/20"
      >
        Complete Group Creation
      </button>
    </div>

    <script type="module">
      import { createGroup } from "../js/api.js";
      let selectedMethod = "random";
      window.selectOption = function (element) {
        selectedMethod = element.getAttribute("data-method");
        document.querySelectorAll(".option-card").forEach((card) => {
          card.classList.remove("selected", "border-[#1B5E3B]");
          card.classList.add("border-[#E0E0E0]");
        });
        element.classList.add("selected", "border-[#1B5E3B]");
        element.classList.remove("border-[#E0E0E0]");
      };
      document
        .getElementById("finalCreateBtn")
        .addEventListener("click", async () => {
          const step1 = JSON.parse(
            localStorage.getItem("group_step_1") || "{}",
          );
          const step2 = JSON.parse(
            localStorage.getItem("group_step_2") || "{}",
          );
          const finalData = {
            ...step1,
            ...step2,
            rotation_method: selectedMethod,
          };
          try {
            const result = await createGroup(finalData);
            localStorage.removeItem("group_step_1");
            localStorage.removeItem("group_step_2");
            window.location.href = "group-created.html";
          } catch (error) {
            alert(error.message);
          }
        });
    </script>
  </body>
</html>
