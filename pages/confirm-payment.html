<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/><meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Smart Ajo – Confirm Payment</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <link href="https://fonts.googleapis.com/css2?family=Fraunces:wght@700;900&family=DM+Sans:wght@400;500;600&display=swap" rel="stylesheet"/>
  <style>
    @keyframes fadeUp{from{opacity:0;transform:translateY(16px);}to{opacity:1;transform:translateY(0);}}
    .fade-up{animation:fadeUp 0.5s ease both;}
    .fade-up-2{animation:fadeUp 0.5s ease 0.1s both;}
    body{padding-bottom:90px;}
  </style>
</head>
<body class="bg-[#F5F4EF] min-h-screen max-w-[430px] mx-auto font-['DM_Sans']">

  <div class="px-5 pt-10">

    <!-- Header -->
    <div class="flex items-center gap-3 mb-7 fade-up">
      <button onclick="history.back()" class="w-9 h-9 flex items-center justify-center rounded-full bg-white border border-[#E0E0E0]">
        <svg class="w-4 h-4 text-[#3A3A3A]" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><path d="M15 18l-6-6 6-6"/></svg>
      </button>
      <h1 class="font-['Fraunces'] text-2xl font-bold text-[#1A1A1A]">Confirm Payment</h1>
    </div>

    <!-- Payment Summary Card -->
    <div class="bg-white rounded-3xl overflow-hidden mb-5 fade-up">
      <div class="px-5 py-4 border-b border-[#F5F5F5]">
        <p class="text-sm font-semibold text-[#1A1A1A]">Payment Summary</p>
      </div>

      <!-- Summary rows -->
      <div class="divide-y divide-[#F5F5F5]">
        <div class="flex items-center justify-between px-5 py-4">
          <span class="text-sm text-[#9E9E9E]">Amount</span>
          <span id="summaryAmount" class="text-sm font-bold text-[#1A1A1A]">—</span>
        </div>
        <div class="flex items-center justify-between px-5 py-4">
          <span class="text-sm text-[#9E9E9E]">Group</span>
          <span id="summaryGroup" class="text-sm font-bold text-[#1A1A1A]">—</span>
        </div>
        <div class="flex items-center justify-between px-5 py-4">
          <span class="text-sm text-[#9E9E9E]">Payment Method</span>
          <span id="summaryMethod" class="text-sm font-bold text-[#1A1A1A]">—</span>
        </div>
        <div class="flex items-center justify-between px-5 py-4">
          <span class="text-sm text-[#9E9E9E]">Date</span>
          <span id="summaryDate" class="text-sm font-bold text-[#1A1A1A]">—</span>
        </div>
      </div>
    </div>

    <!-- Warning note -->
    <div class="flex items-start gap-3 bg-[#FFF8E7] border border-[#F5E6B0] rounded-2xl px-4 py-3.5 mb-6 fade-up-2">
      <svg class="w-4 h-4 text-[#F5A623] shrink-0 mt-0.5" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><path d="M10.29 3.86L1.82 18a2 2 0 0 0 1.71 3h16.94a2 2 0 0 0 1.71-3L13.71 3.86a2 2 0 0 0-3.42 0z"/><line x1="12" y1="9" x2="12" y2="13"/><line x1="12" y1="17" x2="12.01" y2="17"/></svg>
      <p class="text-xs text-[#7A5500] leading-relaxed">This action will charge <span id="warningAmount" class="font-semibold">—</span> via Squad. This cannot be undone.</p>
    </div>

    <!-- Confirm button -->
    <button id="confirmBtn" onclick="window._handleConfirmPayment()"
      class="w-full py-4 bg-[#3A3A3A] text-white rounded-full text-base font-semibold tracking-wide
             transition-all duration-200 hover:bg-black active:scale-95 fade-up-2">
      Confirm Payment
    </button>

  </div>

  <script type="module">
    import { initConfirmPayment, handleConfirmPayment } from '../js/payment.js';
    window._handleConfirmPayment = handleConfirmPayment;
    initConfirmPayment();
  </script>

  <!-- Bottom Nav -->
  <div class="fixed bottom-0 left-1/2 -translate-x-1/2 w-full max-w-[430px] bg-white border-t border-[#F0F0F0] px-6 py-3 flex items-center justify-between z-50">
    <button onclick="window.location.href='dashboard.html'" class="flex flex-col items-center gap-1 text-[#9E9E9E]"><svg class="w-5 h-5" fill="none" stroke="currentColor" stroke-width="1.8" viewBox="0 0 24 24"><path d="M3 12L12 3l9 9"/><path d="M9 21V12h6v9"/></svg><span class="text-[10px]">Home</span></button>
    <button onclick="window.location.href='groups.html'" class="flex flex-col items-center gap-1 text-[#9E9E9E]"><svg class="w-5 h-5" fill="none" stroke="currentColor" stroke-width="1.8" viewBox="0 0 24 24"><path d="M17 21v-2a4 4 0 0 0-4-4H5a4 4 0 0 0-4 4v2"/><circle cx="9" cy="7" r="4"/><path d="M23 21v-2a4 4 0 0 0-3-3.87M16 3.13a4 4 0 0 1 0 7.75"/></svg><span class="text-[10px]">Groups</span></button>
    <button onclick="window.location.href='make-payment.html'" class="w-14 h-14 bg-[#3A3A3A] rounded-full flex items-center justify-center -mt-6 shadow-lg"><svg class="w-6 h-6 text-white" fill="none" stroke="currentColor" stroke-width="2.5" viewBox="0 0 24 24"><path d="M12 5v14M5 12h14"/></svg></button>
    <button onclick="window.location.href='alerts.html'" class="flex flex-col items-center gap-1 text-[#9E9E9E]"><svg class="w-5 h-5" fill="none" stroke="currentColor" stroke-width="1.8" viewBox="0 0 24 24"><path d="M18 8A6 6 0 0 0 6 8c0 7-3 9-3 9h18s-3-2-3-9"/><path d="M13.73 21a2 2 0 0 1-3.46 0"/></svg><span class="text-[10px]">Alerts</span></button>
    <button onclick="window.location.href='profile.html'" class="flex flex-col items-center gap-1 text-[#9E9E9E] hover:text-[#3A3A3A] transition-colors">
      <svg class="w-5 h-5" fill="none" stroke="currentColor" stroke-width="1.8" viewBox="0 0 24 24"><circle cx="12" cy="7" r="4"/><path d="M5.5 20a7 7 0 0 1 13 0"/></svg>
      <span class="text-[10px] font-medium">Profile</span>
    </button>
  </div>

</body>
</html>
