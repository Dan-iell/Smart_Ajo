<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/><meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Smart Ajo – Edit Profile</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <link href="https://fonts.googleapis.com/css2?family=Fraunces:wght@700;900&family=DM+Sans:wght@400;500;600&display=swap" rel="stylesheet"/>
  <style>
    @keyframes fadeUp{from{opacity:0;transform:translateY(12px);}to{opacity:1;transform:translateY(0);}}
    .fade-up { animation: fadeUp 0.4s ease both; }
    body { font-family: 'DM Sans', sans-serif; }
    .font-brand { font-family: 'Fraunces', serif; }
    .input-group:focus-within label { color: #1B5E3B; }
    .input-group:focus-within div { border-color: #1B5E3B; box-shadow: 0 0 0 1px #1B5E3B; }
  </style>
</head>
<body class="bg-[#F5F4EF] min-h-screen max-w-[430px] mx-auto">

  <div class="px-6 pt-10 pb-24 fade-up">
    <!-- Header -->
    <div class="flex items-center justify-between mb-8">
      <button onclick="history.back()" class="w-10 h-10 flex items-center justify-center rounded-full bg-white border border-[#E0E0E0] active:scale-90 transition-transform shadow-sm">
        <svg class="w-5 h-5 text-[#1B5E3B]" fill="none" stroke="currentColor" stroke-width="2.5" viewBox="0 0 24 24"><path d="M15 18l-6-6 6-6"/></svg>
      </button>
      <h1 class="font-brand text-xl font-bold text-[#1A1A1A]">Edit Profile</h1>
      <div class="w-10"></div> 
    </div>

    <!-- Profile Photo Section -->
    <div class="flex flex-col items-center mb-10">
      <div class="relative">
        <div class="w-24 h-24 bg-[#1B5E3B] rounded-[32px] flex items-center justify-center overflow-hidden border-4 border-white shadow-lg rotate-2">
            <span id="initials" class="font-brand text-white text-3xl font-bold -rotate-2">--</span>
            <img id="profilePreview" src="" class="w-full h-full object-cover hidden -rotate-2" />
        </div>
        <label for="avatarInput" class="absolute -bottom-1 -right-1 w-8 h-8 bg-[#F2A83B] rounded-full flex items-center justify-center border-4 border-[#F5F4EF] shadow-md cursor-pointer">
            <svg class="w-3.5 h-3.5 text-white" fill="currentColor" viewBox="0 0 20 20"><path d="M13.586 3.586a2 2 0 112.828 2.828l-.793.793-2.828-2.828.793-.793zM11.379 5.793L3 14.172V17h2.828l8.38-8.379-2.83-2.828z"></path></svg>
        </label>
        <input type="file" id="avatarInput" class="hidden" accept="image/*" />
      </div>
      <p class="mt-4 text-[10px] font-black text-[#1B5E3B] uppercase tracking-[0.2em]">Change Avatar</p>
    </div>

    <!-- Form -->
    <div class="flex flex-col gap-6">
      <div class="input-group">
        <label class="text-[11px] font-black text-[#9E9E9E] uppercase tracking-widest ml-1 mb-2 block">Full Name</label>
        <div class="bg-white border border-[#E0E0E0] rounded-2xl px-5 py-4 transition-all">
          <input id="editName" type="text" placeholder="John Doe" class="w-full bg-transparent outline-none text-sm font-bold text-[#1A1A1A]" />
        </div>
      </div>

      <div class="input-group">
        <label class="text-[11px] font-black text-[#9E9E9E] uppercase tracking-widest ml-1 mb-2 block">Email Address</label>
        <div class="bg-white border border-[#E0E0E0] rounded-2xl px-5 py-4 transition-all">
          <input id="editEmail" type="email" placeholder="email@example.com" class="w-full bg-transparent outline-none text-sm font-bold text-[#1A1A1A]" />
        </div>
      </div>

      <div class="input-group">
        <label class="text-[11px] font-black text-[#9E9E9E] uppercase tracking-widest ml-1 mb-2 block">Phone Number</label>
        <div class="bg-white border border-[#E0E0E0] rounded-2xl px-5 py-4 transition-all flex items-center gap-3">
          <span class="text-sm font-bold text-[#1B5E3B] border-r border-[#E0E0E0] pr-3">+234</span>
          <input id="editPhone" type="tel" placeholder="8123456789" class="w-full bg-transparent outline-none text-sm font-bold text-[#1A1A1A]" />
        </div>
      </div>
    </div>

    <!-- Update Button -->
    <button id="saveBtn" class="w-full mt-12 py-5 bg-[#1B5E3B] text-white rounded-3xl text-sm font-black tracking-widest uppercase shadow-xl shadow-green-900/20 active:scale-[0.98] transition-all">
      Save Changes
    </button>
  </div>

  <!-- Decorative Element -->
  <div class="fixed top-0 right-0 -z-10 opacity-[0.03]">
    <svg width="300" height="300" viewBox="0 0 200 200" fill="none"><path d="M0 0L200 0L200 200L0 0Z" fill="#1B5E3B"/></svg>
  </div>

  <script type="module">
    import { getMe, updateProfile, requireAuth } from "../js/api.js";

    // Protect Route
    if (requireAuth()) {
      initEditPage();
    }

    const saveBtn = document.getElementById('saveBtn');
    const nameInput = document.getElementById('editName');
    const emailInput = document.getElementById('editEmail');
    const phoneInput = document.getElementById('editPhone');

    async function initEditPage() {
      try {
        const user = await getMe(); //
        
        // Populate inputs
        if (nameInput) nameInput.value = user.full_name || "";
        if (emailInput) emailInput.value = user.email || "";
        if (phoneInput) phoneInput.value = user.phone_number || "";

        // Set Initials
        const initials = (user.full_name || "U").split(" ").map(n => n[0]).join("").substring(0, 2);
        document.getElementById('initials').textContent = initials;
      } catch (error) {
        console.error("Initialization failed:", error);
      }
    }

    saveBtn.addEventListener('click', async () => {
      const originalText = saveBtn.textContent;
      saveBtn.textContent = "SAVING...";
      saveBtn.disabled = true;

      const updatedData = {
        full_name: nameInput.value,
        email: emailInput.value,
        phone_number: phoneInput.value
      };

      try {
        await updateProfile(updatedData); //
        
        // Visual Success Feedback
        saveBtn.style.backgroundColor = "#F2A83B"; 
        saveBtn.textContent = "SUCCESS!";
        
        setTimeout(() => {
          window.location.href = 'profile.html';
        }, 800);
      } catch (error) {
        alert(error.message || "Update failed. Please try again.");
        saveBtn.textContent = originalText;
        saveBtn.disabled = false;
      }
    });
  </script>
</body>
</html>
