<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Smart Ajo – Account Created</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link
      href="https://fonts.googleapis.com/css2?family=Fraunces:wght@700;900&family=DM+Sans:wght@400;500;600&display=swap"
      rel="stylesheet"
    />
    <style>
      @keyframes fadeUp {
        from {
          opacity: 0;
          transform: translateY(24px);
        }
        to {
          opacity: 1;
          transform: translateY(0);
        }
      }
      @keyframes scaleIn {
        from {
          opacity: 0;
          transform: scale(0.6);
        }
        to {
          opacity: 1;
          transform: scale(1);
        }
      }
      .fade-up {
        animation: fadeUp 0.7s ease 0.3s both;
      }
      .scale-in {
        animation: scaleIn 0.6s cubic-bezier(0.34, 1.56, 0.64, 1) both;
      }
    </style>
  </head>
  <body
    class="bg-[#F5F4EF] min-h-screen max-w-[430px] mx-auto flex flex-col items-center justify-center font-['DM_Sans'] px-6"
  >
    <div class="flex flex-col items-center text-center gap-5 w-full">
      <div
        class="scale-in w-36 h-36 bg-[#1B5E3B] rounded-full flex items-center justify-center mb-2 shadow-xl shadow-green-900/20"
      >
        <svg
          class="w-16 h-16 text-white"
          fill="none"
          stroke="currentColor"
          stroke-width="2.5"
          viewBox="0 0 24 24"
        >
          <path
            stroke-linecap="round"
            stroke-linejoin="round"
            d="M5 13l4 4L19 7"
          />
        </svg>
      </div>

      <div class="fade-up w-full">
        <h1 class="font-['Fraunces'] text-3xl font-black text-[#1A1A1A] mb-2 leading-tight">
          Account Created<br />Successfully!
        </h1>
        <p
          class="text-sm text-[#6B6B6B] leading-relaxed max-w-[260px] mx-auto mb-10 font-medium"
        >
          Your account is ready. You can now sign in and start contributing to
          your Ajo groups.
        </p>

        <button 
          onclick="window.location.href = 'signin.html?verified=true'"
          class="w-full py-5 bg-[#1B5E3B] text-white rounded-full text-sm font-black tracking-widest uppercase transition-all duration-300 hover:bg-[#144d30] active:scale-95 shadow-lg shadow-green-900/20"
        >
          Proceed to Sign In
        </button>
      </div>
    </div>
  </body>
</html>
