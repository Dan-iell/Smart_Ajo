<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Smart Ajo – Create Account</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@500;700&family=DM+Sans:wght@400;500;600&display=swap" rel="stylesheet" />
    <script>
      tailwind.config = {
        theme: {
          extend: {
            colors: {
              brandGreen: '#1b5e3b',
              brandGreenDark: '#144d30',
              brandGold: '#f2a83b',
              brandCream: '#faf8f4',
            },
            fontFamily: {
              display: ['Space Grotesk', 'sans-serif'],
              sans: ['DM Sans', 'sans-serif'],
            },
          },
        },
      };
    </script>
    <style>
      @keyframes fadeUp {
        from { opacity: 0; transform: translateY(20px); }
        to { opacity: 1; transform: translateY(0); }
      }
      .fade-up { animation: fadeUp 0.7s ease both; }
      html, body { height: 100%; }
    </style>
  </head>
  <body class="bg-brandCream min-h-screen max-w-[430px] mx-auto flex flex-col font-sans">
    
    <div class="flex flex-col justify-center flex-1 px-6 py-10 fade-up">
      
      <div class="flex gap-2 mb-10">
        <div class="h-1.5 flex-1 bg-brandGreen rounded-full"></div>
        <div class="h-1.5 flex-1 bg-brandGreen/10 rounded-full"></div>
        <div class="h-1.5 flex-1 bg-brandGreen/10 rounded-full"></div>
      </div>

      <h1 class="font-display text-4xl font-bold text-slate-900 mb-2 tracking-tighter">Create Account</h1>
      <p class="text-sm text-slate-500 mb-8 leading-relaxed font-medium">
        Join the community saving smarter with <span class="text-brandGreen">Smart Ajo.</span>
      </p>

      <div class="flex flex-col gap-5">
        <p id="authError" class="text-xs text-red-600 hidden bg-red-50 p-4 rounded-2xl border border-red-100 mb-2 font-medium"></p>

        <div>
          <label class="text-[11px] font-bold uppercase tracking-widest text-brandGreen mb-2 ml-1 block">Full Name</label>
          <div class="flex items-center gap-3 bg-white border border-slate-200 rounded-2xl px-5 py-4 focus-within:border-brandGreen focus-within:ring-4 focus-within:ring-brandGreen/5 transition-all">
            <svg class="w-4 h-4 text-slate-400 shrink-0" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24">
              <circle cx="12" cy="7" r="4" />
              <path d="M5.5 20a7 7 0 0 1 13 0" />
            </svg>
            <input type="text" id="fullName" placeholder="Chiamaka Adewale" class="flex-1 text-sm bg-transparent outline-none text-slate-900 placeholder-slate-400 font-medium" />
          </div>
        </div>

        <div>
          <label class="text-[11px] font-bold uppercase tracking-widest text-brandGreen mb-2 ml-1 block">Email Address</label>
          <div class="flex items-center gap-3 bg-white border border-slate-200 rounded-2xl px-5 py-4 focus-within:border-brandGreen focus-within:ring-4 focus-within:ring-brandGreen/5 transition-all">
            <svg class="w-4 h-4 text-slate-400 shrink-0" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24">
              <rect x="2" y="4" width="20" height="16" rx="2" />
              <path d="m2 7 10 7 10-7" />
            </svg>
            <input type="email" id="email" placeholder="example@gmail.com" class="flex-1 text-sm bg-transparent outline-none text-slate-900 placeholder-slate-400 font-medium" />
          </div>
        </div>

        <div>
          <label class="text-[11px] font-bold uppercase tracking-widest text-brandGreen mb-2 ml-1 block">Phone Number</label>
          <div class="flex items-center gap-3 bg-white border border-slate-200 rounded-2xl px-5 py-4 focus-within:border-brandGreen focus-within:ring-4 focus-within:ring-brandGreen/5 transition-all">
            <svg class="w-4 h-4 text-slate-400 shrink-0" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24">
              <path d="M22 16.92v3a2 2 0 0 1-2.18 2A19.79 19.79 0 0 1 3.08 4.18 2 2 0 0 1 5.07 2h3a2 2 0 0 1 2 1.72 12.05 12.05 0 0 0 .57 2.57 2 2 0 0 1-.45 2.11L9.91 9.91a16 16 0 0 0 6.18 6.18l1.51-1.51a2 2 0 0 1 2.11-.45 12.05 12.05 0 0 0 2.57.57A2 2 0 0 1 22 16.92z" />
            </svg>
            <input type="tel" id="phone" placeholder="+234 000 000 0000" class="flex-1 text-sm bg-transparent outline-none text-slate-900 placeholder-slate-400 font-medium" />
          </div>
        </div>

        <div>
          <label class="text-[11px] font-bold uppercase tracking-widest text-brandGreen mb-2 ml-1 block">Password</label>
          <div class="flex items-center gap-3 bg-white border border-slate-200 rounded-2xl px-5 py-4 focus-within:border-brandGreen focus-within:ring-4 focus-within:ring-brandGreen/5 transition-all">
            <svg class="w-4 h-4 text-slate-400 shrink-0" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24">
              <rect x="3" y="11" width="18" height="11" rx="2" />
              <path d="M7 11V7a5 5 0 0 1 10 0v4" />
            </svg>
            <input type="password" id="password" placeholder="••••••••" class="flex-1 text-sm bg-transparent outline-none text-slate-900 placeholder-slate-400 font-medium" />
            <button type="button" onclick="togglePass('password')" class="text-slate-400 hover:text-brandGreen transition-colors">
              <svg class="w-5 h-5" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24">
                <path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z" />
                <circle cx="12" cy="12" r="3" />
              </svg>
            </button>
          </div>
        </div>

        <div>
          <label class="text-[11px] font-bold uppercase tracking-widest text-brandGreen mb-2 ml-1 block">Confirm Password</label>
          <div class="flex items-center gap-3 bg-white border border-slate-200 rounded-2xl px-5 py-4 focus-within:border-brandGreen focus-within:ring-4 focus-within:ring-brandGreen/5 transition-all">
            <svg class="w-4 h-4 text-slate-400 shrink-0" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24">
              <rect x="3" y="11" width="18" height="11" rx="2" />
              <path d="M7 11V7a5 5 0 0 1 10 0v4" />
            </svg>
            <input type="password" id="confirmPassword" placeholder="Confirm password" class="flex-1 text-sm bg-transparent outline-none text-slate-900 placeholder-slate-400 font-medium" />
            <button type="button" onclick="togglePass('confirmPassword')" class="text-slate-400 hover:text-brandGreen transition-colors">
              <svg class="w-5 h-5" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24">
                <path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z" />
                <circle cx="12" cy="12" r="3" />
              </svg>
            </button>
          </div>
        </div>

        <label class="flex items-start gap-4 cursor-pointer mt-3">
          <input type="checkbox" id="terms" class="mt-1 w-4 h-4 accent-brandGreen shrink-0" />
          <span class="text-[11px] text-slate-500 leading-relaxed font-medium">
            I agree to the <a href="#" class="text-brandGreen font-bold hover:underline underline-offset-4">Terms & Conditions</a> and <a href="#" class="text-brandGreen font-bold hover:underline underline-offset-4">Privacy Policy</a>
          </span>
        </label>

        <button id="signUpBtn" type="button" class="w-full py-4 bg-brandGreen text-white rounded-2xl text-sm font-bold tracking-wide mt-4 transition-all duration-300 hover:bg-brandGreenDark hover:shadow-lg hover:shadow-brandGreen/20 active:scale-95">
          Create Account
        </button>

        <p class="text-center text-xs text-slate-500 mt-4">
          Already have an account? <a href="signin.html" class="text-brandGreen font-bold hover:underline underline-offset-4 ml-1">Sign In</a>
        </p>
      </div>
    </div>

    <script type="module">
      import { handleSignUp, redirectIfLoggedIn, togglePasswordVisibility } from "../js/auth.js";

      redirectIfLoggedIn();

      window.togglePass = (id) => togglePasswordVisibility(id);

      const signUpBtn = document.getElementById("signUpBtn");
      if (signUpBtn) {
        signUpBtn.addEventListener("click", (e) => {
          e.preventDefault();
          handleSignUp();
        });
      }
    </script>
  </body>
</html>
