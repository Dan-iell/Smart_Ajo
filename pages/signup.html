<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Smart Ajo – Create Account</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Fraunces:wght@700;900&family=DM+Sans:wght@400;500;600&display=swap" rel="stylesheet" />
    <style>
      @keyframes fadeUp {
        from { opacity: 0; transform: translateY(20px); }
        to { opacity: 1; transform: translateY(0); }
      }
      .fade-up { animation: fadeUp 0.7s ease both; }
      html, body { height: 100%; }
    </style>
  </head>
  <body class="bg-[#F5F4EF] min-h-screen max-w-[430px] mx-auto flex flex-col font-['DM_Sans']">
    
    <div class="flex flex-col justify-center flex-1 px-6 py-10 fade-up">
      
      <!-- Progress Steps (Updated to 3 tabs) -->
      <div class="flex gap-1.5 mb-8">
        <div class="h-1 flex-1 bg-[#3A3A3A] rounded-full"></div>
        <div class="h-1 flex-1 bg-[#E0E0E0] rounded-full"></div>
        <div class="h-1 flex-1 bg-[#E0E0E0] rounded-full"></div>
      </div>

      <h1 class="font-['Fraunces'] text-3xl font-bold text-black mb-1">Create Account</h1>
      <p class="text-sm text-[#6B6B6B] mb-7 leading-relaxed">
        Join thousands already saving smarter with their community and financial heritage.
      </p>

      <div class="flex flex-col gap-4">
        <p id="authError" class="text-xs text-red-500 hidden bg-red-50 p-3 rounded-lg border border-red-100 mb-2"></p>

        <!-- Full Name -->
        <div>
          <label class="text-sm font-medium text-[#3A3A3A] mb-1.5 block">Full Name</label>
          <div class="flex items-center gap-2 bg-white border border-[#E0E0E0] rounded-xl px-4 py-3.5 focus-within:border-black transition-colors">
            <svg class="w-4 h-4 text-[#9E9E9E] shrink-0" fill="none" stroke="currentColor" stroke-width="1.8" viewBox="0 0 24 24">
              <circle cx="12" cy="7" r="4" />
              <path d="M5.5 20a7 7 0 0 1 13 0" />
            </svg>
            <input type="text" id="fullName" placeholder="Full name" class="flex-1 text-sm bg-transparent outline-none text-[#3A3A3A] placeholder-[#BDBDBD]" />
          </div>
        </div>

        <!-- Email -->
        <div>
          <label class="text-sm font-medium text-[#3A3A3A] mb-1.5 block">Email</label>
          <div class="flex items-center gap-2 bg-white border border-[#E0E0E0] rounded-xl px-4 py-3.5 focus-within:border-black transition-colors">
            <svg class="w-4 h-4 text-[#9E9E9E] shrink-0" fill="none" stroke="currentColor" stroke-width="1.8" viewBox="0 0 24 24">
              <rect x="2" y="4" width="20" height="16" rx="2" />
              <path d="m2 7 10 7 10-7" />
            </svg>
            <input type="email" id="email" placeholder="example@gmail.com" class="flex-1 text-sm bg-transparent outline-none text-[#3A3A3A] placeholder-[#BDBDBD]" />
          </div>
        </div>

        <!-- Phone -->
        <div>
          <label class="text-sm font-medium text-[#3A3A3A] mb-1.5 block">Phone Number</label>
          <div class="flex items-center gap-2 bg-white border border-[#E0E0E0] rounded-xl px-4 py-3.5 focus-within:border-black transition-colors">
            <svg class="w-4 h-4 text-[#9E9E9E] shrink-0" fill="none" stroke="currentColor" stroke-width="1.8" viewBox="0 0 24 24">
              <path d="M22 16.92v3a2 2 0 0 1-2.18 2A19.79 19.79 0 0 1 3.08 4.18 2 2 0 0 1 5.07 2h3a2 2 0 0 1 2 1.72 12.05 12.05 0 0 0 .57 2.57 2 2 0 0 1-.45 2.11L9.91 9.91a16 16 0 0 0 6.18 6.18l1.51-1.51a2 2 0 0 1 2.11-.45 12.05 12.05 0 0 0 2.57.57A2 2 0 0 1 22 16.92z" />
            </svg>
            <input type="tel" id="phone" placeholder="+234 000 000 0000" class="flex-1 text-sm bg-transparent outline-none text-[#3A3A3A] placeholder-[#BDBDBD]" />
          </div>
        </div>

        <!-- Password -->
        <div>
          <label class="text-sm font-medium text-[#3A3A3A] mb-1.5 block">Password</label>
          <div class="flex items-center gap-2 bg-white border border-[#E0E0E0] rounded-xl px-4 py-3.5 focus-within:border-black transition-colors">
            <svg class="w-4 h-4 text-[#9E9E9E] shrink-0" fill="none" stroke="currentColor" stroke-width="1.8" viewBox="0 0 24 24">
              <rect x="3" y="11" width="18" height="11" rx="2" />
              <path d="M7 11V7a5 5 0 0 1 10 0v4" />
            </svg>
            <input type="password" id="password" placeholder="Enter password" class="flex-1 text-sm bg-transparent outline-none text-[#3A3A3A] placeholder-[#BDBDBD]" />
            <button type="button" onclick="togglePass('password')" class="text-[#9E9E9E] hover:text-black">
              <svg class="w-4 h-4" fill="none" stroke="currentColor" stroke-width="1.8" viewBox="0 0 24 24">
                <path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z" />
                <circle cx="12" cy="12" r="3" />
              </svg>
            </button>
          </div>
        </div>

        <!-- Confirm Password -->
        <div>
          <label class="text-sm font-medium text-[#3A3A3A] mb-1.5 block">Confirm Password</label>
          <div class="flex items-center gap-2 bg-white border border-[#E0E0E0] rounded-xl px-4 py-3.5 focus-within:border-black transition-colors">
            <svg class="w-4 h-4 text-[#9E9E9E] shrink-0" fill="none" stroke="currentColor" stroke-width="1.8" viewBox="0 0 24 24">
              <rect x="3" y="11" width="18" height="11" rx="2" />
              <path d="M7 11V7a5 5 0 0 1 10 0v4" />
            </svg>
            <input type="password" id="confirmPassword" placeholder="Confirm password" class="flex-1 text-sm bg-transparent outline-none text-[#3A3A3A] placeholder-[#BDBDBD]" />
            <button type="button" onclick="togglePass('confirmPassword')" class="text-[#9E9E9E] hover:text-black">
              <svg class="w-4 h-4" fill="none" stroke="currentColor" stroke-width="1.8" viewBox="0 0 24 24">
                <path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z" />
                <circle cx="12" cy="12" r="3" />
              </svg>
            </button>
          </div>
        </div>

        <label class="flex items-start gap-3 cursor-pointer mt-2">
          <input type="checkbox" id="terms" class="mt-0.5 w-4 h-4 accent-[#3A3A3A] shrink-0" />
          <span class="text-xs text-[#6B6B6B] leading-relaxed">
            I agree to the <a href="#" class="text-black font-semibold underline underline-offset-2">Terms & Conditions</a> and <a href="#" class="text-black font-semibold underline underline-offset-2">Privacy Policy</a>
          </span>
        </label>

        <button id="signUpBtn" type="button" class="w-full py-4 bg-[#3A3A3A] text-white rounded-full text-sm font-semibold tracking-wide mt-2 transition-all duration-200 hover:bg-black active:scale-95">
          Create Account
        </button>

        <p class="text-center text-xs text-[#6B6B6B] mt-2">
          Already have an account? <a href="signin.html" class="text-black font-semibold underline underline-offset-2">Sign In</a>
        </p>
      </div>
    </div>

    <script type="module">
      import { handleSignUp, redirectIfLoggedIn, togglePasswordVisibility } from "../js/auth.js";

      // 1. Guard check
      redirectIfLoggedIn();

      // 2. Fix the "togglePass is not defined" error from image_395958.png
      // We expose it to the window so the onclick attributes can find it
      window.togglePass = (id) => togglePasswordVisibility(id);

      // 3. Attach click listener
      const signUpBtn = document.getElementById("signUpBtn");
      if (signUpBtn) {
        signUpBtn.addEventListener("click", (e) => {
          e.preventDefault();
          handleSignUp();
        });
      }
    </script>
  </body>
</html>
