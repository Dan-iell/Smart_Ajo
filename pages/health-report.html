<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/><meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Smart Ajo – Health Report</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <link href="https://fonts.googleapis.com/css2?family=Fraunces:wght@700;900&family=DM+Sans:wght@400;500;600&display=swap" rel="stylesheet"/>
  <style>
    @keyframes fadeUp{from{opacity:0;transform:translateY(16px);}to{opacity:1;transform:translateY(0);}}
    @keyframes growBar{from{width:0;}to{width:var(--w);}}
    .fade-up{animation:fadeUp 0.5s ease both;}
    .fade-up-2{animation:fadeUp 0.5s ease 0.1s both;}
    .bar{animation:growBar 1s ease 0.3s both;}
    body{padding-bottom:90px;}
    [v-cloak] { display: none; }
  </style>
</head>
<body class="bg-[#F5F4EF] min-h-screen max-w-[430px] mx-auto font-['DM_Sans']">

  <div class="px-5 pt-10">

    <!-- Header -->
    <div class="flex items-center gap-3 mb-7 fade-up">
      <button onclick="window.history.back()" class="w-9 h-9 flex items-center justify-center rounded-full bg-white border border-[#E0E0E0] hover:bg-gray-50 active:scale-95 transition-all">
        <svg class="w-4 h-4 text-[#1B5E3B]" fill="none" stroke="currentColor" stroke-width="2.5" viewBox="0 0 24 24"><path d="M15 18l-6-6 6-6"/></svg>
      </button>
      <h1 class="font-['Fraunces'] text-xl font-bold text-[#1A1A1A]">Health Report</h1>
    </div>

    <!-- Overall Score (Brand Focus) -->
    <div class="bg-white rounded-3xl p-6 mb-5 text-center fade-up shadow-sm border border-white">
      <p class="text-xs font-bold text-[#9E9E9E] uppercase tracking-wider mb-2">Overall Group Score</p>
      <p id="overallScore" class="font-['Fraunces'] text-7xl font-black text-[#1B5E3B] mb-1">--</p>
      <div class="flex items-center justify-center gap-1.5 mb-6">
        <div id="statusIcon">
            <svg class="w-4 h-4 text-[#9E9E9E]" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><circle cx="12" cy="12" r="10"/><path d="M12 8v4l3 3"/></svg>
        </div>
        <p id="statusText" class="text-sm font-bold text-[#9E9E9E]">Waiting for data</p>
      </div>
      
      <!-- Mini score bar (Gold Fill) -->
      <div class="h-3 bg-[#F0F0F0] rounded-full overflow-hidden">
        <div id="overallBar" class="bar h-full bg-[#E0E0E0] rounded-full" style="--w:0%; width:0%"></div>
      </div>
      <div class="flex justify-between text-[10px] font-bold text-[#9E9E9E] mt-2 px-1">
        <span>POOR</span><span>STABLE</span><span>EXCELLENT</span>
      </div>
    </div>

    <!-- Score Breakdown -->
    <div class="bg-white rounded-3xl p-5 mb-5 fade-up-2 shadow-sm border border-white">
      <p class="text-sm font-bold text-[#1A1A1A] mb-5 flex items-center gap-2">
        <span class="w-1.5 h-4 bg-[#F2A83B] rounded-full"></span>
        Score Breakdown
      </p>
      <div id="breakdownContainer" class="flex flex-col gap-6">
        <p id="noDataMessage" class="text-xs text-[#9E9E9E] text-center py-4 font-medium italic">No contribution activity recorded yet.</p>
      </div>
    </div>

    <!-- AI Insights (Themed) -->
    <div class="bg-[#1B5E3B]/5 border border-[#1B5E3B]/10 rounded-2xl p-5 mb-5 fade-up-2">
      <p class="text-xs font-bold text-[#1B5E3B] mb-3 flex items-center gap-2">
        <span class="text-base">🤖</span> AI INSIGHTS
      </p>
      <div id="aiInsightsContent">
        <p class="text-xs text-[#6B6B6B] leading-relaxed font-medium">
            Welcome to your new group! AI insights and health scores will be generated automatically once the first contribution cycle begins.
        </p>
      </div>
    </div>

  </div>

  <!-- Bottom Nav (Standard Smart Ajo Style) -->
  <div class="fixed bottom-0 left-1/2 -translate-x-1/2 w-full max-w-[430px] bg-white border-t border-[#F0F0F0] px-6 py-3 flex items-center justify-between z-50">
    <button onclick="window.location.href='dashboard.html'" class="flex flex-col items-center gap-1 text-[#9E9E9E]">
      <svg class="w-5 h-5" fill="none" stroke="currentColor" stroke-width="1.8" viewBox="0 0 24 24"><path d="M3 12L12 3l9 9"/><path d="M9 21V12h6v9"/></svg>
      <span class="text-[10px]">Home</span>
    </button>
    <button onclick="window.location.href='groups.html'" class="flex flex-col items-center gap-1 text-[#1B5E3B]">
      <svg class="w-5 h-5" fill="currentColor" viewBox="0 0 24 24"><path d="M16 11c1.66 0 2.99-1.34 2.99-3S17.66 5 16 5c-1.66 0-3 1.34-3 3s1.34 3 3 3zm-8 0c1.66 0 2.99-1.34 2.99-3S9.66 5 8 5C6.34 5 5 6.34 5 8s1.34 3 3 3zm0 2c-2.33 0-7 1.17-7 3.5V19h14v-2.5c0-2.33-4.67-3.5-7-3.5zm8 0c-.29 0-.62.02-.97.05 1.16.84 1.97 1.97 1.97 3.45V19h6v-2.5c0-2.33-4.67-3.5-7-3.5z"/></svg>
      <span class="text-[10px] font-bold">Groups</span>
    </button>
    
    <!-- Central Action Button (Gold) -->
    <button onclick="window.location.href='make-payment.html'" class="w-14 h-14 bg-[#F2A83B] rounded-full flex items-center justify-center -mt-8 shadow-xl shadow-orange-900/30 active:scale-95 transition-all">
      <svg class="w-6 h-6 text-white" fill="none" stroke="currentColor" stroke-width="2.5" viewBox="0 0 24 24"><path d="M12 5v14M5 12h14"/></svg>
    </button>

    <button onclick="window.location.href='alerts.html'" class="flex flex-col items-center gap-1 text-[#9E9E9E]">
      <svg class="w-5 h-5" fill="none" stroke="currentColor" stroke-width="1.8" viewBox="0 0 24 24"><path d="M18 8A6 6 0 0 0 6 8c0 7-3 9-3 9h18s-3-2-3-9"/><path d="M13.73 21a2 2 0 0 1-3.46 0"/></svg>
      <span class="text-[10px]">Alerts</span>
    </button>
    <button onclick="window.location.href='profile.html'" class="flex flex-col items-center gap-1 text-[#9E9E9E]">
      <svg class="w-5 h-5" fill="none" stroke="currentColor" stroke-width="1.8" viewBox="0 0 24 24"><circle cx="12" cy="7" r="4"/><path d="M5.5 20a7 7 0 0 1 13 0"/></svg>
      <span class="text-[10px]">Profile</span>
    </button>
  </div>

  <script type="module">
    import { getGroupDetail } from "../js/api.js";

    async function loadHealthData() {
      const urlParams = new URLSearchParams(window.location.search);
      const groupId = urlParams.get("id");
      if (!groupId) return;

      try {
        const group = await getGroupDetail(groupId);
        // Checking if cycle has started based on members and pool
        const currentPool = parseFloat(group.current_pool || 0);
        if (currentPool > 0 || group.members_count > 0) {
            renderActiveState();
        } 
      } catch (e) {
        console.error("Error loading health data:", e);
      }
    }

    function renderActiveState() {
        // Update Overall - Using Deep Green for high scores
        document.getElementById("overallScore").textContent = "85";
        document.getElementById("statusText").textContent = "Healthy Growth";
        document.getElementById("statusText").className = "text-sm font-bold text-[#1B5E3B]";
        document.getElementById("overallBar").style.setProperty('--w', '85%');
        document.getElementById("overallBar").className = "bar h-full bg-[#1B5E3B] rounded-full";
        document.getElementById("statusIcon").innerHTML = `<svg class="w-4 h-4 text-[#1B5E3B]" fill="none" stroke="currentColor" stroke-width="2.5" viewBox="0 0 24 24"><path d="M22 11.08V12a10 10 0 1 1-5.93-9.14"/><path d="M22 4L12 14.01l-3-3"/></svg>`;

        // Update Breakdown - Mixing Green and Gold
        document.getElementById("breakdownContainer").innerHTML = `
            <div>
                <div class="flex items-center justify-between mb-2">
                    <p class="text-xs font-bold text-[#6B6B6B]">On-Time Contribution Rate</p>
                    <p class="text-xs font-bold text-[#1A1A1A]">90%</p>
                </div>
                <div class="h-2 bg-[#F0F0F0] rounded-full overflow-hidden">
                    <div class="bar h-full bg-[#F2A83B] rounded-full" style="--w:90%; width:90%"></div>
                </div>
            </div>
            <div>
                <div class="flex items-center justify-between mb-2">
                    <p class="text-xs font-bold text-[#6B6B6B]">Member Trust Index</p>
                    <p class="text-xs font-bold text-[#1A1A1A]">82%</p>
                </div>
                <div class="h-2 bg-[#F0F0F0] rounded-full overflow-hidden">
                    <div class="bar h-full bg-[#1B5E3B] rounded-full" style="--w:82%; width:82%"></div>
                </div>
            </div>
        `;

        // Update AI Insights
        document.getElementById("aiInsightsContent").innerHTML = `
            <ul class="flex flex-col gap-3">
                <li class="text-xs text-[#6B6B6B] font-medium leading-relaxed flex items-start gap-3">
                    <span class="text-[#1B5E3B] shrink-0 font-bold">✓</span> 
                    Excellent momentum! Contributions are currently 90% on-time, which is above the platform average.
                </li>
                <li class="text-xs text-[#6B6B6B] font-medium leading-relaxed flex items-start gap-3">
                    <span class="text-[#F2A83B] shrink-0 font-bold">!</span> 
                    Tip: Invite 2 more members to reach the optimal rotation speed for this target pool.
                </li>
            </ul>
        `;
    }

    loadHealthData();
  </script>
</body>
</html>
