<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Smart Ajo – Group Details</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Fraunces:wght@700;900&family=DM+Sans:wght@400;500;600&display=swap" rel="stylesheet" />
    <style>
      @keyframes fadeUp { from { opacity: 0; transform: translateY(14px); } to { opacity: 1; transform: translateY(0); } }
      .fade-up { animation: fadeUp 0.5s ease both; }
      body { padding-bottom: 100px; font-family: 'DM Sans', sans-serif; }
      .tab-content { display: none; }
      .tab-content.active { display: block; animation: fadeUp 0.35s ease both; }
      .circle-bg   { fill: none; stroke: rgba(255,255,255,0.1); stroke-width: 10; }
      .circle-fill { fill: none; stroke: #F2A83B; stroke-width: 10; stroke-linecap: round; transform: rotate(-90deg); transform-origin: 50% 50%; transition: stroke-dashoffset 1s ease-out; }
      .risk-circle-bg   { fill: none; stroke: #E0E0E0; stroke-width: 10; }
      .risk-circle-fill { fill: none; stroke: #1B5E3B; stroke-width: 10; stroke-linecap: round; transform: rotate(-90deg); transform-origin: 50% 50%; transition: stroke-dashoffset 1s ease-out; }
      .scrollbar-hide::-webkit-scrollbar { display: none; }
    </style>
  </head>
  <body class="bg-[#F5F4EF] min-h-screen max-w-[430px] mx-auto">

    <!-- Header -->
    <div class="bg-[#1B5E3B] px-5 pt-10 pb-20 relative overflow-hidden">
      <div class="absolute top-0 right-0 w-32 h-32 bg-white/5 rounded-full -mr-10 -mt-10"></div>

      <div class="flex items-center justify-between mb-6 relative z-10">
        <button onclick="window.location.href = 'groups.html'"
          class="w-9 h-9 flex items-center justify-center rounded-full bg-white/10 transition-colors">
          <svg class="w-4 h-4 text-white" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><path d="M15 18l-6-6 6-6"/></svg>
        </button>
        <h1 id="groupTitle" class="text-lg font-bold text-white font-['Fraunces']">Loading…</h1>
        <div class="w-9"></div>
      </div>

      <!-- Progress circle -->
      <div class="flex flex-col items-center relative z-10">
        <div class="relative w-40 h-40 mb-3">
          <svg viewBox="0 0 110 110" class="w-full h-full">
            <circle class="circle-bg" cx="55" cy="55" r="50"/>
            <circle id="progressCircle" class="circle-fill" cx="55" cy="55" r="50" stroke-dasharray="314" stroke-dashoffset="314"/>
          </svg>
          <div class="absolute inset-0 flex flex-col items-center justify-center px-3 text-center">
            <p class="text-white text-[10px] opacity-60 mb-0.5">Current Pool</p>
            <p id="currentPool" class="text-white text-xl font-bold leading-tight">₦0</p>
            <span id="progressText" class="mt-1.5 bg-[#F2A83B] text-white text-[10px] font-bold px-2.5 py-0.5 rounded-full shadow-lg">0%</span>
          </div>
        </div>

        <!-- Target pool + frequency label -->
        <p class="text-white/60 text-xs">Total Target Pool</p>
        <p id="targetPool" class="text-white text-xl font-bold">₦0</p>
        <p id="poolFormula" class="text-white/50 text-[10px] mt-1 font-medium">—</p>
      </div>
    </div>

    <!-- Tabs -->
    <div class="bg-[#F5F4EF] rounded-t-3xl -mt-8 px-5 pt-5 relative z-20">
      <div class="flex border-b border-[#E0E0E0] mb-5 overflow-x-auto scrollbar-hide">
        <button id="tab-overview"      onclick="switchTab('overview')"      class="shrink-0 px-3 py-3 text-xs font-bold   text-[#1B5E3B] border-b-2 border-[#1B5E3B]  transition-all">Overview</button>
        <button id="tab-members"       onclick="switchTab('members')"       class="shrink-0 px-3 py-3 text-xs font-medium text-[#9E9E9E] border-b-2 border-transparent transition-all">Members</button>
        <button id="tab-contributions" onclick="switchTab('contributions')" class="shrink-0 px-3 py-3 text-xs font-medium text-[#9E9E9E] border-b-2 border-transparent transition-all">Contributions</button>
        <button id="tab-rotation"      onclick="switchTab('rotation')"      class="shrink-0 px-3 py-3 text-xs font-medium text-[#9E9E9E] border-b-2 border-transparent transition-all">Rotation</button>
        <button id="tab-risk"          onclick="switchTab('risk')"          class="shrink-0 px-3 py-3 text-xs font-medium text-[#9E9E9E] border-b-2 border-transparent transition-all">AI Risk</button>
      </div>

      <!-- Overview -->
      <div id="content-overview" class="tab-content active">
        <p class="text-[11px] font-bold text-[#9E9E9E] uppercase mb-3 tracking-wider">Group Summary</p>
        <div class="bg-white rounded-2xl overflow-hidden border border-[#F5F5F5] shadow-sm">

          <div class="flex items-center justify-between px-4 py-3.5 border-b border-[#F5F5F5]">
            <span class="text-sm text-[#6B6B6B]">Contribution / cycle</span>
            <span id="summaryContribution" class="text-sm font-bold text-[#F2A83B]">₦0</span>
          </div>
          <div class="flex items-center justify-between px-4 py-3.5 border-b border-[#F5F5F5]">
            <span class="text-sm text-[#6B6B6B]">Frequency</span>
            <span id="summaryFrequency" class="text-sm font-bold text-[#1A1A1A] capitalize">—</span>
          </div>
          <div class="flex items-center justify-between px-4 py-3.5 border-b border-[#F5F5F5]">
            <span class="text-sm text-[#6B6B6B]">Max members</span>
            <span id="summaryMembers" class="text-sm font-bold text-[#1A1A1A]">0</span>
          </div>
          <div class="flex items-center justify-between px-4 py-3.5 border-b border-[#F5F5F5]">
            <span class="text-sm text-[#6B6B6B]">Total pool (target)</span>
            <span id="summaryTotalPool" class="text-sm font-bold text-[#1B5E3B]">₦0</span>
          </div>
          <div class="flex items-center justify-between px-4 py-3.5">
            <span class="text-sm text-[#6B6B6B]">Current round</span>
            <span id="summaryRound" class="text-sm font-bold text-[#1A1A1A]">—</span>
          </div>
        </div>

        <!-- Start date -->
        <div class="mt-4 bg-white rounded-2xl px-4 py-3.5 border border-[#F5F5F5] shadow-sm flex items-center justify-between">
          <span class="text-sm text-[#6B6B6B]">Start date</span>
          <span id="summaryStartDate" class="text-sm font-bold text-[#1A1A1A]">—</span>
        </div>
      </div>

      <!-- Members -->
      <div id="content-members" class="tab-content">
        <div id="membersList" class="flex flex-col gap-3">
          <p class="text-center py-10 text-[#9E9E9E] text-xs">Loading members…</p>
        </div>
      </div>

      <!-- Contributions -->
      <div id="content-contributions" class="tab-content">
        <p class="text-center py-10 text-[#9E9E9E] text-xs">Loading contributions…</p>
      </div>

      <!-- Rotation -->
      <div id="content-rotation" class="tab-content">
        <p class="text-center py-10 text-[#9E9E9E] text-xs">Loading schedule…</p>
      </div>

      <!-- AI Risk -->
      <div id="content-risk" class="tab-content">
        <div onclick="navigateToHealthReport()"
          class="bg-white rounded-3xl border border-[#F5F5F5] p-8 flex flex-col items-center mb-6 cursor-pointer active:scale-95 transition-transform shadow-sm">
          <p class="text-xs font-bold text-[#1A1A1A] mb-6">Group Health Score</p>
          <div class="relative w-32 h-32 mb-4">
            <svg viewBox="0 0 110 110" class="w-full h-full">
              <circle class="risk-circle-bg" cx="55" cy="55" r="50"/>
              <circle id="riskCircleFill" class="risk-circle-fill" cx="55" cy="55" r="50" stroke-dasharray="314" stroke-dashoffset="314"/>
            </svg>
            <div class="absolute inset-0 flex flex-col items-center justify-center">
              <span id="healthScoreValue" class="text-3xl font-bold text-[#1B5E3B]">—</span>
              <span class="text-[10px] text-[#9E9E9E]">out of 100</span>
            </div>
          </div>
          <p id="healthStatusText" class="text-xs font-bold text-[#F2A83B]">Calculating…</p>
        </div>
      </div>
    </div>

    <!-- Bottom Nav -->
    <div class="fixed bottom-0 left-1/2 -translate-x-1/2 w-full max-w-[430px] bg-white border-t border-[#F0F0F0] px-6 py-3 flex items-center justify-between z-50">
      <button onclick="window.location.href='dashboard.html'" class="flex flex-col items-center gap-1 text-[#9E9E9E]">
        <svg class="w-5 h-5" fill="none" stroke="currentColor" stroke-width="1.8" viewBox="0 0 24 24"><path d="M3 12L12 3l9 9"/><path d="M9 21V12h6v9"/></svg>
        <span class="text-[10px] font-medium">Home</span>
      </button>
      <button onclick="window.location.href='groups.html'" class="flex flex-col items-center gap-1 text-[#1B5E3B]">
        <svg class="w-5 h-5" fill="currentColor" viewBox="0 0 24 24"><path d="M16 11c1.66 0 2.99-1.34 2.99-3S17.66 5 16 5c-1.66 0-3 1.34-3 3s1.34 3 3 3zm-8 0c1.66 0 2.99-1.34 2.99-3S9.66 5 8 5C6.34 5 5 6.34 5 8s1.34 3 3 3zm0 2c-2.33 0-7 1.17-7 3.5V19h14v-2.5c0-2.33-4.67-3.5-7-3.5zm8 0c-.29 0-.62.02-.97.05 1.16.84 1.97 1.97 1.97 3.45V19h6v-2.5c0-2.33-4.67-3.5-7-3.5z"/></svg>
        <span class="text-[10px] font-bold">Groups</span>
      </button>
      <button onclick="window.location.href='make-payment.html'"
        class="w-14 h-14 bg-[#F2A83B] rounded-full flex items-center justify-center -mt-8 shadow-xl shadow-orange-900/30 active:scale-90 transition-transform">
        <svg class="w-6 h-6 text-white" fill="none" stroke="currentColor" stroke-width="2.5" viewBox="0 0 24 24"><path d="M12 5v14M5 12h14"/></svg>
      </button>
      <button onclick="window.location.href='alerts.html'" class="flex flex-col items-center gap-1 text-[#9E9E9E]">
        <svg class="w-5 h-5" fill="none" stroke="currentColor" stroke-width="1.8" viewBox="0 0 24 24"><path d="M18 8A6 6 0 0 0 6 8c0 7-3 9-3 9h18s-3-2-3-9"/><path d="M13.73 21a2 2 0 0 1-3.46 0"/></svg>
        <span class="text-[10px] font-medium">Alerts</span>
      </button>
      <button onclick="window.location.href='profile.html'" class="flex flex-col items-center gap-1 text-[#9E9E9E]">
        <svg class="w-5 h-5" fill="none" stroke="currentColor" stroke-width="1.8" viewBox="0 0 24 24"><circle cx="12" cy="7" r="4"/><path d="M5.5 20a7 7 0 0 1 13 0"/></svg>
        <span class="text-[10px] font-medium">Profile</span>
      </button>
    </div>

    <script type="module">
      import { getGroupDetail, getCycleContributions, getNextPayout, getGroupHealthScore } from "../js/api.js";

      const urlParams = new URLSearchParams(window.location.search);
      const groupId   = urlParams.get("id");
      const loaded    = { contributions: false, rotation: false, risk: false };

      // ─── Frequency label helper ───────────────────────────────
      const FREQ_LABEL = {
        daily:     "day",
        weekly:    "week",
        biweekly:  "2 weeks",
        monthly:   "month",
      };

      function freqLabel(f) {
        return FREQ_LABEL[f?.toLowerCase()] ?? f ?? "cycle";
      }

      // ─── Main init ────────────────────────────────────────────
      async function initDetails() {
        if (!groupId) return;

        try {
          const group = await getGroupDetail(groupId);

          // ── Raw fields from API ──────────────────────────────
          const contributionAmount = parseFloat(group.contribution_amount) || 0;
          const maxMembers         = group.max_members    || 0;
          const currentRound       = group.current_round  || 0;
          const frequency          = group.contribution_frequency || "monthly";

          // ── Calculated values ────────────────────────────────
          // Total pool = what everyone pays in × number of members
          const totalPool   = contributionAmount * maxMembers;
          // Current pool = contributions collected so far (rounds completed × amount)
          const currentPool = contributionAmount * currentRound;
          // Progress = how many rounds done out of total members (each member gets 1 round)
          const pct = maxMembers > 0
            ? Math.min(Math.round((currentRound / maxMembers) * 100), 100)
            : 0;

          // ── Header ───────────────────────────────────────────
          document.getElementById("groupTitle").textContent = group.name;

          document.getElementById("currentPool").textContent =
            `₦${currentPool.toLocaleString("en-NG")}`;

          document.getElementById("targetPool").textContent =
            `₦${totalPool.toLocaleString("en-NG")}`;

          // e.g. "₦50,000/month × 10 members"
          document.getElementById("poolFormula").textContent =
            `₦${contributionAmount.toLocaleString("en-NG")}/${freqLabel(frequency)} × ${maxMembers} members`;

          document.getElementById("progressText").textContent = `${pct}% Complete`;
          document.getElementById("progressCircle").style.strokeDashoffset =
            314 - (pct / 100) * 314;

          // ── Overview tab ─────────────────────────────────────
          document.getElementById("summaryContribution").textContent =
            `₦${contributionAmount.toLocaleString("en-NG")}`;

          document.getElementById("summaryFrequency").textContent =
            frequency.charAt(0).toUpperCase() + frequency.slice(1);

          document.getElementById("summaryMembers").textContent = maxMembers;

          document.getElementById("summaryTotalPool").textContent =
            `₦${totalPool.toLocaleString("en-NG")}`;

          document.getElementById("summaryRound").textContent =
            currentRound ? `${currentRound} of ${maxMembers}` : "Not started";

          document.getElementById("summaryStartDate").textContent =
            group.start_date
              ? new Date(group.start_date).toLocaleDateString("en-NG", { year: "numeric", month: "long", day: "numeric" })
              : "—";

          // ── Members tab ──────────────────────────────────────
          const members = group.members || [];
          document.getElementById("membersList").innerHTML = members.length
            ? members.map((m) => {
                const name     = m.full_name || m.name || "Member";
                const initials = name.split(" ").map((n) => n[0]).join("").substring(0, 2).toUpperCase();
                return `
                  <a href="member-profile.html?id=${m.id}&groupId=${groupId}"
                    class="bg-white border border-[#F5F5F5] rounded-2xl p-3.5 flex items-center justify-between active:scale-[0.98] transition-transform">
                    <div class="flex items-center gap-3">
                      <div class="w-10 h-10 rounded-full bg-[#1B5E3B]/10 flex items-center justify-center">
                        <span class="text-[10px] font-bold text-[#1B5E3B]">${initials}</span>
                      </div>
                      <div>
                        <p class="text-sm font-bold text-[#1A1A1A]">${name}</p>
                        <p class="text-[10px] text-[#9E9E9E]">View Performance</p>
                      </div>
                    </div>
                    <svg class="w-3 h-3 text-[#9E9E9E]" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><path d="M9 5l7 7-7 7"/></svg>
                  </a>`;
              }).join("")
            : '<p class="text-center py-10 text-[#9E9E9E] text-xs">No members yet.</p>';

        } catch (e) {
          console.error(e);
          document.getElementById("groupTitle").textContent = "Error loading group";
        }
      }

      // ─── Lazy tab loaders ─────────────────────────────────────

      async function loadContributions() {
        const el = document.getElementById("content-contributions");
        el.innerHTML = '<p class="text-center py-6 text-[#9E9E9E] text-xs">Loading…</p>';
        try {
          const data = await getCycleContributions(groupId);
          const list = Array.isArray(data) ? data : (data.results || data.contributions || []);
          if (!list.length) {
            el.innerHTML = '<p class="text-center py-10 text-[#9E9E9E] text-xs">No contributions yet.</p>';
            return;
          }
          const statusMap = {
            paid:    `<span class="text-xs text-[#22C55E] font-bold">✓ Paid</span>`,
            missed:  `<span class="text-xs text-[#EF4444] font-bold">✗ Missed</span>`,
            pending: `<span class="text-xs text-[#F5A623] font-semibold">Pending</span>`,
          };
          el.innerHTML = `<div class="flex flex-col gap-2">${list.map((c) => {
            const name   = c.user_name || c.userName || "Member";
            const status = statusMap[c.status?.toLowerCase()] || statusMap.pending;
            const date   = c.paid_at
              ? new Date(c.paid_at).toLocaleDateString("en-NG", { month: "short", day: "numeric" })
              : "—";
            return `
              <div class="bg-white rounded-2xl px-4 py-3 flex items-center justify-between">
                <div>
                  <p class="text-sm font-semibold text-[#1A1A1A]">${name}</p>
                  <p class="text-xs text-[#9E9E9E]">Round ${c.round_number ?? "—"} · ${date}</p>
                </div>
                ${status}
              </div>`;
          }).join("")}</div>`;
        } catch (e) {
          el.innerHTML = `<p class="text-center py-6 text-red-400 text-xs">${e.message}</p>`;
        }
      }

      async function loadRotation() {
        const el = document.getElementById("content-rotation");
        el.innerHTML = '<p class="text-center py-6 text-[#9E9E9E] text-xs">Loading…</p>';
        try {
          const data    = await getNextPayout(groupId);
          const payouts = Array.isArray(data) ? data : (data.results || data.payouts || []);
          if (!payouts.length) {
            el.innerHTML = '<p class="text-center py-10 text-[#9E9E9E] text-xs">No payout schedule yet.</p>';
            return;
          }
          el.innerHTML = `<div class="flex flex-col gap-2">${payouts.map((p, i) => {
            const name      = p.recipient_name || p.userName || `Member ${i + 1}`;
            const dotColor  = p.status === "paid" ? "bg-[#22C55E]" : i === 0 ? "bg-[#F5A623]" : "bg-[#E0E0E0]";
            return `
              <div class="bg-white rounded-2xl px-4 py-3 flex items-center gap-3">
                <div class="w-7 h-7 ${dotColor} rounded-full flex items-center justify-center shrink-0">
                  <span class="text-white text-[10px] font-bold">${i + 1}</span>
                </div>
                <div class="flex-1">
                  <p class="text-sm font-semibold text-[#1A1A1A]">${name}</p>
                  <p class="text-xs text-[#9E9E9E]">Round ${p.round_number ?? i + 1}</p>
                </div>
                <span class="text-sm font-bold text-[#1A1A1A]">₦${Number(p.amount || 0).toLocaleString("en-NG")}</span>
              </div>`;
          }).join("")}</div>`;
        } catch (e) {
          el.innerHTML = `<p class="text-center py-6 text-red-400 text-xs">${e.message}</p>`;
        }
      }

      async function loadRisk() {
        try {
          const h     = await getGroupHealthScore(groupId);
          const score = h.score ?? 75;
          document.getElementById("healthScoreValue").textContent  = score;
          document.getElementById("healthStatusText").textContent  =
            h.label || (score >= 80 ? "Healthy 💚" : score >= 50 ? "Moderate ⚠️" : "At Risk 🚨");
          document.getElementById("riskCircleFill").style.strokeDashoffset =
            314 - (score / 100) * 314;
        } catch (e) {
          console.error("loadRisk:", e.message);
        }
      }

      // ─── Tab switcher ─────────────────────────────────────────

      window.switchTab = function (tabId) {
        document.querySelectorAll("[id^='tab-']").forEach((btn) => {
          btn.classList.remove("border-[#1B5E3B]", "text-[#1B5E3B]", "font-bold");
          btn.classList.add("border-transparent", "text-[#9E9E9E]", "font-medium");
        });
        const active = document.getElementById(`tab-${tabId}`);
        active.classList.add("border-[#1B5E3B]", "text-[#1B5E3B]", "font-bold");
        active.classList.remove("text-[#9E9E9E]", "font-medium", "border-transparent");

        document.querySelectorAll(".tab-content").forEach((c) => c.classList.remove("active"));
        document.getElementById(`content-${tabId}`).classList.add("active");

        if (tabId === "contributions" && !loaded.contributions) { loaded.contributions = true; loadContributions(); }
        if (tabId === "rotation"      && !loaded.rotation)      { loaded.rotation      = true; loadRotation(); }
        if (tabId === "risk"          && !loaded.risk)          { loaded.risk          = true; loadRisk(); }
      };

      window.navigateToHealthReport = function () {
        window.location.href = groupId ? `health-report.html?id=${groupId}` : "health-report.html";
      };

      initDetails();
    </script>
  </body>
</html>
