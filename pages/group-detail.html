<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Smart Ajo – Group Details</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Fraunces:wght@700;900&family=DM+Sans:wght@400;500;600&display=swap" rel="stylesheet" />
    <style>
      @keyframes fadeUp { from { opacity: 0; transform: translateY(14px); } to { opacity: 1; transform: translateY(0); } }
      .fade-up { animation: fadeUp 0.5s ease both; }
      body { 
        padding-bottom: 100px; 
        font-family: ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, "Helvetica Neue", Arial, sans-serif;
      } 
      .tab-content { display: none; }
      .tab-content.active { display: block; animation: fadeUp 0.35s ease both; }
      
      .circle-bg { fill: none; stroke: #e8e8e4; stroke-width: 10; }
      .circle-fill { fill: none; stroke: #ffffff; stroke-width: 10; stroke-linecap: round; transform: rotate(-90deg); transform-origin: 50% 50%; transition: stroke-dashoffset 1s ease-out; }
      
      .risk-circle-bg { fill: none; stroke: #E0E0E0; stroke-width: 10; }
      .risk-circle-fill { fill: none; stroke: #3A3A3A; stroke-width: 10; stroke-linecap: round; transform: rotate(-90deg); transform-origin: 50% 50%; transition: stroke-dashoffset 1s ease-out; }
      .scrollbar-hide::-webkit-scrollbar { display: none; }
    </style>
  </head>
  <body class="bg-[#F5F4EF] min-h-screen max-w-[430px] mx-auto">
    
    <div class="bg-[#2A2A2A] px-5 pt-10 pb-20">
      <div class="flex items-center justify-between mb-6">
        <button onclick="window.location.href = 'groups.html'" class="w-9 h-9 flex items-center justify-center rounded-full bg-white bg-opacity-10 transition-colors">
          <svg class="w-4 h-4 text-white" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><path d="M15 18l-6-6 6-6" /></svg>
        </button>
        <h1 id="groupTitle" class="text-lg font-bold text-white">Loading...</h1>
        <div class="w-9"></div> 
      </div>

      <div class="flex flex-col items-center">
        <div class="relative w-40 h-40 mb-3">
          <svg viewBox="0 0 110 110" class="w-full h-full">
            <circle class="circle-bg" cx="55" cy="55" r="50" />
            <circle id="progressCircle" class="circle-fill" cx="55" cy="55" r="50" stroke-dasharray="314" stroke-dashoffset="314" />
          </svg>
          <div class="absolute inset-0 flex flex-col items-center justify-center">
            <p class="text-white text-[10px] opacity-60 mb-0.5">Current Pool</p>
            <p id="currentPool" class="text-white text-2xl font-bold leading-tight">₦0</p>
            <span id="progressText" class="mt-1.5 bg-white bg-opacity-20 text-white text-[10px] font-semibold px-2.5 py-0.5 rounded-full">0% Complete</span>
          </div>
        </div>
        <p class="text-white text-opacity-60 text-xs opacity-60">Target Pool Amount</p>
        <p id="targetPool" class="text-white text-xl font-bold">₦0</p>
      </div>
    </div>

    <div class="bg-[#F5F4EF] rounded-t-3xl -mt-8 px-5 pt-5">
      <div class="flex border-b border-[#E0E0E0] mb-5 overflow-x-auto scrollbar-hide">
        <button id="tab-overview" onclick="switchTab('overview')" class="shrink-0 px-3 py-3 text-xs font-semibold text-[#1A1A1A] border-b-2 border-[#3A3A3A] transition-all">Overview</button>
        <button id="tab-members" onclick="switchTab('members')" class="shrink-0 px-3 py-3 text-xs font-medium text-[#9E9E9E] border-b-2 border-transparent transition-all">Members</button>
        <button id="tab-contributions" onclick="switchTab('contributions')" class="shrink-0 px-3 py-3 text-xs font-medium text-[#9E9E9E] border-b-2 border-transparent transition-all">Contributions</button>
        <button id="tab-rotation" onclick="switchTab('rotation')" class="shrink-0 px-3 py-3 text-xs font-medium text-[#9E9E9E] border-b-2 border-transparent transition-all">Rotation</button>
        <button id="tab-risk" onclick="switchTab('risk')" class="shrink-0 px-3 py-3 text-xs font-medium text-[#9E9E9E] border-b-2 border-transparent transition-all">AI Risk</button>
      </div>

      <!-- Tab Content Sections -->
      <div id="content-overview" class="tab-content active">
        <p class="text-[11px] font-bold text-[#9E9E9E] uppercase mb-3">Group Summary</p>
        <div class="bg-white rounded-2xl overflow-hidden border border-[#F5F5F5]">
          <div class="flex items-center justify-between px-4 py-3.5 border-b border-[#F5F5F5]">
            <span class="text-sm text-[#6B6B6B]">Total Pool</span>
            <span id="summaryTotalPool" class="text-sm font-bold text-[#1A1A1A]">₦0</span>
          </div>
          <div class="flex items-center justify-between px-4 py-3.5 border-b border-[#F5F5F5]">
            <span class="text-sm text-[#6B6B6B]">Contribution</span>
            <span id="summaryContribution" class="text-sm font-bold text-[#1A1A1A]">₦0</span>
          </div>
          <div class="flex items-center justify-between px-4 py-3.5 border-b border-[#F5F5F5]">
            <span class="text-sm text-[#6B6B6B]">Members</span>
            <span id="summaryMembers" class="text-sm font-bold text-[#1A1A1A]">0</span>
          </div>
          <div class="flex items-center justify-between px-4 py-3.5">
            <span class="text-sm text-[#6B6B6B]">Frequency</span>
            <span id="summaryFrequency" class="text-sm font-bold text-[#1A1A1A] capitalize">-</span>
          </div>
        </div>
      </div>

      <div id="content-members" class="tab-content">
        <div id="membersList" class="flex flex-col gap-3">
            <p class="text-center py-10 text-[#9E9E9E] text-xs">Loading members...</p>
        </div>
      </div>

      <div id="content-risk" class="tab-content">
        <div onclick="navigateToHealthReport()" class="bg-white rounded-3xl border border-[#F5F5F5] p-8 flex flex-col items-center mb-6 cursor-pointer active:scale-95 transition-transform">
            <p class="text-xs font-bold text-[#1A1A1A] mb-6">Group Health Score</p>
            <div class="relative w-32 h-32 mb-4">
                <svg viewBox="0 0 110 110" class="w-full h-full">
                    <circle class="risk-circle-bg" cx="55" cy="55" r="50" />
                    <circle id="riskCircleFill" class="risk-circle-fill" cx="55" cy="55" r="50" stroke-dasharray="314" stroke-dashoffset="314" />
                </svg>
                <div class="absolute inset-0 flex flex-col items-center justify-center">
                    <span id="healthScoreValue" class="text-3xl font-bold text-[#1A1A1A]">0</span>
                    <span class="text-[10px] text-[#9E9E9E]">out of 100</span>
                </div>
            </div>
            <p id="healthStatusText" class="text-xs font-bold text-[#9E9E9E]">Calculating...</p>
        </div>
      </div>

      <div id="content-contributions" class="tab-content text-center py-10 text-[#9E9E9E] text-xs">No history yet.</div>
      <div id="content-rotation" class="tab-content text-center py-10 text-[#9E9E9E] text-xs">Loading schedule...</div>
    </div>

    <!-- Bottom Nav -->
    <div class="fixed bottom-0 left-1/2 -translate-x-1/2 w-full max-w-[430px] bg-white border-t border-[#F0F0F0] px-6 py-3 flex items-center justify-between z-50">
      <button onclick="window.location.href='dashboard.html'" class="flex flex-col items-center gap-1 text-[#9E9E9E] hover:text-[#3A3A3A] transition-colors">
        <svg class="w-5 h-5" fill="none" stroke="currentColor" stroke-width="1.8" viewBox="0 0 24 24"><path d="M3 12L12 3l9 9"/><path d="M9 21V12h6v9"/></svg>
        <span class="text-[10px] font-medium">Home</span>
      </button>
      <button onclick="window.location.href='groups.html'" class="flex flex-col items-center gap-1 text-[#3A3A3A]">
        <svg class="w-5 h-5" fill="currentColor" viewBox="0 0 24 24"><path d="M16 11c1.66 0 2.99-1.34 2.99-3S17.66 5 16 5c-1.66 0-3 1.34-3 3s1.34 3 3 3zm-8 0c1.66 0 2.99-1.34 2.99-3S9.66 5 8 5C6.34 5 5 6.34 5 8s1.34 3 3 3zm0 2c-2.33 0-7 1.17-7 3.5V19h14v-2.5c0-2.33-4.67-3.5-7-3.5zm8 0c-.29 0-.62.02-.97.05 1.16.84 1.97 1.97 1.97 3.45V19h6v-2.5c0-2.33-4.67-3.5-7-3.5z"/></svg>
        <span class="text-[10px] font-semibold">Groups</span>
      </button>
      <button onclick="window.location.href='make-payment.html'" class="w-14 h-14 bg-[#3A3A3A] rounded-full flex items-center justify-center -mt-6 shadow-lg active:scale-90 transition-transform">
        <svg class="w-6 h-6 text-white" fill="none" stroke="currentColor" stroke-width="2.5" viewBox="0 0 24 24"><path d="M12 5v14M5 12h14"/></svg>
      </button>
      <button onclick="window.location.href='alerts.html'" class="flex flex-col items-center gap-1 text-[#9E9E9E] hover:text-[#3A3A3A] transition-colors">
        <svg class="w-5 h-5" fill="none" stroke="currentColor" stroke-width="1.8" viewBox="0 0 24 24"><path d="M18 8A6 6 0 0 0 6 8c0 7-3 9-3 9h18s-3-2-3-9"/><path d="M13.73 21a2 2 0 0 1-3.46 0"/></svg>
        <span class="text-[10px] font-medium">Alerts</span>
      </button>
      <button onclick="window.location.href='profile.html'" class="flex flex-col items-center gap-1 text-[#9E9E9E] hover:text-[#3A3A3A] transition-colors">
        <svg class="w-5 h-5" fill="none" stroke="currentColor" stroke-width="1.8" viewBox="0 0 24 24"><circle cx="12" cy="7" r="4"/><path d="M5.5 20a7 7 0 0 1 13 0"/></svg>
        <span class="text-[10px] font-medium">Profile</span>
      </button>
    </div>

    <script type="module">
      import { getGroupDetail } from "../js/api.js";

      window.navigateToHealthReport = function() {
        const urlParams = new URLSearchParams(window.location.search);
        const groupId = urlParams.get("id");
        if (groupId) {
          window.location.href = `health-report.html?id=${groupId}`;
        } else {
          window.location.href = `health-report.html`;
        }
      };

      async function initDetails() {
        const urlParams = new URLSearchParams(window.location.search);
        const groupId = urlParams.get("id"); // Captured from URL (e.g., '5')
        if (!groupId) return;

        try {
          const group = await getGroupDetail(groupId);
          document.getElementById("groupTitle").textContent = group.name;
          
          const target = group.target_amount || 0;
          const current = group.current_pool || 0;
          const percentage = target > 0 ? Math.round((current / target) * 100) : 0;

          document.getElementById("currentPool").textContent = `₦${Number(current).toLocaleString()}`;
          document.getElementById("targetPool").textContent = `₦${Number(target).toLocaleString()}`;
          document.getElementById("progressText").textContent = `${percentage}% Complete`;
          document.getElementById("progressCircle").style.strokeDashoffset = 314 - (percentage / 100) * 314;

          document.getElementById("summaryTotalPool").textContent = `₦${Number(target).toLocaleString()}`;
          document.getElementById("summaryContribution").textContent = `₦${Number(group.contribution_amount).toLocaleString()}`;
          document.getElementById("summaryMembers").textContent = group.members_count || 0;
          document.getElementById("summaryFrequency").textContent = group.contribution_frequency || "-";

          if(group.members && group.members.length > 0) {
            document.getElementById("membersList").innerHTML = group.members.map(m => {
                const initials = m.full_name ? m.full_name.split(' ').map(n => n[0]).join('').toUpperCase() : '??';
                
                // DYNAMIC FIX: Uses 'groupId' captured from the current URL
                return `
                    <a href="member-profile.html?id=${m.id}&groupId=${groupId}" class="bg-white border border-[#F5F5F5] rounded-2xl p-3.5 flex items-center justify-between active:scale-[0.98] transition-transform">
                        <div class="flex items-center gap-3">
                            <div class="w-10 h-10 rounded-full bg-[#B0B5AC] flex items-center justify-center">
                                <span class="text-[10px] font-bold text-white">${initials}</span>
                            </div>
                            <div>
                                <p class="text-sm font-bold text-[#1A1A1A]">${m.full_name || 'Anonymous'}</p>
                                <p class="text-[10px] text-[#9E9E9E]">View Performance</p>
                            </div>
                        </div>
                        <div class="flex items-center gap-2">
                            <span class="text-[10px] font-bold text-[#9E9E9E] bg-[#F5F4EF] px-2 py-1 rounded-md">Member</span>
                            <svg class="w-3 h-3 text-[#9E9E9E]" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><path d="M9 5l7 7-7 7"/></svg>
                        </div>
                    </a>
                `;
            }).join('');
          } else {
            document.getElementById("membersList").innerHTML = '<p class="text-center py-10 text-[#9E9E9E] text-xs">No members yet.</p>';
          }

        } catch (e) { 
          console.error(e);
          document.getElementById("groupTitle").textContent = "Error";
        }
      }

      window.switchTab = function (tabId) {
        document.querySelectorAll('[id^="tab-"]').forEach(btn => {
          btn.classList.remove("border-[#3A3A3A]", "text-[#1A1A1A]");
          btn.classList.add("border-transparent", "text-[#9E9E9E]");
        });
        const activeTab = document.getElementById(`tab-${tabId}`);
        activeTab.classList.add("border-[#3A3A3A]", "text-[#1A1A1A]");
        activeTab.classList.remove("text-[#9E9E9E]");

        document.querySelectorAll(".tab-content").forEach(c => c.classList.remove("active"));
        document.getElementById(`content-${tabId}`).classList.add("active");
      };

      initDetails();
    </script>
  </body>
</html>
