<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Smart Ajo – Group Details</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link
      href="https://fonts.googleapis.com/css2?family=Fraunces:wght@700;900&family=DM+Sans:wght@400;500;600&display=swap"
      rel="stylesheet"
    />
    <style>
      @keyframes fadeUp {
        from {
          opacity: 0;
          transform: translateY(14px);
        }
        to {
          opacity: 1;
          transform: translateY(0);
        }
      }
      .fade-up {
        animation: fadeUp 0.5s ease both;
      }
      body {
        padding-bottom: 90px;
      }
      .tab-content {
        display: none;
      }
      .tab-content.active {
        display: block;
        animation: fadeUp 0.35s ease both;
      }

      /* Circular progress */
      .circle-bg {
        fill: none;
        stroke: #e8e8e4;
        stroke-width: 10;
      }
      .circle-fill {
        fill: none;
        stroke: #ffffff;
        stroke-width: 10;
        stroke-linecap: round;
        stroke-dasharray: 314;
        stroke-dashoffset: 314;
        transform: rotate(-90deg);
        transform-origin: 50% 50%;
        transition: stroke-dashoffset 1s ease-out;
      }
    </style>
  </head>
  <body
    class="bg-[#F5F4EF] min-h-screen max-w-[430px] mx-auto font-['DM_Sans']"
  >
    <!-- Dark header area -->
    <div class="bg-[#2A2A2A] px-5 pt-10 pb-20">
      <div class="flex items-center justify-between mb-6">
        <button
          onclick="window.location.href = 'groups.html'"
          class="w-9 h-9 flex items-center justify-center rounded-full bg-white bg-opacity-10 hover:bg-opacity-20 transition-colors"
        >
          <svg
            class="w-4 h-4 text-white"
            fill="none"
            stroke="currentColor"
            stroke-width="2"
            viewBox="0 0 24 24"
          >
            <path d="M15 18l-6-6 6-6" />
          </svg>
        </button>
        <h1
          id="groupTitle"
          class="font-['Fraunces'] text-lg font-bold text-white"
        >
          Loading...
        </h1>
        <button
          class="w-9 h-9 flex items-center justify-center rounded-full bg-white bg-opacity-10 hover:bg-opacity-20 transition-colors"
        >
          <svg
            class="w-4 h-4 text-white"
            fill="none"
            stroke="currentColor"
            stroke-width="1.8"
            viewBox="0 0 24 24"
          >
            <path d="M18 8A6 6 0 0 0 6 8c0 7-3 9-3 9h18s-3-2-3-9" />
            <path d="M13.73 21a2 2 0 0 1-3.46 0" />
          </svg>
        </button>
      </div>

      <!-- Circular progress -->
      <div class="flex flex-col items-center">
        <div class="relative w-40 h-40 mb-3">
          <svg viewBox="0 0 110 110" class="w-full h-full">
            <circle class="circle-bg" cx="55" cy="55" r="50" />
            <circle
              id="progressCircle"
              class="circle-fill"
              cx="55"
              cy="55"
              r="50"
            />
          </svg>
          <div
            class="absolute inset-0 flex flex-col items-center justify-center"
          >
            <p class="text-white text-[10px] opacity-60 mb-0.5">Current Pool</p>
            <p
              id="currentPool"
              class="font-['Fraunces'] text-white text-2xl font-bold leading-tight"
            >
              ₦0
            </p>
            <span
              id="progressText"
              class="mt-1.5 bg-white bg-opacity-20 text-white text-[10px] font-semibold px-2.5 py-0.5 rounded-full"
              >0% Complete</span
            >
          </div>
        </div>
        <p class="text-white text-opacity-60 text-xs opacity-60">
          Target Pool Amount
        </p>
        <p
          id="targetPool"
          class="font-['Fraunces'] text-white text-xl font-bold"
        >
          ₦0
        </p>
      </div>
    </div>

    <!-- White card pulled up over dark header -->
    <div class="bg-[#F5F4EF] rounded-t-3xl -mt-8 px-5 pt-5">
      <!-- Tabs -->
      <div
        class="flex border-b border-[#E0E0E0] mb-5 overflow-x-auto scrollbar-hide"
      >
        <button
          id="tab-overview"
          onclick="switchTab('overview')"
          class="shrink-0 px-3 py-3 text-xs font-semibold text-[#1A1A1A] border-b-2 border-[#3A3A3A] transition-all"
        >
          Overview
        </button>
        <button
          id="tab-members"
          onclick="switchTab('members')"
          class="shrink-0 px-3 py-3 text-xs font-medium text-[#9E9E9E] border-b-2 border-transparent transition-all"
        >
          Members
        </button>
        <button
          id="tab-contributions"
          onclick="switchTab('contributions')"
          class="shrink-0 px-3 py-3 text-xs font-medium text-[#9E9E9E] border-b-2 border-transparent transition-all"
        >
          Contributions
        </button>
        <button
          id="tab-rotation"
          onclick="switchTab('rotation')"
          class="shrink-0 px-3 py-3 text-xs font-medium text-[#9E9E9E] border-b-2 border-transparent transition-all"
        >
          Rotation
        </button>
      </div>

      <!-- OVERVIEW TAB -->
      <div id="content-overview" class="tab-content active">
        <div class="mb-5">
          <p
            class="text-xs font-semibold text-[#9E9E9E] uppercase tracking-wide mb-3"
          >
            Group Summary
          </p>
          <div class="bg-white rounded-2xl overflow-hidden">
            <div
              class="flex items-center justify-between px-4 py-3.5 border-b border-[#F5F5F5]"
            >
              <span class="text-sm text-[#6B6B6B]">Total Pool</span>
              <span
                id="summaryTotalPool"
                class="text-sm font-bold text-[#1A1A1A]"
                >₦0</span
              >
            </div>
            <div
              class="flex items-center justify-between px-4 py-3.5 border-b border-[#F5F5F5]"
            >
              <span class="text-sm text-[#6B6B6B]">Contribution</span>
              <span
                id="summaryContribution"
                class="text-sm font-bold text-[#1A1A1A]"
                >₦0</span
              >
            </div>
            <div
              class="flex items-center justify-between px-4 py-3.5 border-b border-[#F5F5F5]"
            >
              <span class="text-sm text-[#6B6B6B]">Members</span>
              <span id="summaryMembers" class="text-sm font-bold text-[#1A1A1A]"
                >0</span
              >
            </div>
            <div class="flex items-center justify-between px-4 py-3.5">
              <span class="text-sm text-[#6B6B6B]">Frequency</span>
              <span
                id="summaryFrequency"
                class="text-sm font-bold text-[#1A1A1A] capitalize"
                >-</span
              >
            </div>
          </div>
        </div>

        <div id="joinActionArea"></div>
      </div>

      <!-- MEMBERS TAB -->
      <div id="content-members" class="tab-content">
        <div id="membersList" class="flex flex-col gap-3">
          <p class="text-center py-10 text-[#9E9E9E] text-xs">
            Loading members...
          </p>
        </div>
      </div>

      <div
        id="content-contributions"
        class="tab-content text-center py-10 text-[#9E9E9E] text-xs"
      >
        No contribution history available.
      </div>
      <div
        id="content-rotation"
        class="tab-content text-center py-10 text-[#9E9E9E] text-xs"
      >
        Rotation schedule will appear once group is full.
      </div>
    </div>

    <script type="module">
      import { getGroupDetails } from "../js/api.js"; // Ensure this function exists in your api.js

      // 1. Get the ID from the URL
      const urlParams = new URLSearchParams(window.location.search);
      const groupId = urlParams.get("id");

      async function init() {
        if (!groupId) {
          console.error("No group ID found");
          return;
        }

        try {
          // 2. Fetch the data for this specific group
          const group = await getGroupDetails(groupId);

          // 3. Inject the data into your page elements
          document.getElementById("groupName").textContent = group.name;
          document.getElementById("contributionAmount").textContent =
            `₦${Number(group.contribution_amount).toLocaleString()}`;
          // Add more fields as needed...
        } catch (error) {
          console.error("Failed to load group details:", error);
        }
      }

      init();
    </script>
  </body>
</html>
